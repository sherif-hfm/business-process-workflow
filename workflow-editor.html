<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Process Workflow Editor</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-2: #2563eb;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 15px;
    margin: 0 12px 0 0;
    font-weight: 600;
    white-space: nowrap;
  }
  .wf-name {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    min-width: 220px;
  }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background .15s, border-color .15s;
  }
  button:hover { background: #324158; }
  button.primary { background: var(--accent); border-color: var(--accent-2); color: #fff; }
  button.primary:hover { background: var(--accent-2); }
  button.danger { color: #fff; background: var(--red); border-color: #dc2626; }
  button.active { background: var(--green); border-color: #16a34a; color: #fff; }
  .spacer { flex: 1; }

  main { flex: 1; display: flex; min-height: 0; }

  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; background:
    radial-gradient(circle, #1b2740 1px, transparent 1px) 0 0 / 24px 24px,
    var(--bg); cursor: default; }

  .hint {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(30,41,59,.9);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    max-width: 320px;
    pointer-events: none;
  }
  .hint b { color: var(--text); }

  /* Sidebar */
  aside {
    width: 280px;
    background: var(--panel);
    padding: 14px;
    overflow-y: auto;
  }
  .resizer {
    width: 4px;
    margin-left: -2px;
    margin-right: -2px;
    background: transparent;
    cursor: col-resize;
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    user-select: none;
  }
  .resizer::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 1px;
    width: 1px;
    background: var(--border);
    transition: background 0.15s, width 0.15s, left 0.15s;
  }
  .resizer:hover::before, .resizer.dragging::before {
    background: var(--accent);
    width: 3px;
    left: 0px;
  }
  aside h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 0 0 10px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 9px;
    border-radius: 6px;
    font-size: 13px;
  }
  .empty-note { color: var(--muted); font-size: 13px; line-height: 1.5; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .badge { font-size: 11px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(59, 130, 246, .16);
    border: 1px solid rgba(59, 130, 246, .45);
    color: #bfdbfe;
    border-radius: 999px;
    padding: 3px 7px;
    font-size: 12px;
  }
  .chip button {
    width: auto;
    padding: 0 4px;
    border: 0;
    background: transparent;
    color: #bfdbfe;
    font-size: 12px;
    line-height: 1;
  }
  .chip button:hover { background: rgba(191, 219, 254, .16); }

  /* SVG node styling */
  .node rect, .node circle.body {
    cursor: grab;
  }
  .node rect {
    rx: 10; ry: 10;
    stroke-width: 2;
  }
  .node circle.body { stroke-width: 2; }
  .node polygon.body { stroke-width: 2; cursor: grab; }
  .node.startEvent circle.body { fill: #14532d; stroke: var(--green); }
  .node.endEvent circle.body   { fill: #450a0a; stroke: var(--red); stroke-width: 5; }
  .node.userTask rect { fill: #1e3a5f; stroke: var(--accent); }
  .node.task rect     { fill: #1e293b; stroke: #64748b; }
  .node.serviceTask rect { fill: #164e4a; stroke: #2dd4bf; }
  .node.scriptTask rect { fill: #1e1b4b; stroke: #a78bfa; }
  .node.exclusiveGateway polygon.body { fill: #422006; stroke: var(--amber); }
  .node.errorEndEvent circle.body { fill: #450a0a; stroke: var(--red); stroke-width: 5; }
  .node.errorBoundaryEvent circle.body { fill: #1f0a0a; stroke: var(--red); stroke-width: 3; }
  .node.errorBoundaryEvent circle.ring { fill: none; stroke: var(--red); stroke-width: 1.5; }
  .node .err-mark { fill: var(--red); font-size: 13px; font-weight: 700; text-anchor: middle; }
  .node.selected rect,
  .node.selected circle.body,
  .node.selected polygon.body { stroke: #fff; stroke-width: 3; }
  .node.selected.errorBoundaryEvent circle.body { stroke: #fff; stroke-width: 3; }
  .node text { fill: #fff; font-size: 13px; pointer-events: none; user-select: none; }
  .node .nid { fill: #cbd5e1; font-size: 11px; }
  .node .roles { fill: var(--muted); font-size: 10px; }
  .node .event-name { font-size: 12px; }
  .node .gw-mark { fill: var(--amber); font-size: 22px; font-weight: 700; }
  .node .user-marker circle { fill: #bfdbfe; stroke: #bfdbfe; }
  .node .user-marker path { fill: none; stroke: #bfdbfe; stroke-width: 1.5; }

  .lane rect.body {
    fill: rgba(59, 130, 246, .08);
    stroke: #64748b;
    stroke-width: 2;
    stroke-dasharray: 8 5;
    cursor: grab;
  }
  .lane.selected rect.body { stroke: #fff; stroke-width: 3; }
  .lane text { fill: #cbd5e1; font-size: 13px; pointer-events: none; user-select: none; }
  .lane .pid { fill: var(--muted); font-size: 11px; }
  .lane .resize {
    fill: var(--accent);
    stroke: #bfdbfe;
    stroke-width: 1;
    cursor: nwse-resize;
  }

  .edge path { fill: none; stroke: #64748b; stroke-width: 2; cursor: pointer; }
  .edge.auto path { stroke-dasharray: 6 4; }
  .edge.selected path { stroke: var(--amber); stroke-width: 3; }
  .edge.error path { stroke: var(--red); stroke-dasharray: 5 4; }
  .edge.error text { fill: var(--red); }
  .edge.error .lblbg { fill: var(--bg); opacity: .85; }
  .edge text { fill: #cbd5e1; font-size: 11px; cursor: pointer; }
  .edge .roles { fill: var(--muted); font-size: 10px; }
  .edge .cond { fill: var(--amber); font-size: 10px; }
  .edge .lblbg { fill: var(--bg); opacity: .85; }

  /* JS Editor Modal Overlay */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  
  /* Modal Container */
  .modal-container {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 85vw;
    height: 85vh;
    max-width: 960px;
    max-height: 750px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: modalFadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  @keyframes modalFadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
  
  /* Modal Header */
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .modal-header h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  
  .modal-header .close-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  
  .modal-header .close-btn:hover {
    color: var(--text);
    background: var(--panel-2);
  }
  
  /* Modal Body */
  .modal-body {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  
  /* Modal Textarea */
  .modal-textarea {
    flex: 1;
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: monospace;
    font-size: 14px;
    padding: 16px;
    resize: none;
    outline: none;
    line-height: 1.5;
  }
  
  .modal-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
  }
  
  /* Modal Footer */
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(15, 23, 42, 0.2);
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
  }

  .modal-body .chip {
    cursor: pointer;
    transition: background-color 0.15s, border-color 0.15s;
  }
  .modal-body .chip:hover {
    background: rgba(59, 130, 246, 0.25);
    border-color: rgba(59, 130, 246, 0.7);
  }
</style>
</head>
<body>
<header>
  <h1>Workflow Editor</h1>
  <input id="wfName" class="wf-name" placeholder="Workflow name" />
  <button id="addStepBtn" class="primary">+ Add Node</button>
  <button id="addPhaseBtn">+ Add Lane</button>
  <button id="connectBtn">Connect Flow</button>
  <div class="spacer"></div>
  <button id="newBtn">New</button>
  <button id="loadBtn">Load JSON</button>
  <button id="saveBtn">Save JSON</button>
  <input id="fileInput" type="file" accept="application/json,.json" hidden />
</header>

<main>
  <div class="canvas-wrap">
    <svg id="svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
        </marker>
        <marker id="arrowSel" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b" />
        </marker>
      </defs>
      <g id="lanes"></g>
      <g id="edges"></g>
      <g id="nodes"></g>
    </svg>
    <div class="hint" id="hint"></div>
  </div>

  <div class="resizer" id="sidebar-resizer"></div>

  <aside id="inspector"></aside>
</main>

<!-- JS Editor Modal Overlay -->
<div id="js-editor-modal" class="modal-overlay" style="display: none;">
  <div class="modal-container">
    <div class="modal-header">
      <h3 id="js-editor-title">Edit JavaScript Code</h3>
      <button type="button" class="close-btn" onclick="closeJsEditor()">&times;</button>
    </div>
    <div class="modal-body" style="display: flex; flex-direction: row; gap: 20px;">
      <!-- Code Editor Column -->
      <div style="flex: 1; display: flex; flex-direction: column; min-width: 0;">
        <textarea id="js-editor-textarea" class="modal-textarea" spellcheck="false" placeholder="// Write your JavaScript code here..."></textarea>
      </div>
      <!-- Variables Panel Column -->
      <div style="width: 280px; display: flex; flex-direction: column; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; min-height: 0;">
        <div style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 0; padding-right: 4px;">
          <!-- User Variables Section -->
          <div>
            <h4 style="margin: 0 0 4px 0; font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em;">Available Variables</h4>
            <p class="empty-note" id="js-editor-variables-hint" style="margin: 0 0 8px 0; font-size: 12px; line-height: 1.4;"></p>
            <div id="js-editor-variables-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
          </div>
          <!-- System Variables Section -->
          <div>
            <h4 style="margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; border-top: 1px solid var(--border); padding-top: 12px;">System Context</h4>
            <div id="js-editor-sys-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" onclick="closeJsEditor()">Cancel</button>
      <button type="button" class="primary" onclick="saveJsEditor()">Save & Close</button>
    </div>
  </div>
</div>

<script>
const NODE_W = 170, NODE_H = 64;
const EVENT_D = 56;
const GATEWAY_D = 72;
const BOUNDARY_D = 28;
const MIN_LANE_W = 220, MIN_LANE_H = 150;
const NODE_TYPE = {
  START_EVENT: "startEvent",
  END_EVENT: "endEvent",
  USER_TASK: "userTask",
  TASK: "task",
  SERVICE_TASK: "serviceTask",
  SCRIPT_TASK: "scriptTask",
  EXCLUSIVE_GATEWAY: "exclusiveGateway",
  ERROR_END_EVENT: "errorEndEvent",
  ERROR_BOUNDARY_EVENT: "errorBoundaryEvent"
};
const NODE_TYPE_OPTIONS = [
  { value: NODE_TYPE.START_EVENT, label: "Start Event" },
  { value: NODE_TYPE.END_EVENT, label: "End Event" },
  { value: NODE_TYPE.USER_TASK, label: "User Task" },
  { value: NODE_TYPE.TASK, label: "Task (automatic)" },
  { value: NODE_TYPE.SERVICE_TASK, label: "Service Task (REST)" },
  { value: NODE_TYPE.SCRIPT_TASK, label: "Script Task (set variables)" },
  { value: NODE_TYPE.EXCLUSIVE_GATEWAY, label: "Exclusive Gateway" },
  { value: NODE_TYPE.ERROR_END_EVENT, label: "Error End Event (fault)" }
];
const CLAIM_MODE = { FRESH: "fresh", PREVIOUS: "previous", FROM_NODE: "fromNode" };
const CLAIM_MODE_OPTIONS = [
  { value: CLAIM_MODE.FRESH, label: "Fresh (claim each time)" },
  { value: CLAIM_MODE.PREVIOUS, label: "Previous (last actor)" },
  { value: CLAIM_MODE.FROM_NODE, label: "From node (specific step)" }
];
const SCRIPT_FORMAT = { NCALC: "ncalc", JAVASCRIPT: "javascript" };
const SCRIPT_FORMAT_OPTIONS = [
  { value: SCRIPT_FORMAT.NCALC, label: "NCalc assignments" },
  { value: SCRIPT_FORMAT.JAVASCRIPT, label: "JavaScript (execution API)" }
];
const VARIABLE_DATA_TYPES = ["string", "number", "boolean", "date", "datetime"];
const HTTP_METHODS = ["GET", "POST", "PUT", "PATCH", "DELETE"];
function defaultService() {
  return { method: "GET", url: "", headers: [], body: "", timeoutSeconds: 30, statusVariable: "", outputMappings: [] };
}
function normalizeService(service) {
  const base = defaultService();
  if (!service || typeof service !== "object") return base;
  return {
    method: HTTP_METHODS.includes((service.method || "").toUpperCase()) ? service.method.toUpperCase() : base.method,
    url: typeof service.url === "string" ? service.url : "",
    headers: Array.isArray(service.headers)
      ? service.headers.map(h => ({ name: h && h.name ? String(h.name) : "", value: h && h.value != null ? String(h.value) : "" }))
      : [],
    body: typeof service.body === "string" ? service.body : "",
    timeoutSeconds: Number.isFinite(+service.timeoutSeconds) && +service.timeoutSeconds > 0 ? Math.round(+service.timeoutSeconds) : base.timeoutSeconds,
    statusVariable: typeof service.statusVariable === "string" ? service.statusVariable : "",
    outputMappings: Array.isArray(service.outputMappings)
      ? service.outputMappings.map(m => ({ variable: m && m.variable ? String(m.variable) : "", path: m && m.path ? String(m.path) : "" }))
      : []
  };
}
function normalizeAssignments(assignments) {
  if (!Array.isArray(assignments)) return [];
  return assignments
    .map(a => (a && typeof a === "object" ? a : {}))
    .map(a => ({
      variable: typeof a.variable === "string" ? a.variable : "",
      expression: typeof a.expression === "string" ? a.expression : ""
    }));
}
let model = newModel();
let selected = null;          // {kind:'node'|'flow'|'lane', nodeId, flowId, laneId}
let connectMode = false;
let connectSource = null;     // node id when picking target
let drag = null;              // {id, dx, dy}
let laneDrag = null;          // {id, dx, dy, nodeOffsets}
let laneResize = null;        // {id, dx, dy}

const svg = document.getElementById('svg');
const lanesG = document.getElementById('lanes');
const nodesG = document.getElementById('nodes');
const edgesG = document.getElementById('edges');
const inspector = document.getElementById('inspector');
const hintEl = document.getElementById('hint');
const wfNameInput = document.getElementById('wfName');
const resizer = document.getElementById('sidebar-resizer');

function newModel() {
  return {
    id: 1,
    name: "New Workflow",
    initialEventId: null,
    variables: [],
    lanes: [],
    flowNodes: [],
    sequenceFlows: []
  };
}

function nextLaneId() {
  return model.lanes.reduce((m, p) => Math.max(m, p.id), 0) + 1;
}
function nextNodeId() {
  return model.flowNodes.reduce((m, s) => Math.max(m, s.id), 0) + 1;
}
function nextFlowId() {
  return model.sequenceFlows.reduce((m, f) => Math.max(m, f.id), 100) + 1;
}
function nextVariableId(owner) {
  return (owner.variables || []).reduce((m, v) => Math.max(m, v.id), 0) + 1;
}
function getLane(id) { return model.lanes.find(p => p.id === id); }
function getNode(id) { return model.flowNodes.find(s => s.id === id); }
function getFlow(id) { return model.sequenceFlows.find(f => f.id === id); }
function outgoingFlows(nodeId) { return model.sequenceFlows.filter(f => f.sourceRef === nodeId); }
function incomingFlows(nodeId) { return model.sequenceFlows.filter(f => f.targetRef === nodeId); }
function findErrorBoundary(hostNodeId) {
  return model.flowNodes.find(n => n.type === NODE_TYPE.ERROR_BOUNDARY_EVENT && n.attachedToRef === hostNodeId);
}
function normalizeRoles(roles) {
  if (Array.isArray(roles)) return roles.map(role => String(role).trim()).filter(Boolean);
  if (typeof roles === "string" && roles.trim()) return [roles.trim()];
  return [];
}
function roleSummary(roles, maxLength = 28) {
  const text = normalizeRoles(roles).join(", ");
  return text.length > maxLength ? text.slice(0, maxLength - 3) + "..." : text;
}
function isEventType(type) {
  return type === NODE_TYPE.START_EVENT || type === NODE_TYPE.END_EVENT || type === NODE_TYPE.ERROR_END_EVENT;
}
function isAutomaticType(type) {
  return type === NODE_TYPE.TASK;
}
function isServiceTaskType(type) {
  return type === NODE_TYPE.SERVICE_TASK;
}
function isScriptTaskType(type) {
  return type === NODE_TYPE.SCRIPT_TASK;
}
function isUserTaskType(type) {
  return type === NODE_TYPE.USER_TASK;
}
function isStartEventType(type) {
  return type === NODE_TYPE.START_EVENT;
}
function isEndEventType(type) {
  return type === NODE_TYPE.END_EVENT || type === NODE_TYPE.ERROR_END_EVENT;
}
function isErrorEndEventType(type) {
  return type === NODE_TYPE.ERROR_END_EVENT;
}
function isBoundaryEventType(type) {
  return type === NODE_TYPE.ERROR_BOUNDARY_EVENT;
}
function isGatewayType(type) {
  return type === NODE_TYPE.EXCLUSIVE_GATEWAY;
}
function isSingleOutgoingType(type) {
  return type === NODE_TYPE.START_EVENT
    || type === NODE_TYPE.TASK
    || type === NODE_TYPE.SERVICE_TASK
    || type === NODE_TYPE.SCRIPT_TASK
    || type === NODE_TYPE.ERROR_BOUNDARY_EVENT;
}
function typeLabel(type) {
  const match = NODE_TYPE_OPTIONS.find(o => o.value === type);
  return match ? match.label : type;
}
function nodeSize(node) {
  if (isBoundaryEventType(node.type)) return { w: BOUNDARY_D, h: BOUNDARY_D };
  if (isEventType(node.type)) return { w: EVENT_D, h: EVENT_D };
  if (isGatewayType(node.type)) return { w: GATEWAY_D, h: GATEWAY_D };
  return { w: NODE_W, h: NODE_H };
}
// pass-through nodes advance without a user action (start / automatic task / service task / script task / gateway / error boundary event)
function isPassThroughType(type) {
  return isAutomaticType(type) || isServiceTaskType(type) || isScriptTaskType(type) || isStartEventType(type) || isGatewayType(type) || isBoundaryEventType(type);
}
function applyTypeInvariants(node) {
  if (isEndEventType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
    node.condition = null;
  } else if (isAutomaticType(node.type) || isGatewayType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
    node.condition = null;
  } else if (isServiceTaskType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
    node.condition = null;
    node.service = normalizeService(node.service);
    node.assignments = [];
    delete node.scriptFormat;
    delete node.script;
  } else if (isScriptTaskType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
    node.condition = null;
    delete node.service;
    if (node.scriptFormat !== SCRIPT_FORMAT.JAVASCRIPT) node.scriptFormat = SCRIPT_FORMAT.NCALC;
    if (node.scriptFormat === SCRIPT_FORMAT.JAVASCRIPT) {
      node.assignments = [];
      node.script = typeof node.script === "string" ? node.script : "";
    } else {
      node.assignments = normalizeAssignments(node.assignments);
      node.script = null;
    }
  } else if (isStartEventType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = node.variables || [];
    node.condition = null;
  } else if (isBoundaryEventType(node.type)) {
    // A boundary event is attached to a service/script task; it carries only
    // attachedToRef and the optional errorVariable, nothing else.
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
    node.condition = null;
    delete node.service;
    node.assignments = [];
    delete node.scriptFormat;
    node.script = null;
    if (typeof node.attachedToRef !== "number") node.attachedToRef = null;
    if (typeof node.errorVariable !== "string" || !node.errorVariable.trim()) node.errorVariable = null;
  } else if (isUserTaskType(node.type)) {
    node.variables = node.variables || [];
    if (!CLAIM_MODE_OPTIONS.some(o => o.value === node.claimMode)) node.claimMode = CLAIM_MODE.FRESH;
    if (node.claimMode !== CLAIM_MODE.FROM_NODE) node.inheritClaimFromNodeId = null;
  }

  if (isSingleOutgoingType(node.type)) {
    const outgoing = outgoingFlows(node.id);
    if (outgoing.length > 1) {
      const keepId = outgoing[0].id;
      model.sequenceFlows = model.sequenceFlows.filter(f => f.sourceRef !== node.id || f.id === keepId);
    }
  }
}

/* ---------- Geometry ---------- */
// The render position of a node: boundary events are anchored to their host's
// border and move with the host, so their position is derived, not stored.
function nodePosition(node) {
  if (isBoundaryEventType(node.type)) {
    const host = getNode(node.attachedToRef);
    if (host) {
      const hs = nodeSize(host);
      return { x: host.x + hs.w - BOUNDARY_D / 2, y: host.y + hs.h - BOUNDARY_D / 2 };
    }
  }
  return { x: node.x, y: node.y };
}
function center(node) {
  const size = nodeSize(node);
  const pos = nodePosition(node);
  return { x: pos.x + size.w / 2, y: pos.y + size.h / 2 };
}

// intersection of line from shape center toward target point with shape border
function borderPoint(node, tx, ty) {
  const c = center(node);
  const dx = tx - c.x, dy = ty - c.y;
  if (dx === 0 && dy === 0) return c;
  if (isBoundaryEventType(node.type)) {
    const r = BOUNDARY_D / 2;
    const scale = r / Math.sqrt(dx * dx + dy * dy);
    return { x: c.x + dx * scale, y: c.y + dy * scale };
  }
  if (isEventType(node.type)) {
    const r = EVENT_D / 2;
    const scale = r / Math.sqrt(dx * dx + dy * dy);
    return { x: c.x + dx * scale, y: c.y + dy * scale };
  }
  if (isGatewayType(node.type)) {
    const hw = GATEWAY_D / 2, hh = GATEWAY_D / 2;
    // rhombus border: |dx|/hw + |dy|/hh = 1
    const t = 1 / (Math.abs(dx) / hw + Math.abs(dy) / hh);
    return { x: c.x + dx * t, y: c.y + dy * t };
  }
  const hw = NODE_W / 2, hh = NODE_H / 2;
  const scale = Math.min(
    hw / Math.abs(dx || 1e-9),
    hh / Math.abs(dy || 1e-9)
  );
  return { x: c.x + dx * scale, y: c.y + dy * scale };
}

function segmentsIntersect(p1, p2, q1, q2) {
  const dx1 = p2.x - p1.x;
  const dy1 = p2.y - p1.y;
  const dx2 = q2.x - q1.x;
  const dy2 = q2.y - q1.y;
  const det = dx1 * dy2 - dy1 * dx2;
  if (Math.abs(det) < 1e-9) return false;
  const dx3 = q1.x - p1.x;
  const dy3 = q1.y - p1.y;
  const lambda = (dx3 * dy2 - dy3 * dx2) / det;
  const gamma = (dx3 * dy1 - dy3 * dx1) / det;
  return (lambda >= 0 && lambda <= 1) && (gamma >= 0 && gamma <= 1);
}

function lineIntersectsNode(p1, p2, node) {
  if (isBoundaryEventType(node.type)) return false; // attached to host; not a routing obstacle
  const size = nodeSize(node);
  const x = node.x, y = node.y, w = size.w, h = size.h;
  const tl = { x, y };
  const tr = { x: x + w, y };
  const bl = { x, y: y + h };
  const br = { x: x + w, y: y + h };
  return segmentsIntersect(p1, p2, tl, tr) ||
         segmentsIntersect(p1, p2, tr, br) ||
         segmentsIntersect(p1, p2, bl, br) ||
         segmentsIntersect(p1, p2, tl, bl);
}

    if (isBoundaryEventType(node.type)) {

      const nameText = el("text", { x: h, y: d + 28, class: "event-name", "text-anchor": "middle", "font-weight": "600" });
      nameText.textContent = node.name;

    } else {

      const idText = el("text", { x: 10, y: 18, class: "nid" });

      const nameText = el("text", { x: NODE_W / 2, y: 42, "text-anchor": "middle", "font-weight": "600" });

      if (isServiceTaskType(node.type)) appendServiceMarker(g);
      if (isScriptTaskType(node.type)) appendScriptMarker(g);
    }

    if (isBoundaryEventType(node.type)) {
      // Boundary events are selectable but not independently draggable; they
      // move with their host. In connect mode they behave like any node: they
      // can be picked as a source (to draw the error flow) but are blocked as a
      // target inside handleConnectClick.
      g.addEventListener("pointerdown", (e) => {
        if (connectMode) { e.stopPropagation(); handleConnectClick(node); return; }
        e.stopPropagation();
        select('node', node.id);
      });
    } else {
      g.addEventListener("pointerdown", (e) => onNodePointerDown(e, node));
    }
    nodesG.appendChild(g);
  }
}

function renderEdges() {
  edgesG.innerHTML = "";
  for (const flow of model.sequenceFlows) {
    const source = getNode(flow.sourceRef);
    const target = getNode(flow.targetRef);
    if (!source || !target) continue;

    const dashed = isPassThroughType(source.type);
    const isError = isBoundaryEventType(source.type);
    const g = el("g", { class: `edge ${dashed ? "auto" : ""} ${isError ? "error" : ""} ${isSel('flow', flow.id) ? 'selected' : ''}`,
                        "data-flow": flow.id });
    let d, lx, ly;
    const size = nodeSize(source);
    if (source.id === target.id) {
      const x = source.x + size.w, y = source.y + size.h / 2;
      d = `M ${x} ${y} C ${x + 70} ${y - 50}, ${x + 70} ${y + 50}, ${x} ${y + 6}`;
      lx = x + 60; ly = y;
    } else {
      const p1_c = center(source);
      const p2_c = center(target);

      // Check if blocked by any intermediate node
      let isBlocked = false;
      for (const node of model.flowNodes) {
        if (node.id === source.id || node.id === target.id) continue;
        if (lineIntersectsNode(p1_c, p2_c, node)) {
          isBlocked = true;
          break;
        }
      }

      // Group flows between these two nodes
      const A = Math.min(source.id, target.id);
      const B = Math.max(source.id, target.id);
      const group = model.sequenceFlows.filter(f =>
        (f.sourceRef === A && f.targetRef === B) || (f.sourceRef === B && f.targetRef === A)
      ).sort((f1, f2) => f1.id - f2.id);

      const K = group.length;
      const idx = group.findIndex(f => f.id === flow.id);

      let h = 0;
      if (K > 1) {
        const canonicalOffset = (idx - (K - 1) / 2) * 30;
        const dirSign = (flow.sourceRef === A) ? 1 : -1;
        h = canonicalOffset * dirSign;
      }

      if (isBlocked) {
        const dx = p2_c.x - p1_c.x;
        const dy = p2_c.y - p1_c.y;
        let blockOffset = 0;
        if (Math.abs(dx) >= Math.abs(dy)) {
          const hSign = dx > 0 ? -1 : 1;
          blockOffset = hSign * 110;
        } else {
          const hSign = dy > 0 ? -1 : 1;
          blockOffset = hSign * 220;
        }
        h += blockOffset;
      }

      if (h === 0) {
        const p1 = borderPoint(source, p2_c.x, p2_c.y);
        const p2 = borderPoint(target, p1_c.x, p1_c.y);
        d = `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
        lx = (p1.x + p2.x) / 2; ly = (p1.y + p2.y) / 2;
      } else {
        // Calculate control point Pc
        const dx = p2_c.x - p1_c.x;
        const dy = p2_c.y - p1_c.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1e-9;
        const ux = dx / len;
        const uy = dy / len;
        const nx = -uy;
        const ny = ux;
        const mx = (p1_c.x + p2_c.x) / 2;
        const my = (p1_c.y + p2_c.y) / 2;
        const pc = { x: mx + h * nx, y: my + h * ny };

        const p1 = borderPoint(source, pc.x, pc.y);
        const p2 = borderPoint(target, pc.x, pc.y);

        d = `M ${p1.x} ${p1.y} Q ${pc.x} ${pc.y} ${p2.x} ${p2.y}`;
        // Midpoint of quadratic Bezier is at t = 0.5
        lx = 0.25 * p1.x + 0.5 * pc.x + 0.25 * p2.x;
        ly = 0.25 * p1.y + 0.5 * pc.y + 0.25 * p2.y;
      }
    }
    const sel = isSel('flow', flow.id);
    g.appendChild(el("path", { d, "marker-end": `url(#${sel ? 'arrowSel' : 'arrow'})` }));

    const label = flowLabel(flow, source);
    if (label) {
      const bg = el("rect", { class: "lblbg", x: lx - label.length * 3.6 - 4, y: ly - 16,
                              width: label.length * 7.2 + 8, height: 16, rx: 4 });
      g.appendChild(bg);
      const t = el("text", { x: lx, y: ly - 4, "text-anchor": "middle" });
      t.textContent = label;
      g.appendChild(t);
    }

    // secondary line: roles/condition/default for user-task and gateway flows
    const cond = flow.isDefault ? "default" : (flow.condition || "");
    const roles = roleSummary(flow.roles);
    if (isGatewayType(source.type)) {
      if (cond) {
        const cText = el("text", { x: lx, y: ly + 9, class: "cond", "text-anchor": "middle" });
        cText.textContent = cond.length > 24 ? cond.slice(0, 21) + "..." : cond;
        g.appendChild(cText);
      }
    } else if (isUserTaskType(source.type)) {
      let y = ly + 9;
      if (roles) {
        const roleText = el("text", { x: lx, y, class: "roles", "text-anchor": "middle" });
        roleText.textContent = roles;
        g.appendChild(roleText);
        y += 13;
      }
      if (cond) {
        const cText = el("text", { x: lx, y, class: "cond", "text-anchor": "middle" });
        cText.textContent = cond.length > 24 ? cond.slice(0, 21) + "..." : cond;
        g.appendChild(cText);
      }
    } else {
      if (roles) {
        const roleText = el("text", { x: lx, y: ly + 9, class: "roles", "text-anchor": "middle" });
        roleText.textContent = roles;
        g.appendChild(roleText);
      }
    }

    g.addEventListener("click", (e) => { e.stopPropagation(); select('flow', flow.id); });
    edgesG.appendChild(g);
  }
}

function flowLabel(flow, source) {
  if (flow.name && flow.name.trim()) return flow.name.trim();
  if (isBoundaryEventType(source.type)) return "error";
  if (isStartEventType(source.type)) return "start";
  if (isAutomaticType(source.type)) return "auto";
  if (isScriptTaskType(source.type)) return "script";
  return "";
}

function renderHint() {
  if (connectMode) {
    if (connectSource == null) {
      hintEl.innerHTML = "<b>Connect mode:</b> click the <b>source</b> node.";
    } else {
      const source = getNode(connectSource);
      const extra = source && isSingleOutgoingType(source.type)
        ? " This node type can have exactly one outgoing flow."
        : "";
      hintEl.innerHTML = "<b>Connect mode:</b> now click the <b>target</b> node." + extra;
    }
  } else {
    hintEl.innerHTML = "Drag nodes to move. Drag lanes to move grouped nodes. Click a node, lane, or flow arrow to edit it.";
  }
}

/* ---------- Inspector ---------- */

  inspector.innerHTML = "";

    inspector.innerHTML = `<h2>Workflow</h2>

    addInitialSelector();
    addProcessVariablesSection();
    return;

  if (selected.kind === 'lane') return renderLaneInspector();
  if (selected.kind === 'node') return renderNodeInspector();

function addInitialSelector() {
  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = `<label>Default start event</label>`;
  const sel = document.createElement("select");
  const startEvents = model.flowNodes.filter(s => isStartEventType(s.type));
  sel.innerHTML = `<option value="">— none —</option>` +
    startEvents.map(s => `<option value="${s.id}" ${model.initialEventId === s.id ? "selected" : ""}>#${s.id} ${s.name}</option>`).join("");
  sel.onchange = () => { model.initialEventId = sel.value ? +sel.value : null; render(); };
  f.appendChild(sel);
  inspector.appendChild(f);
}

function renderNodeInspector() {
  const node = getNode(selected.nodeId);
  if (!node) { selected = null; return renderInspector(); }
  applyTypeInvariants(node);
  inspector.innerHTML = `<h2>Node #${node.id}</h2>`;
  field("Name", "text", node.name, v => { node.name = v; renderNodes(); renderEdges(); });
  field("External ID", "text", node.externalId ?? "", v => { node.externalId = v.trim() ? v : null; });
  if (isBoundaryEventType(node.type)) {
    // Boundary events are created via a host's "+ Add error boundary event"
    // button, not the Type dropdown (the type is absent from NODE_TYPE_OPTIONS
    // by design). Show a read-only label so the field cannot be edited away.
    const typeField = document.createElement("div");
    typeField.className = "field";
    typeField.innerHTML = `<label>Type</label>`;
    const typeInput = document.createElement("input");
    typeInput.type = "text";
    typeInput.disabled = true;
    typeInput.value = typeLabel(node.type);
    typeField.appendChild(typeInput);
    inspector.appendChild(typeField);
  } else {
    selectField("Type", NODE_TYPE_OPTIONS, node.type, v => {
      node.type = v;
      applyTypeInvariants(node);
      // If a node stops being a service/script task, any attached error
      // boundary event is orphaned (its attachedToRef no longer points at a
      // valid host). Cascade-delete it (and its error flow) to keep the model
      // valid, mirroring the host-deletion cleanup in deleteNode.
      if (!isServiceTaskType(v) && !isScriptTaskType(v)) {
        const attached = model.flowNodes.filter(n => n.type === NODE_TYPE.ERROR_BOUNDARY_EVENT && n.attachedToRef === node.id);
        const boundaryIds = new Set(attached.map(n => n.id));
        if (boundaryIds.size > 0) {
          model.flowNodes = model.flowNodes.filter(n => !boundaryIds.has(n.id));
          model.sequenceFlows = model.sequenceFlows.filter(f =>
            !boundaryIds.has(f.sourceRef) && !boundaryIds.has(f.targetRef));
        }
      }
      render();
    });
  }
  selectField("Lane", [{ value: "", label: "— none —" }].concat(
    model.lanes.map(p => ({ value: p.id, label: `#${p.id} ${p.name}` }))
  ), node.laneId ?? "", v => {
    node.laneId = v ? +v : null;
    render();
  });

  if (isUserTaskType(node.type)) {
    rolesField(node, () => { renderNodes(); renderEdges(); });
    inspector.appendChild(
      variableCheckbox("Requires claim", node.requiresClaim, checked => {
        node.requiresClaim = checked;
        renderInspector();
      })
    );
    if (node.requiresClaim) {
      selectField("Claim mode", CLAIM_MODE_OPTIONS, node.claimMode || CLAIM_MODE.FRESH, v => {
        node.claimMode = v;
        if (v !== CLAIM_MODE.FROM_NODE) node.inheritClaimFromNodeId = null;
        renderInspector();
      });
      if (node.claimMode === CLAIM_MODE.FROM_NODE) {
        const sourceNodes = model.flowNodes.filter(n => isUserTaskType(n.type));
        const options = [{ value: "", label: "— select user task —" }].concat(
          sourceNodes.map(n => ({ value: n.id, label: `#${n.id} ${n.name}${n.id === node.id ? " (this task)" : ""}` }))
        );
        selectField("Inherit claim from", options, node.inheritClaimFromNodeId ?? "", v => {
          node.inheritClaimFromNodeId = v ? +v : null;
        });
      }
    }

    const condHint = document.createElement("p");
    condHint.className = "empty-note";
    condHint.textContent = "NCalc visibility gate. When the condition is false, this task is hidden from the inbox and its actions cannot be shown or taken. It does not affect routing.";
    inspector.appendChild(condHint);
    field("Condition", "text", node.condition ?? "", v => {
      node.condition = v.trim() ? v : null;
      renderNodes();
    });
  }

  if (isBoundaryEventType(node.type)) {
    const host = getNode(node.attachedToRef);
    const hostField = document.createElement("div");
    hostField.className = "field";
    hostField.innerHTML = `<label>Attached to</label>`;
    const hostInput = document.createElement("input");
    hostInput.type = "text";
    hostInput.disabled = true;
    hostInput.value = host ? `#${host.id} ${host.name}` : "(missing host)";
    hostField.appendChild(hostInput);
    inspector.appendChild(hostField);

    const bhint = document.createElement("p");
    bhint.className = "empty-note";
    bhint.textContent = "When the host task fails, the token exits through this boundary's single outgoing flow (the error path).";
    inspector.appendChild(bhint);

    field("Error variable (optional)", "text", node.errorVariable ?? "", v => {
      node.errorVariable = v.trim() ? v : null;
    });
  }

  if (isServiceTaskType(node.type)) {
    renderServiceSection(node);
  }

  if (isScriptTaskType(node.type)) {
    renderScriptSection(node);
  }

  if (isStartEventType(node.type)) {
    node.variables = node.variables || [];

    const variablesTitle = document.createElement("h2");
    variablesTitle.textContent = "Variables";
    variablesTitle.style.marginTop = "16px";
    inspector.appendChild(variablesTitle);

    const hint = document.createElement("p");
    hint.className = "empty-note";
    hint.textContent = "Variables on the start event are the data required to start the workflow.";
    inspector.appendChild(hint);

    if (node.variables.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No variables for this node.";
      inspector.appendChild(p);
    }
    node.variables.forEach(variable => variableRow(node, variable));

    const addVariableBtn = document.createElement("button");
    addVariableBtn.textContent = "+ Add variable";
    addVariableBtn.style.marginTop = "8px";
    addVariableBtn.onclick = () => addVariable(node);
    inspector.appendChild(addVariableBtn);
  }

  if (!isEndEventType(node.type)) {
    const flowsTitle = document.createElement("h2");
    flowsTitle.textContent = "Outgoing flows";
    flowsTitle.style.marginTop = "16px";
    inspector.appendChild(flowsTitle);

    const flows = outgoingFlows(node.id);
    if (flows.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No outgoing sequence flows. Use Connect Flow or the button below.";
      inspector.appendChild(p);
    }
    flows.forEach(flow => {
      const box = document.createElement("div");
      box.className = "field";
      box.style.cssText = "background:var(--panel-2);padding:8px;border-radius:6px;border:1px solid var(--border);cursor:pointer";
      const tgt = getNode(flow.targetRef);
      const extra = isGatewayType(node.type)
        ? (flow.isDefault ? " · default" : (flow.condition ? ` · [${flow.condition}]` : ""))
        : "";
      const name = flowLabel(flow, node) || "(unnamed)";
      box.innerHTML = `<div class="badge">flow #${flow.id} · ${name} → ${tgt ? '#' + tgt.id + ' ' + tgt.name : 'missing'}${extra}</div>`;
      box.onclick = () => select('flow', flow.id);
      inspector.appendChild(box);
    });

    if (isSingleOutgoingType(node.type) && flows.length >= 1) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "This node type can have exactly one outgoing sequence flow.";
      inspector.appendChild(p);
    } else {
      const addBtn = document.createElement("button");
      addBtn.textContent = "+ Add flow";
      addBtn.style.marginTop = "8px";
      addBtn.onclick = () => {
        const flow = createFlow(node.id, node.id);
        select('flow', flow.id);
      };
      inspector.appendChild(addBtn);
    }
  }

  const del = document.createElement("button");
  del.textContent = "Delete node";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => deleteNode(node.id);
  inspector.appendChild(del);
}

function renderScriptSection(node) {
  if (node.scriptFormat !== SCRIPT_FORMAT.JAVASCRIPT) node.scriptFormat = SCRIPT_FORMAT.NCALC;

  const title = document.createElement("h2");
  title.textContent = "Script";
  title.style.marginTop = "16px";
  inspector.appendChild(title);

  selectField("Format", SCRIPT_FORMAT_OPTIONS, node.scriptFormat, v => {
    node.scriptFormat = v;
    applyTypeInvariants(node);
    renderInspector();
  });

  if (node.scriptFormat === SCRIPT_FORMAT.JAVASCRIPT) {
    renderJavaScriptSection(node);
  } else {
    renderAssignmentsSection(node);
  }

  renderErrorBoundarySection(node);
}

// Renders the "Error boundary" sub-panel inside a service/script task
// inspector. A boundary event is the host's failure handler: when the task's
// runtime call fails, the token routes out the boundary's single error flow
// instead of failing the transition. Without a boundary, a failure rolls back.
function renderErrorBoundarySection(hostNode) {
  const title = document.createElement("h2");
  title.textContent = "Error boundary";
  title.style.marginTop = "16px";
  inspector.appendChild(title);

  const hint = document.createElement("p");
  hint.className = "empty-note";
  hint.textContent = "When this task fails (HTTP error / timeout / script error), route the token out an error path instead of rolling back. Attach an error boundary event, then draw its single outgoing flow.";
  inspector.appendChild(hint);

  const existing = findErrorBoundary(hostNode.id);
  if (existing) {
    const box = document.createElement("div");
    box.className = "field";
    box.style.cssText = "background:var(--panel-2);padding:8px;border-radius:6px;border:1px solid var(--border);cursor:pointer";
    const out = outgoingFlows(existing.id);
    const tgt = out.length ? getNode(out[0].targetRef) : null;
    box.innerHTML = `<div class="badge">boundary #${existing.id} · error → ${tgt ? '#' + tgt.id + ' ' + tgt.name : 'no flow yet'}</div>`;
    box.onclick = () => select('node', existing.id);
    inspector.appendChild(box);

    const delBtn = document.createElement("button");
    delBtn.textContent = "Remove error boundary event";
    delBtn.className = "danger";
    delBtn.style.width = "100%";
    delBtn.style.marginTop = "8px";
    delBtn.onclick = () => deleteNode(existing.id);
    inspector.appendChild(delBtn);
  } else {
    const addBtn = document.createElement("button");
    addBtn.textContent = "+ Add error boundary event";
    addBtn.style.width = "100%";
    addBtn.style.marginTop = "8px";
    addBtn.onclick = () => addErrorBoundary(hostNode);
    inspector.appendChild(addBtn);
  }
}

// Creates an errorBoundaryEvent attached to a host service/script task and
// immediately enters connect mode from it so the user can draw the error path.
function addErrorBoundary(hostNode) {
  const boundary = {
    id: nextNodeId(),
    name: hostNode.name ? `${hostNode.name} error` : "Error",
    externalId: null,
    type: NODE_TYPE.ERROR_BOUNDARY_EVENT,
    laneId: hostNode.laneId ?? null,
    x: hostNode.x,
    y: hostNode.y,
    roles: [],
    requiresClaim: false,
    claimMode: CLAIM_MODE.FRESH,
    inheritClaimFromNodeId: null,
    variables: [],
    condition: null,
    attachedToRef: hostNode.id,
    errorVariable: null
  };
  model.flowNodes.push(boundary);
  applyTypeInvariants(boundary);
  select('node', boundary.id);
  setConnectMode(true);
  connectSource = boundary.id;
  renderHint();
  render();
}

function renderAssignmentsSection(node) {
  node.assignments = normalizeAssignments(node.assignments);

  const hint = document.createElement("p");
  hint.className = "empty-note";
  hint.textContent = "Sets process variables during the pass-through hop. Each expression is NCalc and may read other variables (including earlier assignments in this same list) and sys.*/config.* context (use [sys.user] bracket syntax for dotted names). Evaluated in order, coerced to the target's data type.";
  inspector.appendChild(hint);

  const declared = (model.variables || []).filter(v => v.name && v.name.trim());
  if (declared.length === 0) {
    const p = document.createElement("p");
    p.className = "empty-note";
    p.textContent = "No process variables declared. Deselect everything and add them under the Workflow panel first.";
    inspector.appendChild(p);
  }

  node.assignments.forEach((assignment, index) => {
    const box = document.createElement("div");
    box.className = "field";
    box.style.cssText = "background:var(--panel-2);padding:8px;border-radius:6px;border:1px solid var(--border)";

    const varField = document.createElement("div");
    varField.className = "field";
    varField.innerHTML = "<label>Variable</label>";
    const varSelect = document.createElement("select");
    const opts = [{ value: "", label: "— select process variable —" }].concat(
      declared.map(v => ({ value: v.name, label: `${v.name} (${v.dataType}${v.isArray ? "[]" : ""})` }))
    );
    varSelect.innerHTML = opts.map(o => `<option value="${o.value}" ${o.value === assignment.variable ? "selected" : ""}>${o.label}</option>`).join("");
    varSelect.onchange = () => { assignment.variable = varSelect.value; };
    varField.appendChild(varSelect);
    box.appendChild(varField);

    const exprField = document.createElement("div");
    exprField.className = "field";
    exprField.innerHTML = "<label>Expression (NCalc)</label>";
    const exprInput = document.createElement("input");
    exprInput.type = "text";
    exprInput.value = assignment.expression;
    exprInput.placeholder = "e.g. amount * 1.1, retryCount + 1, [sys.now]";
    exprInput.oninput = () => { assignment.expression = exprInput.value; };
    exprField.appendChild(exprInput);
    box.appendChild(exprField);

    const del = document.createElement("button");
    del.textContent = "Delete assignment";
    del.className = "danger";
    del.style.width = "100%";
    del.onclick = () => { node.assignments.splice(index, 1); renderInspector(); };
    box.appendChild(del);

    inspector.appendChild(box);
  });

  const addBtn = document.createElement("button");
  addBtn.textContent = "+ Add assignment";
  addBtn.style.marginTop = "8px";
  addBtn.onclick = () => { node.assignments.push({ variable: "", expression: "" }); renderInspector(); };
  inspector.appendChild(addBtn);

/* ---------- JavaScript Code Editor Modal ---------- */
let editingScriptNodeId = null;

function getAllAvailableVariables() {
  const varsMap = new Map();
  
  // 1. Process variables (writeable)
  if (model.variables) {
    model.variables.forEach(v => {
      if (v.name && v.name.trim()) {
        varsMap.set(v.name.trim(), {
          name: v.name.trim(),
          dataType: v.dataType || "string",
          isArray: !!v.isArray,
          isProcessVar: true,
          source: "Process"
        });
      }
    });
  }
  
  // 2. Node-level variables (inputs)
  if (model.flowNodes) {
    model.flowNodes.forEach(node => {
      if (node.variables) {
        node.variables.forEach(v => {
          if (v.name && v.name.trim()) {
            const name = v.name.trim();
            if (!varsMap.has(name)) {
              varsMap.set(name, {
                name: name,
                dataType: v.dataType || "string",
                isArray: !!v.isArray,
                isProcessVar: false,
                source: `Node: ${node.name || '#' + node.id}`
              });
            }
          }
        });
      }
    });
  }
  
  // 3. Sequence flow variables (inputs)
  if (model.sequenceFlows) {
    model.sequenceFlows.forEach(flow => {
      if (flow.variables) {
        flow.variables.forEach(v => {
          if (v.name && v.name.trim()) {
            const name = v.name.trim();
            if (!varsMap.has(name)) {
              varsMap.set(name, {
                name: name,
                dataType: v.dataType || "string",
                isArray: !!v.isArray,
                isProcessVar: false,
                source: `Flow: ${flow.name || '#' + flow.id}`
              });
            }
          }
        });
      }
    });
  }
  
  return Array.from(varsMap.values()).sort((a, b) => a.name.localeCompare(b.name));
}

function openJsEditor(nodeId) {
  const node = getNode(nodeId);
  if (!node) return;
  editingScriptNodeId = nodeId;
  
  const modal = document.getElementById("js-editor-modal");
  const title = document.getElementById("js-editor-title");
  const textarea = document.getElementById("js-editor-textarea");
