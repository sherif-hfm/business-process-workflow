  inspector.appendChild(addMappingBtn);

}

function renderScriptSection(node) {
  if (node.scriptFormat !== SCRIPT_FORMAT.JAVASCRIPT) node.scriptFormat = SCRIPT_FORMAT.NCALC;

  const title = document.createElement("h2");
  title.textContent = "Script";
  title.style.marginTop = "16px";
  inspector.appendChild(title);

  selectField("Format", SCRIPT_FORMAT_OPTIONS, node.scriptFormat, v => {
    node.scriptFormat = v;
    applyTypeInvariants(node);
    renderInspector();
  });

  if (node.scriptFormat === SCRIPT_FORMAT.JAVASCRIPT) {
    renderJavaScriptSection(node);
  } else {
    renderAssignmentsSection(node);
  }

  renderErrorBoundarySection(node);
}

// Renders the "Error boundary" sub-panel inside a service/script task
// inspector. A boundary event is the host's failure handler: when the task's
// runtime call fails, the token routes out the boundary's single error flow
// instead of failing the transition. Without a boundary, a failure rolls back.
function renderErrorBoundarySection(hostNode) {
  const title = document.createElement("h2");
  title.textContent = "Error boundary";
  title.style.marginTop = "16px";
  inspector.appendChild(title);

  const hint = document.createElement("p");
  hint.className = "empty-note";
  hint.textContent = "When this task fails (HTTP error / timeout / script error), route the token out an error path instead of rolling back. Attach an error boundary event, then draw its single outgoing flow.";
  inspector.appendChild(hint);

  const existing = findErrorBoundary(hostNode.id);
  if (existing) {
    const box = document.createElement("div");
    box.className = "field inspector-card clickable";
    const out = outgoingFlows(existing.id);
    const tgt = out.length ? getNode(out[0].targetRef) : null;
    box.innerHTML = `<div class="badge">boundary #${existing.id} · error → ${tgt ? '#' + tgt.id + ' ' + tgt.name : 'no flow yet'}</div>`;
    box.onclick = () => select('node', existing.id);
    inspector.appendChild(box);

    const delBtn = document.createElement("button");
    delBtn.textContent = "Remove error boundary event";
    delBtn.className = "danger";
    delBtn.style.width = "100%";
    delBtn.style.marginTop = "8px";
    delBtn.onclick = () => deleteNode(existing.id);
    inspector.appendChild(delBtn);
  } else {
    const addBtn = document.createElement("button");
    addBtn.textContent = "+ Add error boundary event";
    addBtn.style.width = "100%";
    addBtn.style.marginTop = "8px";
    addBtn.onclick = () => addErrorBoundary(hostNode);
    inspector.appendChild(addBtn);
  }
}

// Creates an errorBoundaryEvent attached to a host service/script task and
// immediately enters connect mode from it so the user can draw the error path.
function addErrorBoundary(hostNode) {
  const boundary = {
    id: nextNodeId(),
    name: hostNode.name ? `${hostNode.name} error` : "Error",
    externalId: null,
    type: NODE_TYPE.ERROR_BOUNDARY_EVENT,
    laneId: hostNode.laneId ?? null,
    x: hostNode.x,
    y: hostNode.y,
    roles: [],
    requiresClaim: false,
    claimMode: CLAIM_MODE.FRESH,
    inheritClaimFromNodeId: null,
    variables: [],
    assignee: null,
    attachedToRef: hostNode.id,
    errorVariable: null
  };
  model.flowNodes.push(boundary);
  applyTypeInvariants(boundary);
  select('node', boundary.id);
  setConnectMode(true);
  connectSource = boundary.id;
  renderHint();
  render();
}

function renderAssignmentsSection(node) {

  const hint = document.createElement("p");

  hint.textContent = "Sets process variables during the pass-through hop. Each expression is NCalc and may read other variables (including earlier assignments in this same list) and sys.*/config.* context (use [sys.user] bracket syntax for dotted names). Evaluated in order, coerced to the target's data type.";
  inspector.appendChild(hint);

  const declared = (model.variables || []).filter(v => v.name && v.name.trim());

  const addBtn = document.createElement("button");

let editingScriptNodeId = null;

function getAllAvailableVariables() {
  const varsMap = new Map();
  
  // 1. Process variables (writeable)
  if (model.variables) {
    model.variables.forEach(v => {
      if (v.name && v.name.trim()) {
        varsMap.set(v.name.trim(), {
          name: v.name.trim(),
          dataType: v.dataType || "string",
          isArray: !!v.isArray,
          isProcessVar: true,
          source: "Process"
        });
      }
    });
  }
  
  // 2. Node-level variables (inputs)
  if (model.flowNodes) {
    model.flowNodes.forEach(node => {
      if (node.variables) {
        node.variables.forEach(v => {
          if (v.name && v.name.trim()) {
            const name = v.name.trim();
            if (!varsMap.has(name)) {
              varsMap.set(name, {
                name: name,
                dataType: v.dataType || "string",
                isArray: !!v.isArray,
                isProcessVar: false,
                source: `Node: ${node.name || '#' + node.id}`
              });
            }
          }
        });
      }
      if (isMessageStartEventType(node.type) && node.message) {
        (node.message.outputMappings || []).forEach(mapping => {
          const name = String(mapping.variable || "").trim();
          if (name && !varsMap.has(name)) {
            varsMap.set(name, {
              name,
              dataType: mapping.dataType || "json",
              isArray: !!mapping.isArray,
              isProcessVar: false,
              source: `Message start: ${node.name || '#' + node.id}`
            });
          }
        });
        const idempotencyName = String(node.idempotency && node.idempotency.variable || "").trim();
        if (idempotencyName && !varsMap.has(idempotencyName)) {
          varsMap.set(idempotencyName, {
            name: idempotencyName,
            dataType: "string",
            isArray: false,
            isProcessVar: false,
            source: `Message start idempotency: ${node.name || '#' + node.id}`
          });
        }
      }
    });
  }
  
  // 3. Sequence flow variables (inputs)
  if (model.sequenceFlows) {
    model.sequenceFlows.forEach(flow => {
      if (flow.variables) {
        flow.variables.forEach(v => {
          if (v.name && v.name.trim()) {
            const name = v.name.trim();
            if (!varsMap.has(name)) {
              varsMap.set(name, {
                name: name,
                dataType: v.dataType || "string",
                isArray: !!v.isArray,
                isProcessVar: false,
                source: `Flow: ${flow.name || '#' + flow.id}`
              });
            }
          }
        });
      }
    });
  }
  
  return Array.from(varsMap.values()).sort((a, b) => a.name.localeCompare(b.name));
}

function closeJsEditor() {
  const modal = document.getElementById("js-editor-modal");
  const textarea = document.getElementById("js-editor-textarea");
  const node = getNode(editingScriptNodeId);
  
  if (node && textarea.value !== (node.script || "")) {
    if (!confirm("Discard unsaved changes?")) {
      return;
    }
  }
  
  modal.style.display = "none";
  editingScriptNodeId = null;
}

function saveJsEditor() {
  if (editingScriptNodeId !== null) {
    const node = getNode(editingScriptNodeId);
    if (node) {
      const textarea = document.getElementById("js-editor-textarea");
      node.script = textarea.value;
      renderInspector();
    }
  }
  
  const modal = document.getElementById("js-editor-modal");
  modal.style.display = "none";
  editingScriptNodeId = null;
}

function insertAtCursor(textarea, text) {
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const val = textarea.value;
  textarea.value = val.substring(0, start) + text + val.substring(end);
  textarea.selectionStart = textarea.selectionEnd = start + text.length;
  textarea.focus();
}

// Bind keyboard shortcuts to the modal textarea
document.getElementById("js-editor-textarea").addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closeJsEditor();
    e.preventDefault();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === "s") {
    saveJsEditor();
    e.preventDefault();
  }
});

function renderLaneInspector() {
  const lane = getLane(selected.laneId);
  if (!lane) { selected = null; return renderInspector(); }
  const nodeCount = model.flowNodes.filter(s => s.laneId === lane.id).length;
  inspector.innerHTML = `<h2>Lane #${lane.id}</h2>
    <p class="badge" style="margin-top:-6px">${nodeCount} node${nodeCount === 1 ? "" : "s"} in this lane</p>`;
  field("Name", "text", lane.name, v => { lane.name = v; renderLanes(); });
  field("External ID", "text", lane.externalId ?? "", v => { lane.externalId = v.trim() ? v : null; });
  field("Width", "number", lane.w, v => {
    lane.w = Math.max(MIN_LANE_W, Math.round(+v || MIN_LANE_W));
    renderLanes();
  });
  field("Height", "number", lane.h, v => {
    lane.h = Math.max(MIN_LANE_H, Math.round(+v || MIN_LANE_H));
    renderLanes();
  });

  const del = document.createElement("button");
  del.textContent = "Delete lane";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => deleteLane(lane.id);
  inspector.appendChild(del);
}

function renderFlowInspector() {
  const flow = getFlow(selected.flowId);
  if (!flow) { selected = null; return renderInspector(); }
  const source = getNode(flow.sourceRef);
  flow.variables = flow.variables || [];
  const gateway = source && isGatewayType(source.type);
  const isUserTaskFlow = source && source.type === NODE_TYPE.USER_TASK;
  inspector.innerHTML = `<h2>Flow #${flow.id}</h2>
    <p class="badge" style="margin-top:-6px">From node #${flow.sourceRef}${source ? ' (' + source.name + ')' : ''}</p>`;
  field("Name", "text", flow.name, v => { flow.name = v; renderEdges(); });
  field("External ID", "text", flow.externalId ?? "", v => { flow.externalId = v.trim() ? v : null; });
  selectField("Goes to node", model.flowNodes.map(s => ({ value: s.id, label: `#${s.id} ${s.name}` })),
              flow.targetRef, v => { flow.targetRef = +v; renderEdges(); });

  if (gateway) {
    field("Condition", "text", flow.condition ?? "", v => {
      flow.condition = v.trim() ? v : null;
      renderEdges();
    });
    const condHint = document.createElement("p");
    condHint.className = "empty-note";
    condHint.textContent = 'NCalc expression, e.g. amount > 1000 and region == \'EU\', or a bare variable like approved. Helper functions: Len(s), IsNullOrEmpty(s), Contains(s, sub), StartsWith(s, p), EndsWith(s, p), Lower(s), Upper(s), Trim(s), IsMatch(s, pattern). Leave empty for the default flow.';
    inspector.appendChild(condHint);
    inspector.appendChild(
      variableCheckbox("Default flow", flow.isDefault, checked => {
        flow.isDefault = checked;
        if (checked) {
          flow.condition = null;
          // only one default per gateway
          outgoingFlows(flow.sourceRef).forEach(f => { if (f.id !== flow.id) f.isDefault = false; });
        }
        renderInspector();
        renderEdges();
      })
    );
  } else {
    if (isUserTaskFlow) {
      if (source.multiInstance) {
        inspector.appendChild(variableCheckbox("Default fallback", !!flow.isDefault, checked => {
          flow.isDefault = checked;
          if (checked) {
            flow.isSelectable = false;
            flow.roles = [];
            flow.variables = [];
            flow.condition = null;
            flow.canActWithoutClaim = false;
            flow.cancelRemainingInstances = false;
            flow.completionCondition = null;
            flow.completionPriority = null;
            // only one default per multi-instance user task
            outgoingFlows(flow.sourceRef).forEach(f => { if (f.id !== flow.id) f.isDefault = false; });
          }
          applyFlowInvariants(flow);
          renderInspector();
          renderEdges();
        }));
      }
      if (source.multiInstance && !flow.isDefault) {
        inspector.appendChild(variableCheckbox("Available as user action", flow.isSelectable !== false, checked => {
          flow.isSelectable = checked;
          if (!checked) {
            flow.roles = [];
            flow.variables = [];
            flow.condition = null;
            flow.canActWithoutClaim = false;
            flow.cancelRemainingInstances = false;
          }
          renderInspector();
          renderEdges();
        }));
      }
      if (flow.isSelectable !== false && !flow.isDefault) {
        rolesField(flow, () => renderEdges());
        const rolesHint = document.createElement("p");
        rolesHint.className = "empty-note";
        rolesHint.textContent = 'Roles restrict who can take this specific action (enforced at runtime on top of the task\'s own roles). Empty = anyone who can act on the task.';
        inspector.appendChild(rolesHint);
        field("Condition", "text", flow.condition ?? "", v => {
          flow.condition = v.trim() ? v : null;
          if (flow.condition && flow.isDefault) flow.isDefault = false;
          renderEdges();
        });
        const condHint = document.createElement("p");
        condHint.className = "empty-note";
        condHint.textContent = 'NCalc expression evaluated at runtime. Leave empty to always show this action.';
        inspector.appendChild(condHint);
      } else {
        const engineHint = document.createElement("p");
        engineHint.className = "empty-note";
        engineHint.textContent = flow.isDefault
          ? "Engine-only default: taken only after all items complete and no completion condition wins."
          : "Engine-only: hidden from user actions and selectable only by aggregate completion routing.";
        inspector.appendChild(engineHint);
      }
      if (source.multiInstance && !flow.isDefault) {
        inspector.appendChild(variableCheckbox("Interrupt and cancel remaining items", !!flow.cancelRemainingInstances, checked => {
          flow.cancelRemainingInstances = checked;
          if (checked) {
            flow.isSelectable = true;
            flow.isDefault = false;
            flow.completionCondition = null;
            flow.completionPriority = null;
          }
          renderInspector();
          renderEdges();
        }));
        if (!flow.cancelRemainingInstances) {
          field("Completion priority", "number", flow.completionPriority ?? "", v => {
            flow.completionPriority = v ? Math.max(1, Math.round(+v)) : null;
          });
          field("Completion condition", "text", flow.completionCondition ?? "", v => {
            flow.completionCondition = v.trim() ? v : null;
          });
          const completionHint = document.createElement("p");
          completionHint.className = "empty-note";
          const timing = source.multiInstance.completionEvaluation === "afterAll"
            ? "Evaluated only after all items complete."
            : "Evaluated after each item completes.";
          completionHint.textContent = `${timing} Example: CountFlow(201) >= 3 or PercentFlow(201) >= 60.`;
          inspector.appendChild(completionHint);
        }
      }
      if (source && source.requiresClaim && flow.isSelectable !== false) {
        inspector.appendChild(
          variableCheckbox("Can act without claim", flow.canActWithoutClaim, checked => {
            flow.canActWithoutClaim = checked;
            renderInspector();
          })
        );
      }
    }
  }

  const variablesTitle = document.createElement("h2");
  variablesTitle.textContent = "Variables";
  variablesTitle.style.marginTop = "16px";
  inspector.appendChild(variablesTitle);

  if (gateway) {
    const p = document.createElement("p");
    p.className = "empty-note";
    p.textContent = "Gateway flows route automatically by condition and do not capture variables.";
    inspector.appendChild(p);
  } else if (!isUserTaskFlow) {
    const p = document.createElement("p");
    p.className = "empty-note";
    p.textContent = "Variables are only captured on flows leaving a user task.";
    inspector.appendChild(p);
  } else if (flow.isSelectable === false) {
    const p = document.createElement("p");
    p.className = "empty-note";
    p.textContent = "Engine-only flows do not capture user-submitted variables.";
    inspector.appendChild(p);
  } else {
    if (flow.variables.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No variables for this flow.";
      inspector.appendChild(p);
    }
    flow.variables.forEach(variable => variableRow(flow, variable));

    const addVariableBtn = document.createElement("button");
    addVariableBtn.textContent = "+ Add variable";
    addVariableBtn.style.marginTop = "8px";
    addVariableBtn.onclick = () => addVariable(flow);
    inspector.appendChild(addVariableBtn);
  }

  const del = document.createElement("button");
  del.textContent = "Delete flow";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => {
    model.sequenceFlows = model.sequenceFlows.filter(f => f.id !== flow.id);
    select('node', flow.sourceRef);
  };
  inspector.appendChild(del);
}

function rolesFieldGeneric(owner, key, label, onChange) {

function addVariable(owner) {
  owner.variables = owner.variables || [];
  owner.variables.push({
    id: nextVariableId(owner),
    name: "variable",
    dataType: "string",
    isArray: false,
    required: false,
    defaultValue: null,
    validation: null
  });
  renderInspector();
}
function defaultValueToText(value) {
  if (value === null || value === undefined) return "";
  if (Array.isArray(value)) return value.some(v => typeof v === "object") ? JSON.stringify(value) : value.join(", ");
  if (typeof value === "object") return JSON.stringify(value);
  return String(value);
}
function coerceDefaultScalar(text, dataType) {
  const t = text.trim();
  if (t === "") return null;
  // Keep ${...} templates as raw strings; the engine substitutes and coerces them.
  if (t.includes("${")) return t;
  if (dataType === "number") { const n = Number(t); return Number.isNaN(n) ? t : n; }
  if (dataType === "boolean") return /^(true|1|yes)$/i.test(t);
  if (dataType === "json") {
    try { return JSON.parse(t); } catch { return t; }
  }
  return t;
}
function parseDefaultValue(text, variable) {
  if ((text ?? "").trim() === "") return null;
  if (variable.dataType === "json") return coerceDefaultScalar(text, "json");
  if (variable.isArray) {
    const items = text.split(",").map(s => coerceDefaultScalar(s, variable.dataType)).filter(v => v !== null);
    return items.length ? items : null;
  }
  return coerceDefaultScalar(text, variable.dataType);
}

/* ---------- Canvas viewport ---------- */
function clampZoom(value) {
  return Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, value));
}

function canvasDimensions() {
  const rect = canvasWrap.getBoundingClientRect();
  return { rect, width: Math.max(1, rect.width), height: Math.max(1, rect.height) };
}

function applyViewBox() {
  const { width, height } = canvasDimensions();
  const viewWidth = width / viewState.zoom;
  const viewHeight = height / viewState.zoom;
  svg.setAttribute("viewBox", `${viewState.x} ${viewState.y} ${viewWidth} ${viewHeight}`);
  zoomResetBtn.textContent = `${Math.round(viewState.zoom * 100)}%`;
  zoomOutBtn.disabled = viewState.zoom <= ZOOM_MIN + .001;
  zoomInBtn.disabled = viewState.zoom >= ZOOM_MAX - .001;
}

function zoomTo(nextZoom, clientX, clientY) {
  const { rect, width, height } = canvasDimensions();
  const relX = ((clientX ?? rect.left + width / 2) - rect.left) / width;
  const relY = ((clientY ?? rect.top + height / 2) - rect.top) / height;
  const worldX = viewState.x + relX * width / viewState.zoom;
  const worldY = viewState.y + relY * height / viewState.zoom;
  viewState.zoom = clampZoom(nextZoom);
  viewState.x = worldX - relX * width / viewState.zoom;
  viewState.y = worldY - relY * height / viewState.zoom;
  applyViewBox();
}

function resetViewport() {
  viewState = { x: 0, y: 0, zoom: 1 };
  applyViewBox();
}

function fitView() {
  const layers = [lanesG, edgesG, nodesG].filter(layer => layer.childElementCount > 0);
  if (!layers.length) { resetViewport(); return; }
  let left = Infinity, top = Infinity, right = -Infinity, bottom = -Infinity;
  for (const layer of layers) {
    try {
      const bounds = layer.getBBox();
      if (!Number.isFinite(bounds.x) || !Number.isFinite(bounds.y)) continue;
      left = Math.min(left, bounds.x);
      top = Math.min(top, bounds.y);
      right = Math.max(right, bounds.x + bounds.width);
      bottom = Math.max(bottom, bounds.y + bounds.height);
    } catch (err) {}
  }
  if (!Number.isFinite(left)) { resetViewport(); return; }
  const padding = 64;
  const contentWidth = Math.max(1, right - left + padding * 2);
  const contentHeight = Math.max(1, bottom - top + padding * 2);
  const { width, height } = canvasDimensions();
  viewState.zoom = clampZoom(Math.min(width / contentWidth, height / contentHeight));
  viewState.x = (left + right) / 2 - width / viewState.zoom / 2;
  viewState.y = (top + bottom) / 2 - height / viewState.zoom / 2;
  applyViewBox();
}

function startCanvasPan(e, clearOnClick) {
  if (canvasPan) return;
  e.preventDefault();
  canvasPan = {
    pointerId: e.pointerId,
    lastX: e.clientX,
    lastY: e.clientY,
    moved: false,
    clearOnClick
  };
  svg.classList.add("canvas-panning");
  svg.setPointerCapture(e.pointerId);
}

function moveCanvasPan(e) {
  if (!canvasPan || canvasPan.pointerId !== e.pointerId) return false;
  const dx = e.clientX - canvasPan.lastX;
  const dy = e.clientY - canvasPan.lastY;
  if (Math.abs(dx) + Math.abs(dy) > 1) canvasPan.moved = true;
  viewState.x -= dx / viewState.zoom;
  viewState.y -= dy / viewState.zoom;
  canvasPan.lastX = e.clientX;
  canvasPan.lastY = e.clientY;
  applyViewBox();
  return true;
}

function finishCanvasPan(e) {
  if (!canvasPan || (e.pointerId != null && canvasPan.pointerId !== e.pointerId)) return false;
  const completedPan = canvasPan;
  canvasPan = null;
  svg.classList.remove("canvas-panning");
  try { svg.releasePointerCapture(completedPan.pointerId); } catch (err) {}
  if (completedPan.moved) suppressCanvasClick = true;
  else if (completedPan.clearOnClick && !connectMode) clearSelection();
  return true;
}

/* ---------- Selection ---------- */
function isSel(kind, id) {
  if (!selected || selected.kind !== kind) return false;
  if (kind === 'lane') return selected.laneId === id;
  if (kind === 'node') return selected.nodeId === id;
  return selected.flowId === id;
}
function select(kind, id) {
  if (kind === 'lane') selected = { kind, laneId: id };
  else if (kind === 'node') selected = { kind, nodeId: id };
  else selected = { kind, flowId: id };
  render();
}
function clearSelection() { selected = null; render(); }

/* ---------- Node interaction ---------- */
function connectionSourceProblem(node) {
  if (!node) return "The source node no longer exists.";
  if (isEndEventType(node.type)) return "An end event cannot have an outgoing sequence flow.";
  if (isSingleOutgoingType(node.type) && outgoingFlows(node.id).length >= 1) {
    return "This node type can have exactly one outgoing flow.";
  }
  return "";
}

function connectionTargetProblem(node) {
  if (!node) return "Drop the connection on a target node.";
  if (isBoundaryEventType(node.type)) return "An error boundary event cannot have an incoming sequence flow.";
  return "";
}

function connectionProblem(source, target) {
  return connectionSourceProblem(source) || connectionTargetProblem(target);
}

function activeConnectionSource() {
  if (connectionDrag) return getNode(connectionDrag.sourceId);
  return connectMode && connectSource != null ? getNode(connectSource) : null;
}

function connectionPointForSide(node, side) {
  const pos = nodePosition(node);
  const size = nodeSize(node);
  if (side === "top") return { x: pos.x + size.w / 2, y: pos.y };
  if (side === "right") return { x: pos.x + size.w, y: pos.y + size.h / 2 };
  if (side === "bottom") return { x: pos.x + size.w / 2, y: pos.y + size.h };
  return { x: pos.x, y: pos.y + size.h / 2 };
}

function connectionSideVector(side) {
  if (side === "top") return { x: 0, y: -1 };
  if (side === "right") return { x: 1, y: 0 };
  if (side === "bottom") return { x: 0, y: 1 };
  return { x: -1, y: 0 };
}

function pointHitsNode(point, node) {
  const pos = nodePosition(node);
  const size = nodeSize(node);
  const localX = point.x - pos.x;
  const localY = point.y - pos.y;
  const padding = 9;
  if (isEventType(node.type) || isBoundaryEventType(node.type)) {
    const radius = size.w / 2 + padding;
    const dx = localX - size.w / 2;
    const dy = localY - size.h / 2;
    return dx * dx + dy * dy <= radius * radius;
  }
  if (isGatewayType(node.type)) {
    return Math.abs(localX - size.w / 2) / (size.w / 2 + padding) +
           Math.abs(localY - size.h / 2) / (size.h / 2 + padding) <= 1;
  }
  return localX >= -padding && localX <= size.w + padding &&
         localY >= -padding && localY <= size.h + padding;
}

function nodeAtConnectionPoint(point) {
  return [...model.flowNodes].reverse().find(node => pointHitsNode(point, node)) || null;
}

function updateConnectionVisualState() {
  const source = activeConnectionSource();
  const hoveredId = connectionDrag?.hoverTargetId ?? null;
  const invalidId = connectionDrag?.invalidTargetId ?? null;
  nodesG.classList.toggle("connection-active", !!source);
  nodesG.querySelectorAll(".node").forEach(group => {
    const id = group.getAttribute("data-id");
    const node = model.flowNodes.find(item => String(item.id) === id);
    const isSource = !!source && node?.id === source.id;
    const available = !!source && !!node && node.id !== source.id && !connectionProblem(source, node);
    group.classList.toggle("connect-source", isSource);
    group.classList.toggle("connect-target-available", available);
    group.classList.toggle("connect-target-hover", !!node && node.id === hoveredId);
    group.classList.toggle("connect-target-invalid", !!node && node.id === invalidId);
  });
}

function renderConnectionPreview() {
  connectionPreviewG.innerHTML = "";
  connectionPreviewG.classList.remove("invalid");
  if (!connectionDrag?.moved) return;
  const source = getNode(connectionDrag.sourceId);
  if (!source) return;
  const start = connectionPointForSide(source, connectionDrag.side);
  const startDirection = connectionSideVector(connectionDrag.side);
  const target = connectionDrag.hoverTargetId != null ? getNode(connectionDrag.hoverTargetId) : null;
  let end = connectionDrag.current;
  let control1 = { x: start.x + startDirection.x * 68, y: start.y + startDirection.y * 68 };
  let control2;

  if (target && target.id === source.id) {
    const nextSide = { top: "right", right: "bottom", bottom: "left", left: "top" }[connectionDrag.side];
    end = connectionPointForSide(source, nextSide);
    const endDirection = connectionSideVector(nextSide);
    control2 = { x: end.x + endDirection.x * 68, y: end.y + endDirection.y * 68 };
    end = pullPointToward(end, control2, 5);
  } else if (target) {
    const targetCenter = center(target);
    const border = borderPoint(target, start.x, start.y);
    const outwardX = border.x - targetCenter.x;
    const outwardY = border.y - targetCenter.y;
    const outwardLength = Math.sqrt(outwardX * outwardX + outwardY * outwardY) || 1;
    end = pullPointToward(border, start, 5);
    control2 = {
      x: end.x + outwardX / outwardLength * 54,
      y: end.y + outwardY / outwardLength * 54
    };
  } else {
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const length = Math.sqrt(dx * dx + dy * dy) || 1;
    control2 = { x: end.x - dx / length * 48, y: end.y - dy / length * 48 };
  }

  const invalid = connectionDrag.invalidTargetId != null;
  connectionPreviewG.classList.toggle("invalid", invalid);
  const path = `M ${start.x} ${start.y} C ${control1.x} ${control1.y}, ${control2.x} ${control2.y}, ${end.x} ${end.y}`;
  connectionPreviewG.appendChild(el("path", {
    d: path,
    class: "preview-line",
    "marker-end": `url(#${invalid ? "arrowError" : "arrowPreview"})`
  }));
  if (!target) connectionPreviewG.appendChild(el("circle", { class: "preview-end", cx: end.x, cy: end.y, r: 4 }));
}

function clearConnectionGesture() {
  if (connectionDrag) {
    try { svg.releasePointerCapture(connectionDrag.pointerId); } catch (err) {}
  }
  connectionDrag = null;
  connectionPreviewG.innerHTML = "";
  connectionPreviewG.classList.remove("invalid");
  updateConnectionVisualState();
}

function onConnectionHandlePointerDown(event, node, side) {
  if (event.button !== 0) return;
  event.preventDefault();
  event.stopPropagation();
  if (connectMode && connectSource != null) {
    handleConnectClick(node);
    return;
  }
  const problem = connectionSourceProblem(node);
  if (problem) {
    setConnectMode(false);
    hintEl.innerHTML = `<b>Connect:</b> ${problem}`;
    return;
  }
  if (connectMode) setConnectMode(false);
  const start = connectionPointForSide(node, side);
  connectionDrag = {
    pointerId: event.pointerId,
    sourceId: node.id,
    side,
    start,
    current: start,
    clientStartX: event.clientX,
    clientStartY: event.clientY,
    hoverTargetId: null,
    invalidTargetId: null,
    moved: false
  };
  svg.setPointerCapture(event.pointerId);
  updateConnectionVisualState();
  hintEl.innerHTML = "<b>Connect:</b> drag to a highlighted target, or release for click-to-target mode.";
}

function moveConnectionGesture(event) {
  if (!connectionDrag || connectionDrag.pointerId !== event.pointerId) return false;
  event.preventDefault();
  connectionDrag.current = svgPoint(event);
  if (Math.hypot(event.clientX - connectionDrag.clientStartX, event.clientY - connectionDrag.clientStartY) >= 4) {
    connectionDrag.moved = true;
  }
  const candidate = connectionDrag.moved ? nodeAtConnectionPoint(connectionDrag.current) : null;
  const source = getNode(connectionDrag.sourceId);
  const problem = candidate ? connectionProblem(source, candidate) : "";
  connectionDrag.hoverTargetId = candidate && !problem ? candidate.id : null;
  connectionDrag.invalidTargetId = candidate && problem ? candidate.id : null;
  updateConnectionVisualState();
  renderConnectionPreview();
  return true;
}

function finishConnectionGesture(event) {
  if (!connectionDrag || connectionDrag.pointerId !== event.pointerId) return false;
  const completed = connectionDrag;
  let target = completed.hoverTargetId != null ? getNode(completed.hoverTargetId) : null;
  if (completed.moved) {
    const dropCandidate = nodeAtConnectionPoint(svgPoint(event));
    const source = getNode(completed.sourceId);
    const dropProblem = dropCandidate ? connectionProblem(source, dropCandidate) : "";
    target = dropCandidate && !dropProblem ? dropCandidate : null;
    completed.invalidTargetId = dropCandidate && dropProblem ? dropCandidate.id : null;
  }
  clearConnectionGesture();
  if (!completed.moved) {
    setConnectMode(true, completed.sourceId);
    return true;
  }
  setConnectMode(false);
  if (target) {
    const flow = createFlow(completed.sourceId, target.id);
    select("flow", flow.id);
  } else {
    hintEl.innerHTML = completed.invalidTargetId != null
      ? "<b>Connect:</b> that node cannot accept this sequence flow."
      : "<b>Connect:</b> connection cancelled; drop on a highlighted target node.";
  }
  return true;
}

function onNodePointerDown(e, node) {
  if (e.button !== 0) return;
  if (connectMode) {
    e.stopPropagation();
    handleConnectClick(node);
    return;
  }
  e.stopPropagation();
  select('node', node.id);
  const pt = svgPoint(e);
  drag = { id: node.id, dx: pt.x - node.x, dy: pt.y - node.y };
  svg.setPointerCapture(e.pointerId);
}

function onLanePointerDown(e, lane) {
  if (e.button !== 0) return;
  if (connectMode) return;
  e.stopPropagation();
  select('lane', lane.id);
  const pt = svgPoint(e);
  laneDrag = {
    id: lane.id,
    dx: pt.x - lane.x,
    dy: pt.y - lane.y,
    nodeOffsets: model.flowNodes
      .filter(s => s.laneId === lane.id)
      .map(s => ({ id: s.id, dx: s.x - lane.x, dy: s.y - lane.y }))
  };
  svg.setPointerCapture(e.pointerId);
}

function onLaneResizePointerDown(e, lane) {
  if (e.button !== 0) return;
  if (connectMode) return;
  e.stopPropagation();
  select('lane', lane.id);
  const pt = svgPoint(e);
  laneResize = { id: lane.id, dx: lane.x + lane.w - pt.x, dy: lane.y + lane.h - pt.y };
  svg.setPointerCapture(e.pointerId);
}

svg.addEventListener("pointermove", (e) => {
  if (moveConnectionGesture(e)) return;
  if (moveCanvasPan(e)) return;
  const pt = svgPoint(e);
  if (drag) {
    const node = getNode(drag.id);
    node.x = Math.round(pt.x - drag.dx);
    node.y = Math.round(pt.y - drag.dy);
    renderNodes(); renderEdges();
    return;
  }
  if (laneDrag) {
    const lane = getLane(laneDrag.id);
    lane.x = Math.round(pt.x - laneDrag.dx);
    lane.y = Math.round(pt.y - laneDrag.dy);
    laneDrag.nodeOffsets.forEach(offset => {
      const node = getNode(offset.id);
      if (node) {
        node.x = lane.x + offset.dx;
        node.y = lane.y + offset.dy;
      }
    });
    renderLanes(); renderNodes(); renderEdges();
    return;
  }
  if (laneResize) {
    const lane = getLane(laneResize.id);
    lane.w = Math.max(MIN_LANE_W, Math.round(pt.x - lane.x + laneResize.dx));
    lane.h = Math.max(MIN_LANE_H, Math.round(pt.y - lane.y + laneResize.dy));
    renderLanes();
  }
});
svg.addEventListener("pointerup", (e) => {
  if (finishConnectionGesture(e)) return;
  if (finishCanvasPan(e)) return;
  if (drag) assignNodeLane(drag.id);
  drag = null;
  laneDrag = null;
  laneResize = null;
  renderInspector();
});
svg.addEventListener("pointercancel", (e) => {
  if (connectionDrag && connectionDrag.pointerId === e.pointerId) {
    clearConnectionGesture();
    renderHint();
    return;
  }
  if (finishCanvasPan(e)) return;
  drag = null;
  laneDrag = null;
  laneResize = null;
});
svg.addEventListener("pointerdown", (e) => {
  if ((spacePressed && e.button === 0) || e.button === 1) {
    startCanvasPan(e, false);
    e.stopPropagation();
  }
}, true);
svg.addEventListener("pointerdown", (e) => {
  if (e.button === 0 && (e.target === svg || e.target === gridSurface) && !connectMode) {
    startCanvasPan(e, true);
  }
});
svg.addEventListener("click", (e) => {
  if (!suppressCanvasClick) return;
  suppressCanvasClick = false;
  e.preventDefault();
  e.stopPropagation();
}, true);
svg.addEventListener("wheel", (e) => {
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * .0015);
  zoomTo(viewState.zoom * factor, e.clientX, e.clientY);
}, { passive: false });

function svgPoint(e) {
  const point = svg.createSVGPoint();
  point.x = e.clientX;
  point.y = e.clientY;
  const matrix = svg.getScreenCTM();
  if (!matrix) return { x: 0, y: 0 };
  const transformed = point.matrixTransform(matrix.inverse());
  return { x: transformed.x, y: transformed.y };
}

function assignNodeLane(nodeId) {
  const node = getNode(nodeId);
  if (!node) return;
  const c = center(node);
  const lane = [...model.lanes].reverse().find(p =>
    c.x >= p.x && c.x <= p.x + p.w && c.y >= p.y && c.y <= p.y + p.h
  );
  node.laneId = lane ? lane.id : null;
}

/* ---------- Connect mode ---------- */
function createFlow(sourceId, targetId) {
  const flow = { id: nextFlowId(), name: "", sourceRef: sourceId, targetRef: targetId,
                 roles: [], variables: [], condition: null, isDefault: false, isSelectable: true, canActWithoutClaim: false,
                 completionCondition: null, completionPriority: null, cancelRemainingInstances: false };
  model.sequenceFlows.push(flow);
  return flow;
}
function handleConnectClick(node) {
  if (connectSource == null) {
    const problem = connectionSourceProblem(node);
    if (problem) {
      setConnectMode(false);
      hintEl.innerHTML = `<b>Connect:</b> ${problem}`;
      return;
    }
    connectSource = node.id;
    updateConnectionVisualState();
    renderHint();
  } else {
    const source = getNode(connectSource);
    const problem = connectionProblem(source, node);
    const sourceId = connectSource;
    setConnectMode(false);
    if (problem) {
      hintEl.innerHTML = `<b>Connect:</b> ${problem}`;
      return;
    }
    const flow = createFlow(sourceId, node.id);
    select('flow', flow.id);
  }
}
function setConnectMode(on, sourceId = null) {
  connectMode = on;
  connectSource = on ? sourceId : null;
  document.getElementById("connectBtn").classList.toggle("active", on);
  if (!on) {
    connectionPreviewG.innerHTML = "";
    connectionPreviewG.classList.remove("invalid");
  }
  updateConnectionVisualState();
  renderHint();
}

/* ---------- Lanes and nodes add/delete ---------- */
function addLane() {
  const id = nextLaneId();
  const lane = { id, name: "New Lane", x: 60 + (model.lanes.length % 4) * 40,
                 y: 40 + (model.lanes.length % 4) * 40, w: 300, h: 220 };
  model.lanes.push(lane);
  select('lane', id);
}
function addNode() {
  const id = nextNodeId();
  const lane = selected?.kind === 'lane' ? getLane(selected.laneId) : null;
  const node = { id, name: "New Node", type: model.flowNodes.length === 0 ? NODE_TYPE.START_EVENT : NODE_TYPE.USER_TASK,
                 laneId: lane?.id ?? null,
                 x: lane ? lane.x + 30 : 100 + (model.flowNodes.length % 5) * 60,
                 y: lane ? lane.y + 60 : 120 + (model.flowNodes.length % 5) * 40,
                 roles: [],
                 requiresClaim: false,
                 claimMode: CLAIM_MODE.FRESH,
                 inheritClaimFromNodeId: null,
                 variables: [],
                 assignee: null };
  model.flowNodes.push(node);
  if (isStartEventType(node.type) && model.initialEventId == null) model.initialEventId = id;
  select('node', id);
}
function deleteNode(id) {
  // A boundary event's host is independent; but deleting the host also removes
  // any boundary events attached to it (plus their flows).
  const attachedBoundaries = model.flowNodes.filter(n => n.type === NODE_TYPE.ERROR_BOUNDARY_EVENT && n.attachedToRef === id);
  const boundaryIds = new Set(attachedBoundaries.map(n => n.id));
  model.flowNodes = model.flowNodes.filter(s => s.id !== id && !boundaryIds.has(s.id));
  model.sequenceFlows = model.sequenceFlows.filter(f =>
    f.sourceRef !== id && f.targetRef !== id
    && !boundaryIds.has(f.sourceRef) && !boundaryIds.has(f.targetRef));
  if (model.initialEventId === id) {
    const nextDefault = model.flowNodes.find(s => isStartEventType(s.type));
    model.initialEventId = nextDefault?.id ?? null;
  }
  clearSelection();
}
function deleteLane(id) {
  model.lanes = model.lanes.filter(p => p.id !== id);
  model.flowNodes.forEach(s => { if (s.laneId === id) s.laneId = null; });
  clearSelection();
}

/* ---------- Save / Load ---------- */
function defaultFileName() {
  return (model.name || "workflow").replace(/\s+/g, "_").toLowerCase() + ".json";
}

// BEGIN WORKFLOW SAVE VALIDATOR
function validateModelForSave(candidate) {
  const errors = [];
  const nodes = Array.isArray(candidate && candidate.flowNodes) ? candidate.flowNodes : [];
  const flows = Array.isArray(candidate && candidate.sequenceFlows) ? candidate.sequenceFlows : [];
  const processVariables = Array.isArray(candidate && candidate.variables) ? candidate.variables : [];
  const hasText = value => typeof value === "string" && value.trim().length > 0;
  const hasMappingDefault = value => value !== null && value !== undefined;
  const countItems = value => Array.isArray(value) ? value.length : 0;
  const nodeLabel = node => "User task #" + String(node && node.id) +
    (hasText(node && node.name) ? " (" + node.name.trim() + ")" : "");
  const flowLabel = flow => "Sequence flow #" + String(flow && flow.id);

  function validateUniqueIds(items, kind) {
    const seen = new Set();
    for (const item of items) {
      if (!Number.isInteger(item && item.id)) {
        errors.push(kind + " has a missing or non-integer id.");
        continue;
      }
      if (seen.has(item.id)) errors.push(kind + " id #" + item.id + " is duplicated.");
      seen.add(item.id);
    }
  }

  function validateVariableNames(variables, owner) {
    const seen = new Map();
    for (const variable of Array.isArray(variables) ? variables : []) {
      if (!hasText(variable && variable.name)) {
        errors.push("Variable name is required on " + owner + ".");
        continue;
      }
      const name = variable.name.trim();
      const key = name.toLowerCase();
      if (seen.has(key)) {
        errors.push("Variable name '" + name + "' is duplicated on " + owner +
          "; names are case-insensitive.");
      } else {
        seen.set(key, name);
      }
    }
  }

  validateUniqueIds(nodes, "Flow node");
  validateUniqueIds(flows, "Sequence flow");
  validateVariableNames(processVariables, "process variables");
  for (const node of nodes) validateVariableNames(node && node.variables, "flow node #" + String(node && node.id));
  for (const flow of flows) validateVariableNames(flow && flow.variables, "sequence flow #" + String(flow && flow.id));

  const processByName = new Map();
  for (const variable of processVariables) {
    if (hasText(variable && variable.name)) {
      const key = variable.name.trim().toLowerCase();
      if (!processByName.has(key)) processByName.set(key, variable);
    }
  }

  const supportedVariableTypes = new Set(["string", "number", "boolean", "date", "datetime", "json"]);
  const isIsoDate = value => {
    if (typeof value !== "string" || !/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
    const [year, month, day] = value.split("-").map(Number);
    const date = new Date(Date.UTC(year, month - 1, day));
    return date.getUTCFullYear() === year && date.getUTCMonth() === month - 1 && date.getUTCDate() === day;
  };
  const isIsoDateTime = value => typeof value === "string" && value.includes("T") && !Number.isNaN(Date.parse(value));
  const validTypedScalar = (value, dataType) => {
    if (typeof value === "string" && value.includes("${")) return true;
    if (dataType === "string") return typeof value === "string";
    if (dataType === "number") return (typeof value === "number" && Number.isFinite(value)) ||
      (typeof value === "string" && value.trim() !== "" && Number.isFinite(Number(value)));
    if (dataType === "boolean") return typeof value === "boolean" ||
      (typeof value === "string" && /^(true|false)$/i.test(value));
    if (dataType === "date") return isIsoDate(value);
    if (dataType === "datetime") return isIsoDateTime(value);
    if (dataType === "json") return value !== undefined;
    return false;
  };
  const validTypedValue = (value, mapping) => mapping.isArray
    ? Array.isArray(value) && value.every(item => validTypedScalar(item, mapping.dataType))
    : validTypedScalar(value, mapping.dataType);

  function validateTypedOutputMappings(label, mappings, pathKind, enforceProcessContract) {
    const seenMappings = new Set();
    for (const mapping of Array.isArray(mappings) ? mappings : []) {
      if (!hasText(mapping && mapping.variable)) {
        errors.push(label + " has an output mapping with no variable name.");
        continue;
      }
      const variableName = mapping.variable.trim();
      const key = variableName.toLowerCase();
      if (/^(sys|config|setting|mi)\./i.test(variableName)) {
        errors.push(label + " output mapping variable '" + variableName + "' uses a reserved context prefix.");
      }
      if (seenMappings.has(key)) {
        errors.push(label + " output mapping variable '" + variableName + "' is duplicated; names are case-insensitive.");
      }
      seenMappings.add(key);
      if (!supportedVariableTypes.has(mapping.dataType)) {
        errors.push(label + " output mapping '" + variableName + "' has unsupported dataType '" + String(mapping.dataType) + "'.");
      }
      if (typeof mapping.isArray !== "boolean") {
        errors.push(label + " output mapping '" + variableName + "' must declare isArray.");
      }
      const hasDefault = hasMappingDefault(mapping.defaultValue);
      if (!hasText(mapping.path) && !hasDefault) {
        errors.push(label + " output mapping '" + variableName + "' needs a " + pathKind + " path unless defaultValue is configured.");
      }
      if (hasDefault && supportedVariableTypes.has(mapping.dataType) && typeof mapping.isArray === "boolean" &&
          !validTypedValue(mapping.defaultValue, mapping)) {
        errors.push(label + " output mapping default for '" + variableName + "' does not match " +
          mapping.dataType + (mapping.isArray ? "[]" : "") + ".");
      }
      if (mapping.validation != null && typeof mapping.validation !== "string") {
        errors.push(label + " output mapping validation for '" + variableName + "' must be an NCalc string.");
      }

      const processVariable = processByName.get(key);
      if (enforceProcessContract && processVariable &&
          (mapping.dataType !== processVariable.dataType || mapping.isArray !== !!processVariable.isArray)) {
        errors.push(label + " output mapping '" + variableName + "' must match process variable '" +
          processVariable.name + "' type " + processVariable.dataType + (processVariable.isArray ? "[]" : "") + ".");
      }
    }
    return seenMappings;
  }

  for (const node of nodes.filter(candidate => candidate && candidate.type === "serviceTask")) {
    const service = node.service && typeof node.service === "object" ? node.service : {};
    validateTypedOutputMappings(
      "Service task #" + String(node.id),
      service.outputMappings,
      "response",
      true);
  }

  for (const node of nodes.filter(candidate => candidate && candidate.type === "intermediateMessageCatchEvent")) {
    const message = node.message && typeof node.message === "object" ? node.message : {};
    validateTypedOutputMappings(
      "Message catch event #" + String(node.id),
      message.outputMappings,
      "body",
      true);
  }

  for (const node of nodes.filter(candidate => candidate && candidate.type === "messageStartEvent")) {
    const label = "Message start event #" + String(node.id);
    const message = node.message && typeof node.message === "object" ? node.message : {};
    const mappings = Array.isArray(message.outputMappings) ? message.outputMappings : [];
    const seenMappings = validateTypedOutputMappings(label, mappings, "body", false);

    if (hasText(message.idempotencyVariable)) {
      errors.push(label + " cannot configure both legacy message.idempotencyVariable and node idempotency.");
    }
  }

  const entries = nodes.filter(node => node &&
    (node.type === "startEvent" || node.type === "messageStartEvent"));
  const reservedIdempotencyHeaders = new Set([
    "authorization", "proxy-authorization", "cookie", "host", "content-length",
    "content-type", "content-encoding", "transfer-encoding", "connection",
    "keep-alive", "te", "trailer", "upgrade", "expect", "x-client-id", "x-client-secret"
  ]);
  const httpFieldName = /^[!#$%&'*+\-.^_`|~0-9A-Za-z]+$/;
  for (const node of entries.filter(entry => entry.idempotency != null)) {
    const config = node.idempotency;
    const label = "Entry event #" + String(node.id);
    const headerName = typeof config.headerName === "string" ? config.headerName.trim() : "";
    const variableName = typeof config.variable === "string" ? config.variable.trim() : "";
    if (!headerName || headerName.length > 300 || !httpFieldName.test(headerName)) {
      errors.push(label + " idempotency.headerName must be a valid HTTP field name of at most 300 characters.");
    } else if (reservedIdempotencyHeaders.has(headerName.toLowerCase())) {
      errors.push(label + " idempotency.headerName '" + headerName + "' is reserved.");
    }
    if (node.type === "messageStartEvent" && hasText(node.message && node.message.headerName) &&
        node.message.headerName.trim().toLowerCase() === headerName.toLowerCase()) {
      errors.push(label + " idempotency.headerName must differ from the message correlation header.");
    }
    if (!variableName) {
      errors.push(label + " idempotency.variable is required.");
    } else {
      if (/^(sys|config|setting|mi)\./i.test(variableName)) {
        errors.push(label + " idempotency variable '" + variableName + "' uses a reserved context prefix.");
      }
      const entryNames = node.type === "messageStartEvent"
        ? new Set(((node.message && node.message.outputMappings) || [])
            .map(mapping => String(mapping.variable || "").toLowerCase()))
        : new Set((node.variables || []).map(variable => String(variable.name || "").toLowerCase()));
      if (entryNames.has(variableName.toLowerCase())) {
        errors.push(label + " idempotency variable '" + variableName +
          "' cannot also be an entry variable or output mapping.");
      }
      if (node.businessKey && String(node.businessKey.variable || "").toLowerCase() === variableName.toLowerCase()) {
        errors.push(label + " must use different variables for idempotency and businessKey.");
      }
    }
  }

  const keyedEntries = entries.filter(node => node.businessKey != null);
  if (keyedEntries.length > 0 && keyedEntries.length !== entries.length) {
    errors.push("Every startEvent and messageStartEvent must configure businessKey once business keys are enabled.");
  }
  for (const node of keyedEntries) {
    const config = node.businessKey;
    const label = "Entry event #" + String(node.id);
    if (!config || typeof config !== "object" || !hasText(config.variable)) {
      errors.push(label + " businessKey.variable is required.");
      continue;
    }
    if (!["active", "all"].includes(config.uniqueness)) {
      errors.push(label + " has unsupported businessKey.uniqueness '" + String(config.uniqueness) + "'.");
    }
    if (node.type === "messageStartEvent") {
      const mapping = (node.message && Array.isArray(node.message.outputMappings)
        ? node.message.outputMappings : [])
        .find(candidate => candidate && candidate.variable === config.variable);
      if (!mapping || !mapping.required || mapping.isArray || mapping.dataType !== "string" ||
          mapping.defaultValue != null || !hasText(mapping.path)) {
        errors.push(label + " businessKey mapping '" + config.variable +
          "' must be an exactly named required scalar string with an explicit path and no defaultValue.");
      }
      if (node.idempotency && hasText(node.idempotency.variable) &&
          node.idempotency.variable.toLowerCase() === config.variable.toLowerCase()) {
        errors.push(label + " must use different variables for idempotency and businessKey.");
      }
    } else {
      const variable = (Array.isArray(node.variables) ? node.variables : [])
        .find(candidate => candidate && candidate.name === config.variable);
      if (!variable || !variable.required || variable.isArray || variable.dataType !== "string" || variable.defaultValue != null) {
        errors.push(label + " businessKey variable '" + config.variable +
          "' must be an exactly named required scalar string with no defaultValue.");
      }
    }
  }

  for (const node of nodes) {
    const multi = node && node.multiInstance;
    if (!multi) continue;
    const label = nodeLabel(node);

    if (node.type !== "userTask") {
      errors.push(label + " has multiInstance configuration but is not a userTask.");
      continue;
    }
    if (!["parallel", "sequential"].includes(multi.mode)) {
      errors.push(label + " has unsupported multi-instance mode '" + String(multi.mode) + "'.");
    }
    if (!["collection", "cardinality"].includes(multi.source)) {
      errors.push(label + " has unsupported multi-instance source '" + String(multi.source) + "'.");
    }
    if (!["afterEach", "afterAll"].includes(multi.completionEvaluation)) {
      errors.push(label + " has unsupported completionEvaluation '" +
        String(multi.completionEvaluation) + "'.");
    }
    if (hasText(node.assignee)) {
      errors.push(label + " cannot define an assignee expression while multi-instance is enabled.");
    }

    const resultName = hasText(multi.resultVariable) ? multi.resultVariable.trim() : "";
    const result = resultName ? processByName.get(resultName.toLowerCase()) : null;
    if (!result || result.dataType !== "json" || result.isArray ||
        !Array.isArray(result.defaultValue)) {
      errors.push(label +
        " resultVariable must reference a scalar JSON process variable whose defaultValue is a JSON array.");
    }

    if (multi.source === "collection") {
      const collectionName = hasText(multi.collectionVariable)
        ? multi.collectionVariable.trim() : "";
      const collection = collectionName
        ? processByName.get(collectionName.toLowerCase()) : null;
      if (!collection || collection.dataType !== "string" || !collection.isArray) {
        errors.push(label + " collectionVariable must reference a declared string[] process variable.");
      }
      if (collectionName && resultName &&
          collectionName.toLowerCase() === resultName.toLowerCase()) {
        errors.push(label + " collectionVariable and resultVariable must be different.");
      }
      if (hasText(multi.cardinalityExpression)) {
        errors.push(label + " collection source cannot define cardinalityExpression.");
      }
      if (multi.onePerActor) {
        errors.push(label + " collection source cannot enable onePerActor.");
      }
      if (node.requiresClaim || node.claimMode !== "fresh") {
        errors.push(label + " collection source must use requiresClaim=false and claimMode='fresh'.");
      }
      if (collection && Array.isArray(collection.defaultValue)) {
        collection.defaultValue.forEach((username, index) => {
          if (typeof username !== "string" || username.trim().length === 0) {
            errors.push(label + " collection default item " + (index + 1) +
              " must be a non-empty username.");
          } else if (username.trim().length > 300) {
            errors.push(label + " collection default item " + (index + 1) +
              " exceeds the 300-character username limit.");
          }
        });
      }
    } else if (multi.source === "cardinality") {
      if (hasText(multi.collectionVariable)) {
        errors.push(label + " cardinality source cannot define collectionVariable.");
      }
      if (!hasText(multi.cardinalityExpression)) {
        errors.push(label + " cardinality source requires cardinalityExpression.");
      }
      if (node.claimMode !== "fresh") {
        errors.push(label + " cardinality source must use claimMode='fresh'.");
      }
    }

    const outgoing = flows.filter(flow => flow && flow.sourceRef === node.id);
    const outcomes = outgoing.filter(flow => !flow.cancelRemainingInstances);
    const interrupts = outgoing.filter(flow => !!flow.cancelRemainingInstances);
    const defaults = outcomes.filter(flow => !!flow.isDefault);
    const conditioned = outcomes.filter(flow => !flow.isDefault);
    const selectableOutcomeIds = new Set(
      outcomes.filter(flow => flow.isSelectable !== false).map(flow => flow.id));

    if (outcomes.length === 0 || defaults.length !== 1) {
      errors.push(label + " requires outcome flows and exactly one default outcome.");
    }
    if (!conditioned.some(flow => flow.isSelectable !== false)) {
      errors.push(label + " requires at least one selectable non-default outcome.");
    }

    if (defaults.length === 1) {
      const fallback = defaults[0];
      if (fallback.isSelectable !== false ||
          countItems(fallback.roles) > 0 ||
          countItems(fallback.variables) > 0 ||
          hasText(fallback.condition) ||
          !!fallback.canActWithoutClaim ||
          hasText(fallback.completionCondition) ||
          fallback.completionPriority != null ||
          !!fallback.cancelRemainingInstances) {
        errors.push(flowLabel(fallback) +
          " must be a pure engine-only default with no actor or completion settings.");
      }
    }

    const priorities = new Set();
    for (const flow of conditioned) {
      if (!Number.isInteger(flow.completionPriority) || flow.completionPriority <= 0) {
        errors.push(flowLabel(flow) + " requires a positive integer completionPriority.");
      } else if (priorities.has(flow.completionPriority)) {
        errors.push(label + " has duplicate completionPriority " + flow.completionPriority + ".");
      } else {
        priorities.add(flow.completionPriority);
      }
      if (!hasText(flow.completionCondition)) {
        errors.push(flowLabel(flow) + " requires completionCondition.");
      } else {
        const helperPattern = /\b(?:CountFlow|PercentFlow)\s*\(\s*([^)]+)\s*\)/gi;
        let match;
        while ((match = helperPattern.exec(flow.completionCondition)) !== null) {
          const referencedId = Number(match[1].trim());
          if (!Number.isInteger(referencedId) || !selectableOutcomeIds.has(referencedId)) {
            errors.push(flowLabel(flow) +
              " completionCondition references a non-selectable outcome flow.");
          }
        }
      }
      if (flow.isSelectable === false &&
          (countItems(flow.roles) > 0 ||
           countItems(flow.variables) > 0 ||
           hasText(flow.condition) ||
           !!flow.canActWithoutClaim)) {
        errors.push(flowLabel(flow) +
          " is engine-only and cannot define roles, action variables, condition, or canActWithoutClaim.");
      }
    }

    for (const flow of interrupts) {
      if (flow.isSelectable === false ||
          !!flow.isDefault ||
          hasText(flow.completionCondition) ||
          flow.completionPriority != null) {
        errors.push(flowLabel(flow) +
          " interrupt must be selectable, non-default, and have no completion rules.");
      }
    }
  }

  return errors;
}
// END WORKFLOW SAVE VALIDATOR

function showValidationErrors(errors) {
  const list = document.getElementById("validation-errors");
  list.replaceChildren();
  for (const error of errors) {
    const item = document.createElement("li");
    item.textContent = error;
    list.appendChild(item);
  }
  document.getElementById("validation-modal").style.display = "flex";
  document.getElementById("validation-close").focus();
}

function closeValidationErrors() {
  document.getElementById("validation-modal").style.display = "none";
}

async function save() {
  // Saving only canonicalizes recognized enum casing. Do not run the broader UI
  // invariant helpers here: imported invalid source/flow settings must survive
  // long enough for validateModelForSave to report them.
  model.flowNodes.forEach(node => {
    if (isMessageStartEventType(node.type)) normalizeLegacyMessageStartNode(node);
    if (isServiceTaskType(node.type)) {
      node.service = normalizeService(node.service, model.variables);
    }
    if (isMessageCatchEventType(node.type)) {
      node.message = normalizeMessage(node.message, false, model.variables);
    }
    if (node.businessKey && typeof node.businessKey === "object") {
      node.businessKey.uniqueness = canonicalizeKnownValue(
        node.businessKey.uniqueness, ["active", "all"], undefined);
    }
    if (node.idempotency && typeof node.idempotency === "object") {
      node.idempotency = normalizeIdempotencyForLoad(node.idempotency);
    }
    if (node.multiInstance) {
      node.multiInstance.mode = canonicalizeKnownValue(
        node.multiInstance.mode, ["parallel", "sequential"], "parallel");
      node.multiInstance.source = canonicalizeKnownValue(
        node.multiInstance.source, ["collection", "cardinality"], "collection");
      node.multiInstance.completionEvaluation = canonicalizeKnownValue(
        node.multiInstance.completionEvaluation, ["afterEach", "afterAll"], "afterEach");
    }
  });
  const validationErrors = validateModelForSave(model);
  if (validationErrors.length > 0) {
    showValidationErrors(validationErrors);
    return;
  }
  const canonical = JSON.parse(JSON.stringify(model));
  canonical.flowNodes.forEach(node => {
    if (isMessageStartEventType(node.type)) delete node.variables;
  });
  const data = JSON.stringify(canonical, null, 2);

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: defaultFileName(),
        types: [{
          description: "JSON files",
          accept: { "application/json": [".json"] }
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(data);
      await writable.close();
      return;
    } catch (err) {
      if (err.name === "AbortError") return;
      alert("Could not save JSON file: " + err.message);
      return;
    }
  }

  alert("Your browser does not support direct file saving. The JSON will be downloaded instead.");
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = defaultFileName();
  a.click();
  URL.revokeObjectURL(a.href);
}
function normalizeVariable(v) {
  return {
    id: v.id,
    name: v.name ?? v.label ?? `Variable ${v.id}`,
    dataType: v.dataType ?? "string",
    isArray: !!v.isArray,
    required: !!v.required,
    defaultValue: v.required ? null : (v.defaultValue ?? null),
    validation: (v.validation ?? "").trim() === "" ? null : v.validation
  };
}
function mapLegacyNodeType(s) {
  const t = s.type ?? "task";
  if (t === "start") return NODE_TYPE.START_EVENT;
  if (t === "end") return NODE_TYPE.END_EVENT;
  if (t === "task" && s.autoAdvance) return NODE_TYPE.TASK;
  if (t === "task") return NODE_TYPE.USER_TASK;
  return t; // already startEvent/userTask/endEvent/exclusiveGateway
}
// Migrate a legacy (phases/steps/actions) document into the BPMN schema.
function migrateLegacyToNew(obj) {
  const lanes = (obj.phases || []).map((p, i) => ({
    id: p.id,
    name: p.name ?? p.label ?? `Lane ${p.id}`,
    x: typeof p.x === "number" ? p.x : 60 + (i % 4) * 280,
    y: typeof p.y === "number" ? p.y : 40 + Math.floor(i / 4) * 220,
    w: typeof p.w === "number" ? p.w : 300,
    h: typeof p.h === "number" ? p.h : 220
  }));

  const flowNodes = [];
  const sequenceFlows = [];
  let flowSeed = 100;
  const nextId = (preferred) => {
    if (preferred && !sequenceFlows.some(f => f.id === preferred)) return preferred;
    do { flowSeed++; } while (sequenceFlows.some(f => f.id === flowSeed));
    return flowSeed;
  };

  (obj.steps || []).forEach((s, i) => {
    const type = mapLegacyNodeType(s);
    const variables = (s.variables || []).map(normalizeVariable);
    const actions = (s.actions || []).map(a => ({
      id: a.id,
      name: a.name ?? a.label ?? "",
      toStepId: a.toStepId ?? a.next ?? null,
      roles: normalizeRoles(a.roles ?? a.role),
      variables: (a.variables || []).map(normalizeVariable)
    }));

    if (isStartEventType(type)) {
      // start events are action-less: fold first action (or nextStepId) into one flow
      let target = s.nextStepId ?? null;
      if (actions.length > 0) {
        const first = actions[0];
        if (target == null) target = first.toStepId;
        const existing = new Set(variables.map(v => v.name.toLowerCase()));
        for (const v of first.variables) {
          if (!existing.has(v.name.toLowerCase())) { variables.push(v); existing.add(v.name.toLowerCase()); }
        }
      }
      if (target != null) {
        sequenceFlows.push({ id: nextId(), name: "", sourceRef: s.id, targetRef: target,
                             roles: [], variables: [], condition: null, isDefault: false, canActWithoutClaim: false });
      }
    } else if (isAutomaticType(type)) {
      if (s.nextStepId != null) {
        sequenceFlows.push({ id: nextId(), name: "", sourceRef: s.id, targetRef: s.nextStepId,
                             roles: [], variables: [], condition: null, isDefault: false, canActWithoutClaim: false });
      }
    } else {
      for (const a of actions) {
        if (a.toStepId == null) continue;
        sequenceFlows.push({ id: nextId(a.id), name: a.name, sourceRef: s.id, targetRef: a.toStepId,
                             roles: a.roles, variables: a.variables, condition: null, isDefault: false, canActWithoutClaim: false });
      }
    }

    flowNodes.push({
      id: s.id,
      name: s.name ?? s.label ?? `Node ${s.id}`,
      type,
      laneId: s.phaseId ?? null,
      x: typeof s.x === "number" ? s.x : 100 + (i % 4) * 220,
      y: typeof s.y === "number" ? s.y : 80 + Math.floor(i / 4) * 160,
      roles: normalizeRoles(s.roles ?? s.role),
      requiresClaim: !!s.requiresClaim,
      variables,
      assignee: null
    });
  });

  return {
    id: obj.id ?? 1,
    name: obj.name ?? "Workflow",
    initialEventId: obj.initialEventId ?? obj.initialStepId ?? obj.initialStep ?? null,
    variables: [],
    lanes,
    flowNodes,
    sequenceFlows,
    cancelRoles: [],
    unclaimRoles: []
  };
}
function loadFromObject(obj) {
  if (Array.isArray(obj.flowNodes)) {
    // Already BPMN schema.
    const loadedProcessVariables = (obj.variables || []).map(normalizeVariable);
    model = {
      id: obj.id ?? 1,
      name: obj.name ?? "Workflow",
      initialEventId: obj.initialEventId ?? null,
      variables: loadedProcessVariables,
      lanes: (obj.lanes || []).map((p, i) => ({
        id: p.id,
        name: p.name ?? `Lane ${p.id}`,
        externalId: p.externalId ?? null,
        x: typeof p.x === "number" ? p.x : 60 + (i % 4) * 280,
        y: typeof p.y === "number" ? p.y : 40 + Math.floor(i / 4) * 220,
        w: typeof p.w === "number" ? p.w : 300,
        h: typeof p.h === "number" ? p.h : 220
      })),
      flowNodes: (obj.flowNodes || []).map((s, i) => ({
        id: s.id,
        name: s.name ?? `Node ${s.id}`,
        externalId: s.externalId ?? null,
        type: s.type ?? NODE_TYPE.USER_TASK,
        laneId: s.laneId ?? null,
        x: typeof s.x === "number" ? s.x : 100 + (i % 4) * 220,
        y: typeof s.y === "number" ? s.y : 80 + Math.floor(i / 4) * 160,
        roles: normalizeRoles(s.roles),
        requiresClaim: !!s.requiresClaim,
        claimMode: CLAIM_MODE_OPTIONS.some(o => o.value === s.claimMode) ? s.claimMode : CLAIM_MODE.FRESH,
        inheritClaimFromNodeId: s.inheritClaimFromNodeId ?? null,
        variables: (s.variables || []).map(normalizeVariable),
        assignee: (typeof s.assignee === "string" && s.assignee.trim()) ? s.assignee : null,
        multiInstance: s.multiInstance ? normalizeMultiInstanceForLoad(s.multiInstance) : null,
        service: isServiceTaskType(s.type) ? normalizeService(s.service, loadedProcessVariables) : undefined,
        scriptFormat: isScriptTaskType(s.type)
          ? (s.scriptFormat === SCRIPT_FORMAT.JAVASCRIPT ? SCRIPT_FORMAT.JAVASCRIPT : SCRIPT_FORMAT.NCALC)
          : undefined,
        assignments: isScriptTaskType(s.type) ? normalizeAssignments(s.assignments) : undefined,
        script: isScriptTaskType(s.type) ? (typeof s.script === "string" ? s.script : "") : undefined,
        attachedToRef: typeof s.attachedToRef === "number" ? s.attachedToRef : null,
        errorVariable: (typeof s.errorVariable === "string" && s.errorVariable.trim()) ? s.errorVariable : null,
        message: (isMessageCatchEventType(s.type) || isMessageStartEventType(s.type))
          ? normalizeMessage(s.message, isMessageStartEventType(s.type), loadedProcessVariables) : undefined,
        businessKey: (isStartEventType(s.type) || isMessageStartEventType(s.type)) && s.businessKey !== undefined
          ? normalizeBusinessKeyForLoad(s.businessKey) : undefined,
        idempotency: (isStartEventType(s.type) || isMessageStartEventType(s.type)) && s.idempotency !== undefined
          ? normalizeIdempotencyForLoad(s.idempotency) : undefined
      })),
      sequenceFlows: (obj.sequenceFlows || []).map(f => ({
        id: f.id,
        name: f.name ?? "",
        externalId: f.externalId ?? null,
        sourceRef: f.sourceRef,
        targetRef: f.targetRef,
        roles: normalizeRoles(f.roles),
        variables: (f.variables || []).map(normalizeVariable),
        condition: f.condition ?? null,
        isDefault: !!f.isDefault,
        isSelectable: f.isSelectable !== false,
        canActWithoutClaim: !!f.canActWithoutClaim,
        completionCondition: (typeof f.completionCondition === "string" && f.completionCondition.trim()) ? f.completionCondition : null,
        completionPriority: Number.isInteger(f.completionPriority) ? f.completionPriority : null,
        cancelRemainingInstances: !!f.cancelRemainingInstances
      })),
      cancelRoles: normalizeRoles(obj.cancelRoles),
      unclaimRoles: normalizeRoles(obj.unclaimRoles)
    };
  } else {
    // Legacy phases/steps/actions document.
    model = migrateLegacyToNew(obj);
  }
  model.flowNodes.filter(node => isMessageStartEventType(node.type))
    .forEach(normalizeLegacyMessageStartNode);
  migrateLegacyUserTaskDefaultFlows();
  clearSelection();
}

/* ---------- DOM helper ---------- */
function el(tag, attrs) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

/* ---------- Wire up toolbar ---------- */
document.getElementById("addStepBtn").onclick = () => { if (connectMode) setConnectMode(false); addNode(); };
document.getElementById("addPhaseBtn").onclick = () => { if (connectMode) setConnectMode(false); addLane(); };
document.getElementById("connectBtn").onclick = () => setConnectMode(!connectMode);
document.getElementById("saveBtn").onclick = save;
zoomOutBtn.onclick = () => zoomTo(viewState.zoom / 1.2);
zoomResetBtn.onclick = () => zoomTo(1);
zoomInBtn.onclick = () => zoomTo(viewState.zoom * 1.2);
fitViewBtn.onclick = fitView;
document.getElementById("newBtn").onclick = () => {
  if (confirm("Start a new empty workflow? Unsaved changes will be lost.")) {
    model = newModel();
    resetViewport();
    clearSelection();
  }
};
document.getElementById("loadBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try { loadFromObject(JSON.parse(reader.result)); }
    catch (err) { alert("Invalid JSON file: " + err.message); }
  };
  reader.readAsText(file);
  e.target.value = "";
};
wfNameInput.oninput = () => { model.name = wfNameInput.value; };

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && document.getElementById("validation-modal").style.display !== "none") {
    closeValidationErrors();
    return;
  }
  const t = e.target;
  if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA"
            || t.tagName === "SELECT" || t.isContentEditable)) return;
  if (e.code === "Space") {
    spacePressed = true;
    document.body.classList.add("is-space-panning");
    e.preventDefault();
    return;
  }
  if (e.key === "Escape") {
    if (connectionDrag) { clearConnectionGesture(); renderHint(); }
    else if (connectMode) setConnectMode(false);
    else clearSelection();
    return;
  }
  if (e.key === "Delete" && selected) {
    if (selected.kind === 'node') deleteNode(selected.nodeId);
    else if (selected.kind === 'lane') deleteLane(selected.laneId);
    else {
      model.sequenceFlows = model.sequenceFlows.filter(f => f.id !== selected.flowId);
      clearSelection();
    }
  }
});
window.addEventListener("keyup", (e) => {
  if (e.code !== "Space") return;
  spacePressed = false;
  document.body.classList.remove("is-space-panning");
});
window.addEventListener("blur", () => {
  spacePressed = false;
  document.body.classList.remove("is-space-panning");
  if (connectionDrag) { clearConnectionGesture(); renderHint(); }
});

/* ---------- Sidebar Resizer ---------- */
let isResizingSidebar = false;

// Restore sidebar width on load
const savedSidebarWidth = localStorage.getItem("sidebarWidth");
if (savedSidebarWidth) {
  inspector.style.width = Math.max(280, Math.min(720, +savedSidebarWidth || 340)) + "px";
}

resizer.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  isResizingSidebar = true;
  resizer.classList.add("dragging");
  document.body.style.cursor = "col-resize";
  document.body.style.userSelect = "none";
  resizer.setPointerCapture(e.pointerId);
});

resizer.addEventListener("pointermove", (e) => {
  if (!isResizingSidebar) return;
  const newWidth = window.innerWidth - e.clientX;
  const clampedWidth = Math.max(280, Math.min(720, newWidth));
  inspector.style.width = clampedWidth + "px";
  localStorage.setItem("sidebarWidth", clampedWidth);
});

const stopResizing = (e) => {
  if (!isResizingSidebar) return;
  isResizingSidebar = false;
  resizer.classList.remove("dragging");
  document.body.style.cursor = "";
  document.body.style.userSelect = "";
  try {
    resizer.releasePointerCapture(e.pointerId);
  } catch (err) {}
};

resizer.addEventListener("pointerup", stopResizing);
resizer.addEventListener("pointercancel", stopResizing);
resizer.addEventListener("keydown", (e) => {
  if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
  e.preventDefault();
  const currentWidth = inspector.getBoundingClientRect().width;
  const delta = e.key === "ArrowLeft" ? 16 : -16;
  const clampedWidth = Math.max(280, Math.min(720, currentWidth + delta));
  inspector.style.width = clampedWidth + "px";
  localStorage.setItem("sidebarWidth", clampedWidth);
});

if (typeof ResizeObserver !== "undefined") {
  new ResizeObserver(() => applyViewBox()).observe(canvasWrap);
} else {
  window.addEventListener("resize", applyViewBox);
}

/* ---------- Init ---------- */
resetViewport();
render();
</script>
