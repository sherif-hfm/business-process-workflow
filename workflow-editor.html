<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Process Workflow Editor</title>
<style>
  :root {
    --bg: #09111f;
    --canvas: #0b1425;
    --panel: #111d30;
    --panel-2: #18273d;
    --panel-3: #20314a;
    --border: #30445f;
    --border-strong: #48617f;
    --text: #f1f5f9;
    --muted: #a9b7ca;
    --accent: #3b82f6;
    --accent-2: #60a5fa;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --shadow: 0 16px 36px rgba(2, 8, 23, .28);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 60px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    box-shadow: 0 8px 20px rgba(2, 8, 23, .16);
    z-index: 20;
  }
  .toolbar-identity, .toolbar-group { display: flex; align-items: center; gap: 8px; }
  .toolbar-identity { min-width: 310px; flex: 1 1 360px; }
  .toolbar-group {
    padding: 4px;
    border: 1px solid rgba(72, 97, 127, .55);
    border-radius: 10px;
    background: rgba(9, 17, 31, .35);
  }
  .app-mark {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    color: #bfdbfe;
    background: linear-gradient(145deg, rgba(59,130,246,.32), rgba(37,99,235,.12));
    border: 1px solid rgba(96,165,250,.48);
    border-radius: 10px;
  }
  .app-mark svg { width: 20px; height: 20px; }
  header h1 {
    font-size: 14px;
    margin: 0 4px 0 0;
    font-weight: 700;
    letter-spacing: .01em;
    white-space: nowrap;
  }
  .wf-name {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 13px;
    min-width: 180px;
    flex: 1 1 220px;
    height: 36px;
  }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    min-height: 34px;
    padding: 7px 11px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background .15s, border-color .15s, color .15s, transform .15s;
  }
  button:hover { background: var(--panel-3); border-color: var(--border-strong); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  button.primary { background: #2563eb; border-color: #3b82f6; color: #fff; }
  button.primary:hover { background: #1d4ed8; border-color: #60a5fa; }
  button.danger { color: #fff; background: var(--red); border-color: #dc2626; }
  button.active { background: var(--green); border-color: #16a34a; color: #fff; }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, .resizer:focus-visible {
    outline: 2px solid var(--accent-2);
    outline-offset: 2px;
  }
  .button-icon { width: 15px; height: 15px; margin-right: 5px; vertical-align: -2px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .spacer { flex: 1; }

  main { flex: 1; display: flex; min-height: 0; }

  .canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--canvas); min-width: 0; }
  #svg { width: 100%; height: 100%; display: block; background: var(--canvas); cursor: default; touch-action: none; }
  #svg.canvas-panning, body.is-space-panning #svg { cursor: grabbing; }

  .hint {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(17,29,48,.92);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    max-width: min(420px, calc(100% - 150px));
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(2,8,23,.22);
    backdrop-filter: blur(8px);
  }
  .hint b { color: var(--text); }
  .canvas-controls {
    position: absolute;
    left: 12px;
    bottom: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px;
    background: rgba(17,29,48,.94);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
  }
  .canvas-controls button { min-width: 34px; min-height: 32px; padding: 5px 9px; }
  .canvas-controls .zoom-readout { min-width: 62px; color: #bfdbfe; font-variant-numeric: tabular-nums; }
  .canvas-controls .fit-view { min-width: 48px; }

  /* Sidebar */
  aside {
    width: 340px;
    min-width: 280px;
    max-width: 55vw;
    background: var(--panel);
    padding: 16px;
    overflow-y: auto;
    border-left: 1px solid rgba(72, 97, 127, .2);
    scrollbar-color: var(--border-strong) transparent;
  }
  .resizer {
    width: 7px;
    margin-left: -3px;
    margin-right: -3px;
    background: transparent;
    cursor: col-resize;
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    user-select: none;
  }
  .resizer::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 1px;
    width: 1px;
    background: var(--border);
    transition: background 0.15s, width 0.15s, left 0.15s;
  }
  .resizer:hover::before, .resizer.dragging::before {
    background: var(--accent);
    width: 3px;
    left: 0px;
  }
  aside > h2:first-child {
    position: sticky;
    top: -16px;
    z-index: 5;
    margin: -16px -16px 14px;
    padding: 16px;
    color: var(--text);
    background: rgba(17,29,48,.96);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 8px 16px rgba(2,8,23,.14);
    backdrop-filter: blur(8px);
  }
  aside h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 10px; }
  aside h3 { font-size: 12px; color: var(--text); margin: 18px 0 9px; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .field input:hover, .field select:hover, .field textarea:hover { border-color: var(--border-strong); }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.14); outline: none; }
  .inspector-card {
    padding: 11px;
    background: rgba(24,39,61,.82);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .inspector-card.clickable { cursor: pointer; transition: border-color .15s, background .15s; }
  .inspector-card.clickable:hover { background: var(--panel-2); border-color: var(--accent); }
  .empty-note { color: var(--muted); font-size: 13px; line-height: 1.5; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .badge { font-size: 11px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(59, 130, 246, .16);
    border: 1px solid rgba(59, 130, 246, .45);
    color: #bfdbfe;
    border-radius: 999px;
    padding: 3px 7px;
    font-size: 12px;
  }
  .chip button {
    width: auto;
    padding: 0 4px;
    border: 0;
    background: transparent;
    color: #bfdbfe;
    font-size: 12px;
    line-height: 1;
  }
  .chip button:hover { background: rgba(191, 219, 254, .16); }

  /* SVG node styling */
  .node rect, .node circle.body {
    cursor: grab;
  }
  .node rect {
    rx: 12; ry: 12;
    stroke-width: 2;
  }
  .node circle.body { stroke-width: 2; }
  .node polygon.body { stroke-width: 2; cursor: grab; }
  .node.startEvent circle.body { fill: #14532d; stroke: var(--green); }
  .node.endEvent circle.body   { fill: #450a0a; stroke: var(--red); stroke-width: 5; }
  .node.userTask rect { fill: #17385f; stroke: #60a5fa; }
  .node.task rect     { fill: #1b2b42; stroke: #8aa0ba; }
  .node.serviceTask rect { fill: #104c49; stroke: #2dd4bf; }
  .node.scriptTask rect { fill: #28205d; stroke: #a78bfa; }
  .node.exclusiveGateway polygon.body { fill: #422006; stroke: var(--amber); }
  .node.errorEndEvent circle.body { fill: #450a0a; stroke: var(--red); stroke-width: 5; }
  .node.errorBoundaryEvent circle.body { fill: #1f0a0a; stroke: var(--red); stroke-width: 3; }
  .node.errorBoundaryEvent circle.ring { fill: none; stroke: var(--red); stroke-width: 1.5; }
  .node.intermediateMessageCatchEvent circle.body { fill: #0c4a6e; stroke: #38bdf8; stroke-width: 2; }
  .node.intermediateMessageCatchEvent circle.ring { fill: none; stroke: #38bdf8; stroke-width: 1.5; }
  .node.messageStartEvent circle.body { fill: #14532d; stroke: #38bdf8; stroke-width: 2; }
  .node { transition: filter .15s; }
  .node:hover { filter: drop-shadow(0 6px 10px rgba(2,8,23,.38)); }
  .node.selected { filter: drop-shadow(0 0 8px rgba(255,255,255,.24)); }
  .node.selected rect,
  .node.selected circle.body,
  .node.selected polygon.body { stroke: #fff; stroke-width: 3; }
  .node.selected.errorBoundaryEvent circle.body { stroke: #fff; stroke-width: 3; }
  .node text { fill: #fff; font-size: 13px; pointer-events: none; user-select: none; }
  .node .nid { fill: #d6e0ed; font-size: 10.5px; }
  .node .roles { fill: #b7c5d7; font-size: 10px; }
  .node .node-title { font-size: 13.5px; font-weight: 650; }
  .node .event-name { font-size: 12px; }
  .node .node-icon { color: #dbeafe; pointer-events: none; }
  .node .node-separator { stroke: rgba(203, 213, 225, .18); stroke-width: 1; pointer-events: none; }
  .node.startEvent .node-icon { color: #86efac; }
  .node.messageStartEvent .node-icon, .node.intermediateMessageCatchEvent .node-icon { color: #7dd3fc; }
  .node.endEvent .node-icon, .node.errorEndEvent .node-icon, .node.errorBoundaryEvent .node-icon { color: #fca5a5; }
  .node.exclusiveGateway .node-icon { color: #fbbf24; }
  .node.task .node-icon { color: #d6e0ed; }
  .node.serviceTask .node-icon { color: #99f6e4; }
  .node.scriptTask .node-icon { color: #ddd6fe; }
  .node .status-icon { color: #bfdbfe; pointer-events: none; }
  .node .mi-marker line { stroke: #bfdbfe; stroke-width: 1.6; }
  .node .connect-handle { opacity: 0; pointer-events: none; transition: opacity .12s, transform .12s; }
  .node:hover .connect-handle,
  .node.selected .connect-handle,
  .node.connect-source .connect-handle { opacity: 1; pointer-events: all; }
  .node .connect-handle .handle-hit { fill: transparent; stroke: none; cursor: crosshair; }
  .node .connect-handle .handle-dot {
    fill: #0b1728;
    stroke: #60a5fa;
    stroke-width: 2;
    vector-effect: non-scaling-stroke;
    cursor: crosshair;
  }
  .node .connect-handle:hover .handle-dot { fill: #2563eb; stroke: #dbeafe; }
  .node.connect-source rect,
  .node.connect-source circle.body,
  .node.connect-source polygon.body { stroke: #60a5fa; stroke-width: 3; }
  .node.connect-target-available rect,
  .node.connect-target-available circle.body,
  .node.connect-target-available polygon.body { stroke: #34d399; stroke-width: 3; }
  .node.connect-target-hover { filter: drop-shadow(0 0 10px rgba(52,211,153,.72)); }
  .node.connect-target-hover rect,
  .node.connect-target-hover circle.body,
  .node.connect-target-hover polygon.body { stroke: #a7f3d0; stroke-width: 4; }
  .node.connect-target-invalid rect,
  .node.connect-target-invalid circle.body,
  .node.connect-target-invalid polygon.body { stroke: #f87171; stroke-width: 3; }

  .lane rect.body {
    fill: rgba(59, 130, 246, .08);
    stroke: #64748b;
    stroke-width: 2;
    stroke-dasharray: 8 5;
    cursor: grab;
  }
  .lane.selected rect.body { stroke: #fff; stroke-width: 3; }
  .lane text { fill: #cbd5e1; font-size: 13px; pointer-events: none; user-select: none; }
  .lane .pid { fill: var(--muted); font-size: 11px; }
  .lane .resize {
    fill: var(--accent);
    stroke: #bfdbfe;
    stroke-width: 1;
    cursor: nwse-resize;
  }

  .edge .edge-line { fill: none; stroke: #93a8c2; stroke-width: 2.2; pointer-events: none; transition: stroke .15s, stroke-width .15s; }
  .edge .edge-hit { fill: none; stroke: transparent; stroke-width: 14; cursor: pointer; pointer-events: stroke; }
  .edge.auto .edge-line { stroke-dasharray: 7 5; }
  .edge:hover .edge-line, .edge.hovered .edge-line { stroke: var(--accent-2); stroke-width: 3; }
  .edge.selected .edge-line { stroke: var(--amber); stroke-width: 3.2; }
  .edge.error .edge-line { stroke: #f87171; stroke-dasharray: 6 5; }
  .edge-label { cursor: pointer; }
  .edge-label .label-bg { fill: rgba(9,17,31,.96); stroke: #3d526d; stroke-width: 1; }
  .edge:hover .edge-label .label-bg, .edge.hovered .edge-label .label-bg { stroke: var(--accent-2); }
  .edge.selected .edge-label .label-bg { stroke: var(--amber); }
  .edge.error .edge-label .label-bg { stroke: #f87171; }
  .edge-label .label-main { fill: #f1f5f9; font-size: 11px; font-weight: 650; }
  .edge-label .label-meta { fill: #afbdd0; font-size: 9.5px; }
  .edge-label .condition-indicator path { fill: rgba(245,158,11,.2); stroke: #fbbf24; stroke-width: 1.2; }
  .edge-label .condition-indicator circle { fill: #fbbf24; }
  .edge.error .edge-label .label-meta { fill: #fca5a5; }
  #connectionPreview { pointer-events: none; }
  #connectionPreview .preview-line {
    fill: none;
    stroke: #60a5fa;
    stroke-width: 2.5;
    stroke-dasharray: 7 5;
    vector-effect: non-scaling-stroke;
  }
  #connectionPreview.invalid .preview-line { stroke: #f87171; }
  #connectionPreview .preview-end { fill: #60a5fa; stroke: #dbeafe; stroke-width: 1.5; vector-effect: non-scaling-stroke; }
  #connectionPreview.invalid .preview-end { fill: #f87171; }

  /* JS Editor Modal Overlay */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  
  /* Modal Container */
  .modal-container {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 85vw;
    height: 85vh;
    max-width: 960px;
    max-height: 750px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: modalFadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  @keyframes modalFadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
  
  /* Modal Header */
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .modal-header h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  
  .modal-header .close-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  
  .modal-header .close-btn:hover {
    color: var(--text);
    background: var(--panel-2);
  }
  
  /* Modal Body */
  .modal-body {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  
  /* Modal Textarea */
  .modal-textarea {
    flex: 1;
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: monospace;
    font-size: 14px;
    padding: 16px;
    resize: none;
    outline: none;
    line-height: 1.5;
  }
  
  .modal-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
  }
  
  /* Modal Footer */
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(15, 23, 42, 0.2);
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
  }

  .modal-body .chip {
    cursor: pointer;
    transition: background-color 0.15s, border-color 0.15s;
  }
  .modal-body .chip:hover {
    background: rgba(59, 130, 246, 0.25);
    border-color: rgba(59, 130, 246, 0.7);
  }
  .validation-list {
    margin: 0;
    padding-left: 22px;
    overflow-y: auto;
    line-height: 1.5;
  }
  .validation-list li { margin-bottom: 8px; color: #fecaca; }
  .js-editor-layout { display: flex; flex-direction: row; gap: 20px; }
  .js-code-column { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .js-variables-panel { width: 280px; display: flex; flex-direction: column; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; min-height: 0; }
  .js-variables-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; min-height: 0; padding-right: 4px; }
  .validation-modal-container { max-width: 720px; max-height: 75vh; }

  @media (max-width: 1050px) {
    header { gap: 8px; }
    .toolbar-identity { flex-basis: 100%; }
    .toolbar-group { flex: 1 1 auto; }
    aside { width: 310px; }
  }
  @media (max-width: 820px) {
    .js-editor-layout { flex-direction: column; overflow-y: auto; }
    .js-code-column { min-height: 320px; }
    .js-variables-panel { width: 100%; max-height: 280px; }
    .modal-container { width: 94vw; height: 92vh; }
    .button-label { display: none; }
    .button-icon { margin-right: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>
<header class="app-toolbar">
  <div class="toolbar-identity">
    <div class="app-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="12" r="2.5"/><rect x="16.5" y="4" width="5" height="5" rx="1"/><rect x="16.5" y="15" width="5" height="5" rx="1"/><path d="M7.5 12h4.5c2.5 0 2-5.5 4.5-5.5M12 12c2.5 0 2 5.5 4.5 5.5"/></svg>
    </div>
    <h1>Workflow Editor</h1>
    <input id="wfName" class="wf-name" placeholder="Workflow name" aria-label="Workflow name" />
  </div>
  <div class="toolbar-group" aria-label="Authoring actions">
    <button id="addStepBtn" class="primary" title="Add a workflow node"><svg class="button-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span class="button-label">Add Node</span></button>
    <button id="addPhaseBtn" title="Add a swimlane"><svg class="button-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg><span class="button-label">Add Lane</span></button>
    <button id="connectBtn" title="Connect two nodes with a sequence flow"><svg class="button-icon" viewBox="0 0 24 24"><circle cx="5" cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/><path d="M7.5 12h9M14 9l3 3-3 3"/></svg><span class="button-label">Connect Flow</span></button>
  </div>
  <div class="spacer"></div>
  <div class="toolbar-group" aria-label="File actions">
    <button id="newBtn" title="Create a new workflow"><svg class="button-icon" viewBox="0 0 24 24"><path d="M6 3h9l4 4v14H6z"/><path d="M14 3v5h5M9 14h6M12 11v6"/></svg><span class="button-label">New</span></button>
    <button id="loadBtn" title="Load workflow JSON"><svg class="button-icon" viewBox="0 0 24 24"><path d="M4 19h16V8h-8l-2-3H4z"/><path d="M12 10v6M9 13l3 3 3-3"/></svg><span class="button-label">Load JSON</span></button>
    <button id="saveBtn" title="Save workflow JSON"><svg class="button-icon" viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5z"/><path d="M8 3v6h8V3M8 21v-7h8v7"/></svg><span class="button-label">Save JSON</span></button>
  </div>
  <input id="fileInput" type="file" accept="application/json,.json" hidden />
</header>

<main>
  <div class="canvas-wrap">
    <svg id="svg" role="application" aria-label="Workflow diagram canvas">
      <defs>
        <pattern id="gridPattern" width="24" height="24" patternUnits="userSpaceOnUse">

    delete node.message;

    node.variables = [];

    delete node.message;

    if (node.scriptFormat === SCRIPT_FORMAT.JAVASCRIPT) {

    delete node.message;

    // attachedToRef and the optional errorVariable, nothing else.
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
    node.assignee = null;
    delete node.service;
    node.assignments = [];
    delete node.scriptFormat;
    node.script = null;
    delete node.message;
    if (typeof node.attachedToRef !== "number") node.attachedToRef = null;
    if (typeof node.errorVariable !== "string" || !node.errorVariable.trim()) node.errorVariable = null;

    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
    node.assignee = null;
    delete node.service;
    node.assignments = [];
    delete node.scriptFormat;
    delete node.script;
    node.message = normalizeMessage(node.message, false, model.variables);
  } else if (isMessageStartEventType(node.type)) {

    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;

    node.roles = [];
    node.variables = node.variables || [];
    node.assignee = null;

    node.assignments = [];

  } else if (isUserTaskType(node.type)) {
    node.variables = node.variables || [];

    if (!CLAIM_MODE_OPTIONS.some(o => o.value === node.claimMode)) node.claimMode = CLAIM_MODE.FRESH;
    if (node.claimMode !== CLAIM_MODE.FROM_NODE) node.inheritClaimFromNodeId = null;
    delete node.message;
    if (node.multiInstance) {
      node.assignee = null;
      node.multiInstance.mode = canonicalizeKnownValue(
        node.multiInstance.mode, ["parallel", "sequential"], "parallel");
      node.multiInstance.source = canonicalizeKnownValue(
        node.multiInstance.source, ["collection", "cardinality"], "collection");
      node.multiInstance.completionEvaluation = canonicalizeKnownValue(
        node.multiInstance.completionEvaluation, ["afterEach", "afterAll"], "afterEach");
      if (node.multiInstance.source === "collection") {

        node.multiInstance.cardinalityExpression = null;
        node.multiInstance.onePerActor = false;
      } else if (node.multiInstance.source === "cardinality") {

function nextCompletionPriority(flows) {

  let flowIdSeed = model.sequenceFlows.reduce((max, flow) => Math.max(max, flow.id), 0) + 1;
  for (const node of model.flowNodes.filter(node => isUserTaskType(node.type))) {
    const outgoing = outgoingFlows(node.id);
    if (!node.multiInstance) {
      for (const flow of outgoing.filter(flow => flow.isDefault)) {
        flow.isDefault = false;
        flow.isSelectable = true;
        flow.condition = null;
      }
      continue;
    }

    for (const legacyDefault of outgoing.filter(flow => flow.isDefault && flow.isSelectable !== false)) {
      legacyDefault.isDefault = false;
      legacyDefault.condition = null;
      legacyDefault.cancelRemainingInstances = false;
      legacyDefault.completionCondition ||= "1 == 0";
      const priorityConflict = !Number.isInteger(legacyDefault.completionPriority)
        || legacyDefault.completionPriority <= 0
        || outgoing.some(flow => flow !== legacyDefault
          && flow.completionPriority === legacyDefault.completionPriority);
      if (priorityConflict) legacyDefault.completionPriority = nextCompletionPriority(outgoing);

      const fallback = {
        id: flowIdSeed++, name: "", externalId: null,
        sourceRef: legacyDefault.sourceRef, targetRef: legacyDefault.targetRef,
        roles: [], variables: [], condition: null,
        isDefault: true, isSelectable: false, canActWithoutClaim: false,
        completionCondition: null, completionPriority: null, cancelRemainingInstances: false

      outgoing.push(fallback);

  }

function applyFlowInvariants(flow) {
  const source = getNode(flow.sourceRef);
  const isUserTaskFlow = source && source.type === NODE_TYPE.USER_TASK;
  const gateway = source && isGatewayType(source.type);
  if (typeof flow.isSelectable !== "boolean") flow.isSelectable = true;
  if (!isUserTaskFlow || !source.multiInstance) flow.isSelectable = true;
  if (!isUserTaskFlow) {
    flow.roles = [];
  }
  if (gateway) {
    flow.variables = [];
  } else if (!isUserTaskFlow) {
    flow.variables = [];
    flow.condition = null;
    flow.isDefault = false;
    flow.completionCondition = null;
    flow.completionPriority = null;
    flow.cancelRemainingInstances = false;
  } else if (source.multiInstance) {
    if (flow.isDefault) {
      flow.isSelectable = false;
      flow.roles = [];
      flow.variables = [];
      flow.condition = null;
      flow.canActWithoutClaim = false;
      flow.completionCondition = null;
      flow.completionPriority = null;
      flow.cancelRemainingInstances = false;
    } else if (flow.cancelRemainingInstances) {
      flow.isSelectable = true;
      flow.isDefault = false;
      flow.completionCondition = null;
      flow.completionPriority = null;
    } else if (!flow.isSelectable) {
      flow.roles = [];
      flow.variables = [];
      flow.condition = null;
      flow.canActWithoutClaim = false;
    }
  } else {
    const wasDefault = flow.isDefault;
    flow.isDefault = false;
    flow.isSelectable = true;
    if (wasDefault) flow.condition = null;
    flow.completionCondition = null;
    flow.completionPriority = null;
    flow.cancelRemainingInstances = false;
  }
}

function appendSvgTitle(parent, text) {
  const title = el("title", {});
  title.textContent = text;
  parent.appendChild(title);

function truncateText(value, maxLength) {
  const text = String(value ?? "").trim();
  return text.length > maxLength ? text.slice(0, Math.max(1, maxLength - 1)).trimEnd() + "…" : text;
}

function wrapTextLines(value, maxChars, maxLines = 2) {
  const text = String(value ?? "").trim() || "Unnamed";
  const words = text.split(/\s+/);
  const lines = [];
  let current = "";
  let truncated = false;

  for (const originalWord of words) {
    let word = originalWord;
    while (word.length > maxChars) {
      if (current) { lines.push(current); current = ""; }
      lines.push(word.slice(0, maxChars));
      word = word.slice(maxChars);
    }
    if (!word) continue;
    const candidate = current ? `${current} ${word}` : word;
    if (candidate.length <= maxChars) current = candidate;
    else { if (current) lines.push(current); current = word; }
  }
  if (current) lines.push(current);
  if (lines.length > maxLines) {
    lines.length = maxLines;
    truncated = true;
  }
  if (truncated) {
    const last = lines[maxLines - 1];
    lines[maxLines - 1] = last.slice(0, Math.max(1, maxChars - 1)).trimEnd() + "…";
  }
  return lines;
}

function appendTextLines(parent, lines, attrs, lineHeight = 16) {
  const text = el("text", attrs);
  lines.forEach((line, index) => {
    const span = el("tspan", { x: attrs.x, dy: index === 0 ? 0 : lineHeight });
    span.textContent = line;
    text.appendChild(span);
  });
  parent.appendChild(text);
  return text;
}

/* ---------- Geometry ---------- */
// The render position of a node: boundary events are anchored to their host's
// border and move with the host, so their position is derived, not stored.
function nodePosition(node) {
  if (isBoundaryEventType(node.type)) {
    const host = getNode(node.attachedToRef);
    if (host) {
      const hs = nodeSize(host);
      return { x: host.x + hs.w - BOUNDARY_D / 2, y: host.y + hs.h - BOUNDARY_D / 2 };
    }
  }
  return { x: node.x, y: node.y };
}
function center(node) {
  const size = nodeSize(node);
  const pos = nodePosition(node);
  return { x: pos.x + size.w / 2, y: pos.y + size.h / 2 };
}

// intersection of line from shape center toward target point with shape border
function borderPoint(node, tx, ty) {
  const c = center(node);
  const dx = tx - c.x, dy = ty - c.y;
  if (dx === 0 && dy === 0) return c;
  if (isBoundaryEventType(node.type)) {
    const r = BOUNDARY_D / 2;
    const scale = r / Math.sqrt(dx * dx + dy * dy);
    return { x: c.x + dx * scale, y: c.y + dy * scale };
  }
  if (isEventType(node.type)) {
    const r = EVENT_D / 2;
    const scale = r / Math.sqrt(dx * dx + dy * dy);
    return { x: c.x + dx * scale, y: c.y + dy * scale };
  }
  if (isGatewayType(node.type)) {
    const hw = GATEWAY_D / 2, hh = GATEWAY_D / 2;
    // rhombus border: |dx|/hw + |dy|/hh = 1
    const t = 1 / (Math.abs(dx) / hw + Math.abs(dy) / hh);
    return { x: c.x + dx * t, y: c.y + dy * t };
  }
  const hw = NODE_W / 2, hh = NODE_H / 2;
  const scale = Math.min(
    hw / Math.abs(dx || 1e-9),
    hh / Math.abs(dy || 1e-9)
  );
  return { x: c.x + dx * scale, y: c.y + dy * scale };
}

function segmentsIntersect(p1, p2, q1, q2) {
  const dx1 = p2.x - p1.x;
  const dy1 = p2.y - p1.y;
  const dx2 = q2.x - q1.x;
  const dy2 = q2.y - q1.y;
  const det = dx1 * dy2 - dy1 * dx2;
  if (Math.abs(det) < 1e-9) return false;
  const dx3 = q1.x - p1.x;
  const dy3 = q1.y - p1.y;
  const lambda = (dx3 * dy2 - dy3 * dx2) / det;
  const gamma = (dx3 * dy1 - dy3 * dx1) / det;
  return (lambda >= 0 && lambda <= 1) && (gamma >= 0 && gamma <= 1);
}

function lineIntersectsNode(p1, p2, node, padding = 14) {
  if (isBoundaryEventType(node.type)) return false; // attached to host; not a routing obstacle
  const size = nodeSize(node);
  const pos = nodePosition(node);
  const x = pos.x - padding, y = pos.y - padding;
  const w = size.w + padding * 2, h = size.h + padding * 2;
  const tl = { x, y };
  const tr = { x: x + w, y };
  const bl = { x, y: y + h };
  const br = { x: x + w, y: y + h };
  return segmentsIntersect(p1, p2, tl, tr) ||
         segmentsIntersect(p1, p2, tr, br) ||
         segmentsIntersect(p1, p2, bl, br) ||
         segmentsIntersect(p1, p2, tl, bl);
}

function pullPointToward(point, toward, distance) {
  const dx = toward.x - point.x;
  const dy = toward.y - point.y;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  return { x: point.x + dx / len * distance, y: point.y + dy / len * distance };
}

      const idText = el("text", { x: 34, y: 20, class: "nid" });
      idText.textContent = `#${node.id} · ${typeLabel(node.type)}${marker}`;
      g.appendChild(idText);
      const nameLines = wrapTextLines(node.name, 24, 2);
      appendTextLines(g, nameLines, {
        x: NODE_W / 2, y: nameLines.length === 1 ? 53 : 44,
        class: "node-title", "text-anchor": "middle"
      }, 16);
      if (isUserTaskType(node.type)) {
        if (roles) {
          const rolesText = el("text", { x: 12, y: 81, class: "roles" });
          rolesText.textContent = roles;
          g.appendChild(rolesText);
        }
        if (node.multiInstance) appendMultiInstanceMarker(g, node.multiInstance.mode);
        if (node.assignee) appendAssigneeMarker(g);
      }
    }

    appendConnectionHandles(g, node);

    if (isBoundaryEventType(node.type)) {
      g.addEventListener("pointerdown", (e) => {
        if (connectMode) { e.stopPropagation(); handleConnectClick(node); return; }
        e.stopPropagation();
        select('node', node.id);
      });
    } else {
      g.addEventListener("pointerdown", (e) => onNodePointerDown(e, node));
    }
    nodesG.appendChild(g);
  }
  updateConnectionVisualState();
}

function flowLabelInfo(flow, source) {
  const fallback = flowLabel(flow, source);
  const main = fallback || `Flow #${flow.id}`;
  const mainLines = wrapTextLines(main, 30, 2);
  const metadata = [];
  const roles = normalizeRoles(flow.roles);
  if (isUserTaskType(source.type) && flow.isSelectable === false) metadata.push("engine-only");
  if (flow.cancelRemainingInstances) metadata.push("interrupt");
  if (roles.length) metadata.push(roles.join(", "));
  if (flow.isDefault) metadata.push("default");
  const hasCondition = typeof flow.condition === "string" && flow.condition.trim() !== "";
  const metaFull = metadata.join(" · ");
  const metaDisplay = truncateText(metaFull, 46);
  const maxLineLength = Math.max(...mainLines.map(line => line.length), metaDisplay.length + (hasCondition ? 3 : 0), 9);
  const width = Math.min(230, Math.max(74, maxLineLength * 6.2 + 20));
  const hasFooter = !!metaDisplay || hasCondition;
  const metaTextWidth = Math.min(width - 20, metaDisplay.length * 5.2);
  const footerWidth = metaTextWidth + (hasCondition ? 8 : 0) + (hasCondition && metaDisplay ? 6 : 0);
  const height = 12 + mainLines.length * 13 + (hasFooter ? 14 : 0);
  const tooltipMeta = [...metadata, ...(hasCondition ? ["condition configured"] : [])].join(" · ");
  return {
    mainLines, metaDisplay, hasCondition, hasFooter, metaTextWidth, footerWidth, width, height,
    title: `Flow #${flow.id}: ${main}${tooltipMeta ? ` · ${tooltipMeta}` : ""}`
  };
}
function normalizeBusinessKeyForLoad(businessKey) {
  if (!businessKey || typeof businessKey !== "object") return businessKey;
  return {
    variable: businessKey.variable,
    uniqueness: canonicalizeKnownValue(
      businessKey.uniqueness, ["active", "all"], undefined)
  };
}

function normalizeIdempotencyForLoad(idempotency) {
  if (!idempotency || typeof idempotency !== "object") return idempotency;
  return {
    headerName: typeof idempotency.headerName === "string" ? idempotency.headerName.trim() : idempotency.headerName,
    variable: typeof idempotency.variable === "string" ? idempotency.variable.trim() : idempotency.variable
  };
}

function appendFlowLabel(g, info, x, y) {
  const labelG = el("g", { class: "edge-label", transform: `translate(${x},${y})` });
  appendSvgTitle(labelG, info.title);
  labelG.appendChild(el("rect", {
    class: "label-bg", x: -info.width / 2, y: -info.height / 2,
    width: info.width, height: info.height, rx: 7, ry: 7
  }));
  const top = -info.height / 2;
  appendTextLines(labelG, info.mainLines, {
    x: 0, y: top + 15, class: "label-main", "text-anchor": "middle"
  }, 13);
  if (info.hasFooter) {
    const metaY = top + 15 + (info.mainLines.length - 1) * 13 + 14;
    let footerX = -info.footerWidth / 2;
    if (info.hasCondition) {
      const icon = el("g", {
        class: "condition-indicator",
        transform: `translate(${footerX + 4},${metaY - 3})`
      });
      appendSvgTitle(icon, "Condition configured");
      icon.appendChild(el("path", { d: "M 0 -4 L 4 0 L 0 4 L -4 0 Z" }));
      icon.appendChild(el("circle", { cx: 0, cy: 0, r: 1.1 }));
      labelG.appendChild(icon);
      footerX += 8 + (info.metaDisplay ? 6 : 0);
    }
    if (info.metaDisplay) {
      const meta = el("text", { x: footerX, y: metaY, class: "label-meta", "text-anchor": "start" });
      meta.textContent = info.metaDisplay;
      labelG.appendChild(meta);
    }
  }
  g.appendChild(labelG);
}

function edgeLinePoint(start, end, t) {
  return { x: start.x + (end.x - start.x) * t, y: start.y + (end.y - start.y) * t };
}

function edgeQuadraticPoint(start, control, end, t) {
  const inverseT = 1 - t;
  return {
    x: inverseT * inverseT * start.x + 2 * inverseT * t * control.x + t * t * end.x,
    y: inverseT * inverseT * start.y + 2 * inverseT * t * control.y + t * t * end.y
  };
}

function edgeCubicPoint(start, control1, control2, end, t) {
  const inverseT = 1 - t;
  return {
    x: inverseT ** 3 * start.x + 3 * inverseT * inverseT * t * control1.x + 3 * inverseT * t * t * control2.x + t ** 3 * end.x,
    y: inverseT ** 3 * start.y + 3 * inverseT * inverseT * t * control1.y + 3 * inverseT * t * t * control2.y + t ** 3 * end.y
  };
}

function edgeLabelBounds(point, info) {
  return {
    left: point.x - info.width / 2,
    right: point.x + info.width / 2,
    top: point.y - info.height / 2,
    bottom: point.y + info.height / 2
  };
}

function edgeNodeBounds(node, padding = 0) {
  const pos = nodePosition(node);
  const size = nodeSize(node);
  let left = pos.x, right = pos.x + size.w;
  let top = pos.y, bottom = pos.y + size.h;
  // Events and gateways have their readable id/name/roles below the BPMN shape.
  if (!isBoundaryEventType(node.type) && (isEventType(node.type) || isGatewayType(node.type))) {
    const visualWidth = Math.max(size.w, 150);
    const midX = pos.x + size.w / 2;
    left = midX - visualWidth / 2;
    right = midX + visualWidth / 2;
    bottom += isStartEventType(node.type) ? 74 : 62;
  }
  return {
    left: left - padding, right: right + padding,
    top: top - padding, bottom: bottom + padding
  };
}

function edgeRectsOverlap(first, second, gap = 0) {
  return first.left < second.right + gap && first.right + gap > second.left &&
         first.top < second.bottom + gap && first.bottom + gap > second.top;
}

function edgeRectOverlapArea(first, second, gap = 0) {
  const overlapX = Math.min(first.right + gap / 2, second.right + gap / 2) -
                   Math.max(first.left - gap / 2, second.left - gap / 2);
  const overlapY = Math.min(first.bottom + gap / 2, second.bottom + gap / 2) -
                   Math.max(first.top - gap / 2, second.top - gap / 2);
  return overlapX > 0 && overlapY > 0 ? overlapX * overlapY : 0;
}

function buildEdgeGeometry(flow, group, selfGroup) {
  const source = getNode(flow.sourceRef);
  const target = getNode(flow.targetRef);
  if (!source || !target) return null;

  if (source.id === target.id) {
    const info = flowLabelInfo(flow, source);
    const pos = nodePosition(source);
    const size = nodeSize(source);
    const loopIndex = selfGroup ? selfGroup.flows.findIndex(item => item.id === flow.id) : 0;
    const loopCount = selfGroup?.flows.length || 1;
    const maxHeight = selfGroup?.maxLabelHeight || info.height;
    const stackOffset = (loopIndex - (loopCount - 1) / 2) * (maxHeight + 12);
    const right = pos.x + size.w;
    const start = { x: right, y: pos.y + size.h * .38 };
    const end = { x: right, y: pos.y + size.h * .72 };
    const labelReach = Math.max(78, info.width / 2 + 20) + Math.abs(stackOffset) * .14;
    const controlReach = labelReach + 20;
    const control1 = { x: right + controlReach, y: start.y - 54 + stackOffset };
    const control2 = { x: right + controlReach, y: end.y + 54 + stackOffset };
    const targetPoint = pullPointToward(end, control2, 5);
    return {
      d: `M ${start.x} ${start.y} C ${control1.x} ${control1.y}, ${control2.x} ${control2.y}, ${targetPoint.x} ${targetPoint.y}`,
      pointAt: t => edgeCubicPoint(start, control1, control2, targetPoint, t),
      labelPoint: { x: right + labelReach, y: pos.y + size.h / 2 + stackOffset }
    };
  }

  const canonicalSource = getNode(group.a);
  const canonicalTarget = getNode(group.b);
  const canonicalStartCenter = center(canonicalSource);
  const canonicalEndCenter = center(canonicalTarget);
  const dx = canonicalEndCenter.x - canonicalStartCenter.x;
  const dy = canonicalEndCenter.y - canonicalStartCenter.y;
  const length = Math.sqrt(dx * dx + dy * dy);
  const normal = length > 1e-6 ? { x: -dy / length, y: dx / length } : { x: 0, y: 1 };
  const midpoint = {
    x: (canonicalStartCenter.x + canonicalEndCenter.x) / 2,
    y: (canonicalStartCenter.y + canonicalEndCenter.y) / 2
  };
  const index = group.flows.findIndex(item => item.id === flow.id);
  const laneIndex = index - (group.flows.length - 1) / 2;
  const physicalOffset = laneIndex * group.laneSpacing + (group.detourOffset || 0);

  if (Math.abs(physicalOffset) < 1e-6) {
    const sourceCenter = center(source);
    const targetCenter = center(target);
    const start = borderPoint(source, targetCenter.x, targetCenter.y);
    const end = borderPoint(target, sourceCenter.x, sourceCenter.y);
    const targetPoint = pullPointToward(end, start, 5);
    return {
      d: `M ${start.x} ${start.y} L ${targetPoint.x} ${targetPoint.y}`,
      pointAt: t => edgeLinePoint(start, targetPoint, t)
    };
  }

  const control = {
    x: midpoint.x + physicalOffset * 2 * normal.x,
    y: midpoint.y + physicalOffset * 2 * normal.y
  };
  const start = borderPoint(source, control.x, control.y);
  const end = borderPoint(target, control.x, control.y);
  const targetPoint = pullPointToward(end, control, 5);
  return {
    d: `M ${start.x} ${start.y} Q ${control.x} ${control.y} ${targetPoint.x} ${targetPoint.y}`,
    pointAt: t => edgeQuadraticPoint(start, control, targetPoint, t)
  };
}

function edgePointInsideBox(point, box) {
  return point.x >= box.left && point.x <= box.right &&
         point.y >= box.top && point.y <= box.bottom;
}

function edgeCurveHitsBox(geometry, box) {
  const topLeft = { x: box.left, y: box.top };
  const topRight = { x: box.right, y: box.top };
  const bottomLeft = { x: box.left, y: box.bottom };
  const bottomRight = { x: box.right, y: box.bottom };
  let previous = geometry.pointAt(0);
  if (edgePointInsideBox(previous, box)) return true;
  // A sampled polyline keeps obstacle checks dependency-free while remaining
  // precise enough for the editor's quadratic routes and smallest BPMN shape.
  for (let index = 1; index <= 80; index++) {
    const current = geometry.pointAt(index / 80);
    if (edgePointInsideBox(current, box) ||
        segmentsIntersect(previous, current, topLeft, topRight) ||
        segmentsIntersect(previous, current, topRight, bottomRight) ||
        segmentsIntersect(previous, current, bottomRight, bottomLeft) ||
        segmentsIntersect(previous, current, bottomLeft, topLeft)) {
      return true;
    }
    previous = current;
  }
  return false;
}

function routePairGeometries(group) {
  const obstacles = model.flowNodes
    .filter(node => node.id !== group.a && node.id !== group.b && !isBoundaryEventType(node.type))
    .map(node => edgeNodeBounds(node, 14));
  const buildAt = detourOffset => {
    group.detourOffset = detourOffset;
    return new Map(group.flows.map(flow => [flow.id, buildEdgeGeometry(flow, group, null)]));
  };
  const collisionCount = geometries => {
    let collisions = 0;
    for (const geometry of geometries.values()) {
      for (const obstacle of obstacles) {
        if (edgeCurveHitsBox(geometry, obstacle)) collisions++;
      }
    }
    return collisions;
  };

  const direct = buildAt(0);
  if (!obstacles.length || collisionCount(direct) === 0) return direct;

  const canonicalStart = center(getNode(group.a));
  const canonicalEnd = center(getNode(group.b));
  const dx = canonicalEnd.x - canonicalStart.x;
  const dy = canonicalEnd.y - canonicalStart.y;
  const preferredSign = Math.abs(dx) >= Math.abs(dy) ? (dx >= 0 ? -1 : 1) : (dy >= 0 ? -1 : 1);
  const centerDistance = Math.sqrt(dx * dx + dy * dy);
  const maxDetour = Math.min(800, Math.max(360, centerDistance * .9));
  let bestFallback = { geometries: direct, detourOffset: 0, collisions: collisionCount(direct) };

  for (let distance = 48; distance <= maxDetour + .001; distance += 8) {
    for (const sign of [preferredSign, -preferredSign]) {
      const detourOffset = sign * distance;
      const geometries = buildAt(detourOffset);
      const collisions = collisionCount(geometries);
      if (collisions === 0) return geometries;
      if (collisions < bestFallback.collisions) {
        bestFallback = { geometries, detourOffset, collisions };
      }
    }
  }
  group.detourOffset = bestFallback.detourOffset;
  return bestFallback.geometries;
}

function buildPairLabelLayout(group, geometries, tStep, tDirection, centerOffset) {
  const placements = new Map();
  for (let index = 0; index < group.flows.length; index++) {
    const flow = group.flows[index];
    const laneIndex = index - (group.flows.length - 1) / 2;
    const canonicalT = .5 + centerOffset + laneIndex * tStep * tDirection;
    if (canonicalT < .16 || canonicalT > .84) return null;
    const actualT = flow.sourceRef === group.a ? canonicalT : 1 - canonicalT;
    const geometry = geometries.get(flow.id);
    const point = geometry.pointAt(actualT);
    const info = group.labelInfos.get(flow.id);
    placements.set(flow.id, { point, box: edgeLabelBounds(point, info) });
  }
  return placements;
}

function scorePairLabelLayout(placements, nodeBoxes, reservedBoxes) {
  const items = [...placements.values()];
  let collisions = 0;
  let overlapArea = 0;
  for (let i = 0; i < items.length; i++) {
    for (let j = i + 1; j < items.length; j++) {
      if (edgeRectsOverlap(items[i].box, items[j].box, 10)) {
        collisions++;
        overlapArea += edgeRectOverlapArea(items[i].box, items[j].box, 10);
      }
    }
    for (const nodeBox of nodeBoxes) {
      if (edgeRectsOverlap(items[i].box, nodeBox, 6)) {
        collisions++;
        overlapArea += edgeRectOverlapArea(items[i].box, nodeBox, 6);
      }
    }
    for (const reserved of reservedBoxes) {
      if (edgeRectsOverlap(items[i].box, reserved, 10)) {
        collisions++;
        overlapArea += edgeRectOverlapArea(items[i].box, reserved, 10);
      }
    }
  }
  return { valid: collisions === 0, penalty: collisions * 1000000 + overlapArea };
}

function renderEdges() {
  edgesG.innerHTML = "";
  const pathLayer = el("g", { class: "edge-path-layer" });
  const labelLayer = el("g", { class: "edge-label-layer" });
  edgesG.appendChild(pathLayer);
  edgesG.appendChild(labelLayer);

  const pairGroups = new Map();
  const selfGroups = new Map();
  for (const flow of model.sequenceFlows) {
    const source = getNode(flow.sourceRef);
    const target = getNode(flow.targetRef);
    if (!source || !target) continue;
    if (flow.sourceRef === flow.targetRef) {
      if (!selfGroups.has(flow.sourceRef)) selfGroups.set(flow.sourceRef, { flows: [] });
      selfGroups.get(flow.sourceRef).flows.push(flow);
      continue;
    }
    const a = Math.min(flow.sourceRef, flow.targetRef);
    const b = Math.max(flow.sourceRef, flow.targetRef);
    const key = `${a}:${b}`;
    if (!pairGroups.has(key)) pairGroups.set(key, { a, b, flows: [] });
    pairGroups.get(key).flows.push(flow);
  }
  selfGroups.forEach(group => {
    group.flows.sort((left, right) => left.id - right.id);
    group.maxLabelHeight = Math.max(...group.flows.map(flow =>
      flowLabelInfo(flow, getNode(flow.sourceRef)).height));
  });

  const geometries = new Map();
  const labelPlacements = new Map();
  const reservedBoxes = [];
  const nodeBoxes = model.flowNodes.map(node => edgeNodeBounds(node));
  const orderedGroups = [...pairGroups.values()].sort((left, right) => left.a - right.a || left.b - right.b);

  for (const group of orderedGroups) {
    group.flows.sort((left, right) => left.id - right.id);
    group.labelInfos = new Map(group.flows.map(flow =>
      [flow.id, flowLabelInfo(flow, getNode(flow.sourceRef))]));
    const maxHeight = Math.max(...[...group.labelInfos.values()].map(info => info.height));
    const baseSpacing = Math.min(64, Math.max(46, maxHeight + 10));
    const laneCandidates = group.flows.length > 1 ? [] : [0];
    if (group.flows.length > 1) {
      for (let spacing = baseSpacing; spacing < 72; spacing += 6) laneCandidates.push(spacing);
      if (laneCandidates[laneCandidates.length - 1] !== 72) laneCandidates.push(72);
    }
    const maxIndexDistance = (group.flows.length - 1) / 2;
    const maxTStep = maxIndexDistance > 0 ? Math.min(.30, .30 / maxIndexDistance) : 0;
    const centerOffsets = [0, -.04, .04, -.08, .08, -.12, .12];
    let chosen = null;
    let bestFallback = null;

    for (const laneSpacing of laneCandidates) {
      group.laneSpacing = laneSpacing;
      const candidateGeometries = routePairGeometries(group);
      for (let tStep = 0; tStep <= maxTStep + .001; tStep += .005) {
        const directions = tStep < .001 ? [1] : [1, -1];
        for (const centerOffset of centerOffsets) {
          for (const tDirection of directions) {
            const placements = buildPairLabelLayout(group, candidateGeometries, tStep, tDirection, centerOffset);
            if (!placements) continue;
            const score = scorePairLabelLayout(placements, nodeBoxes, reservedBoxes);
            const candidate = { laneSpacing, geometries: candidateGeometries, placements, score };
            if (!bestFallback || score.penalty < bestFallback.score.penalty) bestFallback = candidate;
            if (score.valid) { chosen = candidate; break; }
          }
          if (chosen) break;
        }
        if (chosen) break;
      }
      if (chosen) break;
    }

    // Even an impossibly short edge stays compact: choose the least-overlapping
    // exact layout found above instead of converting badge width into giant arcs.
    chosen ||= bestFallback;
    group.laneSpacing = chosen?.laneSpacing || 0;
    if (chosen) {
      chosen.geometries.forEach((geometry, flowId) => geometries.set(flowId, geometry));
      chosen.placements.forEach((placement, flowId) => {
        labelPlacements.set(flowId, placement.point);
        reservedBoxes.push(placement.box);
      });
    }
  }

  for (const group of selfGroups.values()) {
    for (const flow of group.flows) {
      const geometry = buildEdgeGeometry(flow, null, group);
      geometries.set(flow.id, geometry);
      labelPlacements.set(flow.id, geometry.labelPoint);
    }
  }

  for (const flow of model.sequenceFlows) {
    const source = getNode(flow.sourceRef);
    const target = getNode(flow.targetRef);
    const geometry = geometries.get(flow.id);
    if (!source || !target || !geometry) continue;

    const dashed = isPassThroughType(source.type);
    const isError = isBoundaryEventType(source.type);
    const selectedFlow = isSel('flow', flow.id);
    const edgeClass = `edge ${dashed ? "auto" : ""} ${isError ? "error" : ""} ${selectedFlow ? "selected" : ""}`;
    const pathGroup = el("g", { class: edgeClass, "data-flow": flow.id });
    const labelGroup = el("g", { class: edgeClass, "data-flow": flow.id });
    const markerId = selectedFlow ? "arrowSel" : (isError ? "arrowError" : "arrow");
    pathGroup.appendChild(el("path", { d: geometry.d, class: "edge-hit" }));
    pathGroup.appendChild(el("path", { d: geometry.d, class: "edge-line", "marker-end": `url(#${markerId})` }));

    const labelInfo = flowLabelInfo(flow, source);
    const labelPoint = labelPlacements.get(flow.id) || geometry.labelPoint || geometry.pointAt(.5);
    appendFlowLabel(labelGroup, labelInfo, labelPoint.x, labelPoint.y);
    const selectFlow = (event) => { event.stopPropagation(); select("flow", flow.id); };
    pathGroup.addEventListener("click", selectFlow);
    labelGroup.addEventListener("click", selectFlow);
    const setHover = hovered => {
      pathGroup.classList.toggle("hovered", hovered);
      labelGroup.classList.toggle("hovered", hovered);
    };
    pathGroup.addEventListener("mouseenter", () => setHover(true));
    pathGroup.addEventListener("mouseleave", () => setHover(false));
    labelGroup.addEventListener("mouseenter", () => setHover(true));
    labelGroup.addEventListener("mouseleave", () => setHover(false));
    pathLayer.appendChild(pathGroup);
    labelLayer.appendChild(labelGroup);
  }
}

function flowLabel(flow, source) {
  if (flow.name && flow.name.trim()) return flow.name.trim();
  source = source || getNode(flow.sourceRef);
  if (!source) return "";
  if (isBoundaryEventType(source.type)) return "error";
  if (isStartEventType(source.type)) return "start";
  if (isAutomaticType(source.type)) return "auto";
  if (isScriptTaskType(source.type)) return "script";
  return "";
}

function renderHint() {
  if (connectMode) {
    if (connectSource == null) {
      hintEl.innerHTML = "<b>Connect mode:</b> click the <b>source</b> node, or drag one of its connection handles.";
    } else {
      const source = getNode(connectSource);
      const extra = source && isSingleOutgoingType(source.type)
        ? " This node type can have exactly one outgoing flow."
        : "";
      hintEl.innerHTML = "<b>Connect mode:</b> now click the <b>target</b> node." + extra;
    }
  } else {
    hintEl.innerHTML = "Drag a node's blue handle to connect it. Drag nodes or lanes to move, drag empty canvas to pan, and use the wheel to zoom.";
  }
}

/* ---------- Inspector ---------- */
function renderInspector() {
  inspector.innerHTML = "";
  if (!selected) {
    inspector.innerHTML = `<h2>Workflow</h2>
      <p class="empty-note">Select a node or flow to edit it.<br><br>
      Lanes: <b>${model.lanes.length}</b><br>
      Flow nodes: <b>${model.flowNodes.length}</b><br>
      Sequence flows: <b>${model.sequenceFlows.length}</b></p>`;
    field("Workflow ID", "text", model.id ?? "", v => {
      model.id = v ? String(v).trim() : "";
    });
    addInitialSelector();
    addWorkflowRolesSection();
    addProcessVariablesSection();
    return;
  }
  if (selected.kind === 'lane') return renderLaneInspector();
  if (selected.kind === 'node') return renderNodeInspector();
  return renderFlowInspector();
}

function addWorkflowRolesSection() {
  model.cancelRoles = model.cancelRoles || [];
  model.unclaimRoles = model.unclaimRoles || [];

  const title = document.createElement("h3");
  title.textContent = "Permissions (Optional)";
  title.style.marginTop = "16px";
  title.style.marginBottom = "8px";
  inspector.appendChild(title);

  rolesFieldGeneric(model, "cancelRoles", "Roles allowed to cancel instance", () => {});
  rolesFieldGeneric(model, "unclaimRoles", "Roles allowed to unclaim a task", () => {});
}

function addProcessVariablesSection() {
  model.variables = model.variables || [];

  const title = document.createElement("h2");
  title.textContent = "Process variables";
  title.style.marginTop = "16px";
  inspector.appendChild(title);

  const hint = document.createElement("p");
  hint.className = "empty-note";
  hint.textContent = "Instance-scoped variables initialized from their default at start and updated by Script Task nodes. Usable in gateway conditions, service-task templates, and validation rules.";
  inspector.appendChild(hint);

  if (model.variables.length === 0) {
    const p = document.createElement("p");
    p.className = "empty-note";
    p.textContent = "No process variables.";
    inspector.appendChild(p);
  }
  model.variables.forEach(variable => variableRow(model, variable, true));

  const addBtn = document.createElement("button");
  addBtn.textContent = "+ Add process variable";
  addBtn.style.marginTop = "8px";
  addBtn.onclick = () => addVariable(model);
  inspector.appendChild(addBtn);
}

function addInitialSelector() {
  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = `<label>Default start event</label>`;
  const startEvents = model.flowNodes.filter(s => isStartEventType(s.type));
  if (startEvents.length === 0) {
    const note = document.createElement("p");
    note.className = "empty-note";
    note.textContent = "No user start events are defined (the workflow may be started via a message-start event instead).";
    f.appendChild(note);
  } else {
    const sel = document.createElement("select");
    sel.innerHTML = `<option value="">— none —</option>` +
      startEvents.map(s => `<option value="${s.id}" ${model.initialEventId === s.id ? "selected" : ""}>#${s.id} ${s.name}</option>`).join("");
    sel.onchange = () => { model.initialEventId = sel.value ? +sel.value : null; render(); };
    f.appendChild(sel);
  }
  inspector.appendChild(f);
}

function renderNodeInspector() {
  const node = getNode(selected.nodeId);
  if (!node) { selected = null; return renderInspector(); }
  applyTypeInvariants(node);
  inspector.innerHTML = `<h2>Node #${node.id}</h2>`;
  field("Node ID", "text", node.id, null, true);
  field("Name", "text", node.name, v => { node.name = v; renderNodes(); renderEdges(); });
  field("External ID", "text", node.externalId ?? "", v => { node.externalId = v.trim() ? v : null; });
  if (isBoundaryEventType(node.type)) {
    // Boundary events are created via a host's "+ Add error boundary event"
    // button, not the Type dropdown (the type is absent from NODE_TYPE_OPTIONS
    // by design). Show a read-only label so the field cannot be edited away.
    const typeField = document.createElement("div");
    typeField.className = "field";
    typeField.innerHTML = `<label>Type</label>`;
    const typeInput = document.createElement("input");
    typeInput.type = "text";
    typeInput.disabled = true;
    typeInput.value = typeLabel(node.type);
    typeField.appendChild(typeInput);
    inspector.appendChild(typeField);
  } else {
    selectField("Type", NODE_TYPE_OPTIONS, node.type, v => {
      const businessKeysEnabled = model.flowNodes.some(n =>
        (isStartEventType(n.type) || isMessageStartEventType(n.type)) && n.businessKey != null);
      const previousType = node.type;
      if (isMessageStartEventType(previousType) && isStartEventType(v)) {
        node.variables = materializeMessageStartVariables(node);
      }
      node.type = v;
      if (businessKeysEnabled && (isStartEventType(v) || isMessageStartEventType(v)) && node.businessKey == null) {
        node.businessKey = { variable: "", uniqueness: "active" };
      }
      applyTypeInvariants(node);
      outgoingFlows(node.id).forEach(applyFlowInvariants);
      // If a node stops being a service/script task, any attached error
      // boundary event is orphaned (its attachedToRef no longer points at a
      // valid host). Cascade-delete it (and its error flow) to keep the model
      // valid, mirroring the host-deletion cleanup in deleteNode.
      if (!isServiceTaskType(v) && !isScriptTaskType(v)) {
        const attached = model.flowNodes.filter(n => n.type === NODE_TYPE.ERROR_BOUNDARY_EVENT && n.attachedToRef === node.id);
        const boundaryIds = new Set(attached.map(n => n.id));
        if (boundaryIds.size > 0) {
          model.flowNodes = model.flowNodes.filter(n => !boundaryIds.has(n.id));
          model.sequenceFlows = model.sequenceFlows.filter(f =>
            !boundaryIds.has(f.sourceRef) && !boundaryIds.has(f.targetRef));
        }
      }
      // If the node was the default start event but is no longer a valid
      // startEvent (e.g. switched to a messageStartEvent), clear initialEventId
      // so a message-only workflow can be saved without a user start event.
      if (model.initialEventId === node.id && !isStartEventType(v)) {
        const nextDefault = model.flowNodes.find(n => n.id !== node.id && isStartEventType(n.type));
        model.initialEventId = nextDefault?.id ?? null;
      }
      render();
    });
  }
  selectField("Lane", [{ value: "", label: "— none —" }].concat(
    model.lanes.map(p => ({ value: p.id, label: `#${p.id} ${p.name}` }))
  ), node.laneId ?? "", v => {
    node.laneId = v ? +v : null;
    render();
  });

  if (isUserTaskType(node.type)) {
    rolesField(node, () => { renderNodes(); renderEdges(); });
    inspector.appendChild(
      variableCheckbox("Requires claim", node.requiresClaim, checked => {
        node.requiresClaim = node.multiInstance?.source === "collection" ? false : checked;
        renderInspector();
      })
    );
    if (node.requiresClaim) {
      selectField("Claim mode", CLAIM_MODE_OPTIONS, node.claimMode || CLAIM_MODE.FRESH, v => {
        node.claimMode = v;
        if (v !== CLAIM_MODE.FROM_NODE) node.inheritClaimFromNodeId = null;
        renderInspector();
      });
      if (node.claimMode === CLAIM_MODE.FROM_NODE) {
        const sourceNodes = model.flowNodes.filter(n => isUserTaskType(n.type));
        const options = [{ value: "", label: "— select user task —" }].concat(
          sourceNodes.map(n => ({ value: n.id, label: `#${n.id} ${n.name}${n.id === node.id ? " (this task)" : ""}` }))
        );
        selectField("Inherit claim from", options, node.inheritClaimFromNodeId ?? "", v => {
          node.inheritClaimFromNodeId = v ? +v : null;
        });
      }
    }

    if (!node.multiInstance) {
      const assigneeHint = document.createElement("p");
      assigneeHint.className = "empty-note";
      assigneeHint.textContent = "Optional NCalc expression resolved once when the task is created. Use a variable name such as approverUser, or a quoted literal such as 'alice'. A runtime resolution failure creates a shared-pool task.";
      inspector.appendChild(assigneeHint);
      field("Assignee expression", "text", node.assignee ?? "", v => {
        node.assignee = v.trim() ? v : null;
        renderNodes();
      });
    }

    if (node.multiInstance && node.assignee) {
      node.assignee = null;
      renderNodes();
    }

    inspector.appendChild(variableCheckbox("Multi-instance", !!node.multiInstance, checked => {
      node.multiInstance = checked ? {
        mode: "parallel", source: "collection", collectionVariable: "",
        cardinalityExpression: null, onePerActor: false,
        completionEvaluation: "afterEach", resultVariable: ""
      } : null;
      if (checked) node.assignee = null;
      applyTypeInvariants(node);
      outgoingFlows(node.id).forEach(applyFlowInvariants);
      render();
    }));
    if (node.multiInstance) {
      selectField("Execution mode", MULTI_INSTANCE_MODE_OPTIONS, node.multiInstance.mode, v => {
        node.multiInstance.mode = v;
        renderNodes();
      });
      selectField("Completion evaluation", MULTI_INSTANCE_COMPLETION_EVALUATION_OPTIONS,
        node.multiInstance.completionEvaluation, v => {
          node.multiInstance.completionEvaluation = v;
          renderInspector();
        });
      selectField("Instance source", MULTI_INSTANCE_SOURCE_OPTIONS, node.multiInstance.source, v => {
        node.multiInstance.source = v;
        if (v === "collection") {
          node.multiInstance.cardinalityExpression = null;
          node.multiInstance.collectionVariable ||= "";
          node.multiInstance.onePerActor = false;
          node.requiresClaim = false;
        } else {
          node.multiInstance.collectionVariable = null;
          node.multiInstance.cardinalityExpression ||= "1";
        }
        node.claimMode = CLAIM_MODE.FRESH;
        renderInspector();
      });
      if (node.multiInstance.source === "collection") {
        const collections = (model.variables || [])
          .filter(v => v.dataType === "string" && v.isArray)
          .map(v => ({ value: v.name, label: v.name }));
        selectField("Username collection", [{ value: "", label: "— select string[] —" }].concat(collections),
          node.multiInstance.collectionVariable || "", v => { node.multiInstance.collectionVariable = v; });
      } else {
        field("Cardinality expression", "text", node.multiInstance.cardinalityExpression || "", v => {
          node.multiInstance.cardinalityExpression = v;
        });
        inspector.appendChild(variableCheckbox("One task per actor", !!node.multiInstance.onePerActor, checked => {
          node.multiInstance.onePerActor = checked;
        }));
      }
      const results = (model.variables || [])
        .filter(v => v.dataType === "json" && !v.isArray && Array.isArray(v.defaultValue))
        .map(v => ({ value: v.name, label: v.name }));
      selectField("Result JSON variable", [{ value: "", label: "— select json —" }].concat(results),
        node.multiInstance.resultVariable || "", v => { node.multiInstance.resultVariable = v; });
      const miHint = document.createElement("p");
      miHint.className = "empty-note";
      miHint.textContent = "Every non-default outcome requires a unique priority and completion condition. Exactly one engine-only default fallback is required and has neither. Conditions follow the selected evaluation timing and may use CountFlow(id), PercentFlow(id), [mi.total], [mi.completed], and [mi.remaining]. One task per actor requires that many distinct eligible users.";
      inspector.appendChild(miHint);
    }
  }

  if (isBoundaryEventType(node.type)) {
    const host = getNode(node.attachedToRef);
    const hostField = document.createElement("div");
    hostField.className = "field";
    hostField.innerHTML = `<label>Attached to</label>`;
    const hostInput = document.createElement("input");
    hostInput.type = "text";
    hostInput.disabled = true;
    hostInput.value = host ? `#${host.id} ${host.name}` : "(missing host)";
    hostField.appendChild(hostInput);
    inspector.appendChild(hostField);

    const bhint = document.createElement("p");
    bhint.className = "empty-note";
    bhint.textContent = "When the host task fails, the token exits through this boundary's single outgoing flow (the error path).";
    inspector.appendChild(bhint);

    field("Error variable (optional)", "text", node.errorVariable ?? "", v => {
      node.errorVariable = v.trim() ? v : null;
    });
  }

  if (isServiceTaskType(node.type)) {
    renderServiceSection(node);
  }

  if (isScriptTaskType(node.type)) {
    renderScriptSection(node);
  }

  if (isMessageCatchEventType(node.type)) {
    renderMessageSection(node);
  }

  if (isMessageStartEventType(node.type)) {
    renderMessageSection(node);
    renderIdempotencySection(node);
    renderBusinessKeySection(node);
  }

  if (isStartEventType(node.type)) {
    rolesField(node, () => { renderNodes(); renderEdges(); });
    renderStartVariablesSection(node, "Variables on the start event are the data required to start the workflow.");
    renderIdempotencySection(node);
    renderBusinessKeySection(node);
  }

  if (!isEndEventType(node.type)) {
    const flowsTitle = document.createElement("h2");
    flowsTitle.textContent = "Outgoing flows";
    flowsTitle.style.marginTop = "16px";
    inspector.appendChild(flowsTitle);

    const flows = outgoingFlows(node.id);
    if (flows.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No outgoing sequence flows. Drag a blue node handle to connect, or use the button below.";
      inspector.appendChild(p);
    }
    flows.forEach(flow => {
      const box = document.createElement("div");
      box.className = "field inspector-card clickable";
      const tgt = getNode(flow.targetRef);
      const extra = isGatewayType(node.type)
        ? (flow.isDefault ? " · default" : (flow.condition ? ` · [${flow.condition}]` : ""))
        : (isUserTaskType(node.type) && flow.isSelectable === false ? " · engine-only" : "");
      const name = flowLabel(flow, node) || "(unnamed)";
      box.innerHTML = `<div class="badge">flow #${flow.id} · ${name} → ${tgt ? '#' + tgt.id + ' ' + tgt.name : 'missing'}${extra}</div>`;
      box.onclick = () => select('flow', flow.id);
      inspector.appendChild(box);
    });

    if (isSingleOutgoingType(node.type) && flows.length >= 1) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "This node type can have exactly one outgoing sequence flow.";
      inspector.appendChild(p);
    } else {
      const addBtn = document.createElement("button");
      addBtn.textContent = "+ Add flow";
      addBtn.style.marginTop = "8px";
      addBtn.onclick = () => {
        const flow = createFlow(node.id, node.id);
        select('flow', flow.id);
      };
      inspector.appendChild(addBtn);
    }
  }

  const del = document.createElement("button");
  del.textContent = "Delete node";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => deleteNode(node.id);
  inspector.appendChild(del);
}

function appendTypedOutputMappingFields(box, mapping, requiredLabel, defaultPlaceholder) {
  const typeField = document.createElement("div");
  typeField.className = "field";
  typeField.innerHTML = "<label>Data type</label>";
  const typeSelect = document.createElement("select");
  typeSelect.innerHTML = VARIABLE_DATA_TYPES.map(type =>
    `<option value="${type}" ${mapping.dataType === type ? "selected" : ""}>${type}</option>`).join("");
  typeSelect.value = mapping.dataType || "string";
  typeField.appendChild(typeSelect);
  box.appendChild(typeField);

  const arrayCheckbox = variableCheckbox("Array", !!mapping.isArray, checked => {
    mapping.isArray = checked;
    mapping.defaultValue = parseDefaultValue(defaultInput.value, mapping);
  });
  box.appendChild(arrayCheckbox);
  box.appendChild(variableCheckbox(requiredLabel, !!mapping.required, checked => { mapping.required = checked; }));

  const defaultField = document.createElement("div");
  defaultField.className = "field";
  defaultField.innerHTML = "<label>Default value (optional)</label>";
  const defaultInput = document.createElement("input");
  defaultInput.type = "text";
  defaultInput.value = defaultValueToText(mapping.defaultValue);
  defaultInput.placeholder = defaultPlaceholder;
  defaultInput.oninput = () => { mapping.defaultValue = parseDefaultValue(defaultInput.value, mapping); };
  defaultField.appendChild(defaultInput);
  box.appendChild(defaultField);

  typeSelect.onchange = () => {
    mapping.dataType = typeSelect.value;
    mapping.defaultValue = parseDefaultValue(defaultInput.value, mapping);
  };

  const validationField = document.createElement("div");
  validationField.className = "field";
  validationField.innerHTML = "<label>Validation (NCalc, optional)</label>";
  const validationInput = document.createElement("input");
  validationInput.type = "text";
  validationInput.value = mapping.validation || "";
  validationInput.oninput = () => {
    mapping.validation = validationInput.value.trim() ? validationInput.value : null;
  };
  validationField.appendChild(validationInput);
  box.appendChild(validationField);
}

function renderServiceSection(node) {
  node.service = normalizeService(node.service, model.variables);
  const service = node.service;

  const title = document.createElement("h2");
  title.textContent = "Service call";
  title.style.marginTop = "16px";
  inspector.appendChild(title);

  const hint = document.createElement("p");
  hint.className = "empty-note";
  hint.textContent = "Calls a REST endpoint automatically. Use ${variableName} in the URL, headers, and body.";
  inspector.appendChild(hint);

  selectField("Method", HTTP_METHODS, service.method, v => { service.method = v; });
  field("URL", "text", service.url, v => { service.url = v; });
  field("Timeout (seconds)", "number", service.timeoutSeconds, v => {
    const n = Math.round(+v);
    service.timeoutSeconds = Number.isFinite(n) && n > 0 ? n : 1;
  });
  field("Status variable (optional)", "text", service.statusVariable, v => { service.statusVariable = v; });

  renderErrorBoundarySection(node);

  // Headers
  const headersTitle = document.createElement("h2");
  headersTitle.textContent = "Headers";
  headersTitle.style.marginTop = "16px";
  inspector.appendChild(headersTitle);

  service.headers.forEach((header, index) => {
    const box = document.createElement("div");
    box.className = "field inspector-card";

    const nameField = document.createElement("div");
    nameField.className = "field";
    nameField.innerHTML = "<label>Name</label>";
    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.value = header.name;
    nameInput.oninput = () => { header.name = nameInput.value; };
    nameField.appendChild(nameInput);
    box.appendChild(nameField);

    const valueField = document.createElement("div");
    valueField.className = "field";
    valueField.innerHTML = "<label>Value</label>";
    const valueInput = document.createElement("input");
    valueInput.type = "text";
    valueInput.value = header.value;
    valueInput.oninput = () => { header.value = valueInput.value; };
    valueField.appendChild(valueInput);
    box.appendChild(valueField);

    const del = document.createElement("button");
    del.textContent = "Delete header";
    del.className = "danger";
    del.style.width = "100%";
    del.onclick = () => { service.headers.splice(index, 1); renderInspector(); };
    box.appendChild(del);

    inspector.appendChild(box);
  });

  const addHeaderBtn = document.createElement("button");
  addHeaderBtn.textContent = "+ Add header";
  addHeaderBtn.style.marginTop = "8px";
  addHeaderBtn.onclick = () => { service.headers.push({ name: "", value: "" }); renderInspector(); };
  inspector.appendChild(addHeaderBtn);

  // Body
  const bodyTitle = document.createElement("h2");
  bodyTitle.textContent = "Body";
  bodyTitle.style.marginTop = "16px";
  inspector.appendChild(bodyTitle);

  const bodyHint = document.createElement("p");
  bodyHint.className = "empty-note";
  bodyHint.textContent = "Optional JSON body template. Placeholders insert the variable's JSON value, e.g. { \"amount\": ${amount} }.";
  inspector.appendChild(bodyHint);

  const bodyField = document.createElement("div");
  bodyField.className = "field";
  const bodyInput = document.createElement("textarea");
  bodyInput.value = service.body || "";
  bodyInput.rows = 5;
  bodyInput.style.cssText = "width:100%;font-family:monospace;resize:vertical";
  bodyInput.oninput = () => { service.body = bodyInput.value; };
  bodyField.appendChild(bodyInput);
  inspector.appendChild(bodyField);

  // Output mappings
  const outTitle = document.createElement("h2");
  outTitle.textContent = "Response mappings";
  outTitle.style.marginTop = "16px";
  inspector.appendChild(outTitle);

  const outHint = document.createElement("p");
  outHint.className = "empty-note";
  outHint.textContent = "Each mapping creates or updates a typed instance variable. The response path may be blank only when a default value is configured.";
  inspector.appendChild(outHint);

  service.outputMappings.forEach((mapping, index) => {
    const box = document.createElement("div");
    box.className = "field inspector-card";

    const varField = document.createElement("div");
    varField.className = "field";
    varField.innerHTML = "<label>Variable</label>";
    const varInput = document.createElement("input");
    varInput.type = "text";
    varInput.value = mapping.variable;
    varInput.oninput = () => { mapping.variable = varInput.value; };
    varField.appendChild(varInput);
    box.appendChild(varField);

    const pathField = document.createElement("div");
    pathField.className = "field";
    pathField.innerHTML = "<label>Response path</label>";
    const pathInput = document.createElement("input");
    pathInput.type = "text";
    pathInput.value = mapping.path;
    pathInput.oninput = () => { mapping.path = pathInput.value; };
    pathField.appendChild(pathInput);
    box.appendChild(pathField);

    appendTypedOutputMappingFields(
      box,
      mapping,
      "Required final value",
      "Used only when the response path is absent");

    const del = document.createElement("button");
    del.textContent = "Delete mapping";
    del.className = "danger";
    del.style.width = "100%";
    del.onclick = () => { service.outputMappings.splice(index, 1); renderInspector(); };
    box.appendChild(del);

    inspector.appendChild(box);
  });

  const addMappingBtn = document.createElement("button");
  addMappingBtn.textContent = "+ Add mapping";
  addMappingBtn.style.marginTop = "8px";
  addMappingBtn.onclick = () => {
    service.outputMappings.push({
      variable: "", path: "", dataType: "string", isArray: false,
      required: false, defaultValue: null, validation: null
    });
    renderInspector();
  };
  inspector.appendChild(addMappingBtn);
}

function renderMessageSection(node) {

  // Message starts and catches share the typed mapping contract. Start mappings

  const outHint = document.createElement("p");
  outHint.className = "empty-note";
  outHint.textContent = isStart
    ? "Each mapping declares and creates a typed start variable. The payload path may be blank only when a default value is configured."

  message.outputMappings.forEach((mapping, index) => {

    const pathField = document.createElement("div");
    pathField.className = "field";
    pathField.innerHTML = "<label>Body path</label>";

    pathInput.type = "text";
    pathInput.value = mapping.path;
    pathInput.oninput = () => { mapping.path = pathInput.value; };

    appendTypedOutputMappingFields(

    const del = document.createElement("button");
    del.textContent = "Delete mapping";
    del.className = "danger";
    del.style.width = "100%";
    del.onclick = () => { message.outputMappings.splice(index, 1); renderInspector(); };
    box.appendChild(del);

  addMappingBtn.onclick = () => {
