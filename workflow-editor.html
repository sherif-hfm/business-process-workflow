<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Process Workflow Editor</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-2: #2563eb;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 15px;
    margin: 0 12px 0 0;
    font-weight: 600;
    white-space: nowrap;
  }
  .wf-name {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    min-width: 220px;
  }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background .15s, border-color .15s;
  }
  button:hover { background: #324158; }
  button.primary { background: var(--accent); border-color: var(--accent-2); color: #fff; }
  button.primary:hover { background: var(--accent-2); }
  button.danger { color: #fff; background: var(--red); border-color: #dc2626; }
  button.active { background: var(--green); border-color: #16a34a; color: #fff; }
  .spacer { flex: 1; }

  main { flex: 1; display: flex; min-height: 0; }

  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; background:
    radial-gradient(circle, #1b2740 1px, transparent 1px) 0 0 / 24px 24px,
    var(--bg); cursor: default; }

  .hint {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(30,41,59,.9);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    max-width: 320px;
    pointer-events: none;
  }
  .hint b { color: var(--text); }

  /* Sidebar */
  aside {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 14px;
    overflow-y: auto;
  }
  aside h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 0 0 10px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 9px;
    border-radius: 6px;
    font-size: 13px;
  }
  .empty-note { color: var(--muted); font-size: 13px; line-height: 1.5; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .badge { font-size: 11px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(59, 130, 246, .16);
    border: 1px solid rgba(59, 130, 246, .45);
    color: #bfdbfe;
    border-radius: 999px;
    padding: 3px 7px;
    font-size: 12px;
  }
  .chip button {
    width: auto;
    padding: 0 4px;
    border: 0;
    background: transparent;
    color: #bfdbfe;
    font-size: 12px;
    line-height: 1;
  }
  .chip button:hover { background: rgba(191, 219, 254, .16); }

  /* SVG node styling */
  .node rect, .node circle.body {
    cursor: grab;
  }
  .node rect {
    rx: 10; ry: 10;
    stroke-width: 2;
  }
  .node circle.body { stroke-width: 2; }
  .node polygon.body { stroke-width: 2; cursor: grab; }
  .node.startEvent circle.body { fill: #14532d; stroke: var(--green); }
  .node.endEvent circle.body   { fill: #450a0a; stroke: var(--red); stroke-width: 5; }
  .node.userTask rect { fill: #1e3a5f; stroke: var(--accent); }
  .node.task rect     { fill: #1e293b; stroke: #64748b; }
  .node.serviceTask rect { fill: #164e4a; stroke: #2dd4bf; }
  .node.exclusiveGateway polygon.body { fill: #422006; stroke: var(--amber); }
  .node.selected rect,
  .node.selected circle.body,
  .node.selected polygon.body { stroke: #fff; stroke-width: 3; }
  .node text { fill: #fff; font-size: 13px; pointer-events: none; user-select: none; }
  .node .nid { fill: #cbd5e1; font-size: 11px; }
  .node .roles { fill: var(--muted); font-size: 10px; }
  .node .event-name { font-size: 12px; }
  .node .gw-mark { fill: var(--amber); font-size: 22px; font-weight: 700; }
  .node .user-marker circle { fill: #bfdbfe; stroke: #bfdbfe; }
  .node .user-marker path { fill: none; stroke: #bfdbfe; stroke-width: 1.5; }

  .lane rect.body {
    fill: rgba(59, 130, 246, .08);
    stroke: #64748b;
    stroke-width: 2;
    stroke-dasharray: 8 5;
    cursor: grab;
  }
  .lane.selected rect.body { stroke: #fff; stroke-width: 3; }
  .lane text { fill: #cbd5e1; font-size: 13px; pointer-events: none; user-select: none; }
  .lane .pid { fill: var(--muted); font-size: 11px; }
  .lane .resize {
    fill: var(--accent);
    stroke: #bfdbfe;
    stroke-width: 1;
    cursor: nwse-resize;
  }

  .edge path { fill: none; stroke: #64748b; stroke-width: 2; cursor: pointer; }
  .edge.auto path { stroke-dasharray: 6 4; }
  .edge.selected path { stroke: var(--amber); stroke-width: 3; }
  .edge text { fill: #cbd5e1; font-size: 11px; cursor: pointer; }
  .edge .roles { fill: var(--muted); font-size: 10px; }
  .edge .cond { fill: var(--amber); font-size: 10px; }
  .edge .lblbg { fill: var(--bg); opacity: .85; }
</style>
</head>
<body>
<header>
  <h1>Workflow Editor</h1>
  <input id="wfName" class="wf-name" placeholder="Workflow name" />
  <button id="addStepBtn" class="primary">+ Add Node</button>
  <button id="addPhaseBtn">+ Add Lane</button>
  <button id="connectBtn">Connect Flow</button>
  <div class="spacer"></div>
  <button id="newBtn">New</button>
  <button id="loadBtn">Load JSON</button>
  <button id="saveBtn">Save JSON</button>
  <input id="fileInput" type="file" accept="application/json,.json" hidden />
</header>

<main>
  <div class="canvas-wrap">
    <svg id="svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
        </marker>
        <marker id="arrowSel" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b" />
        </marker>
      </defs>
      <g id="lanes"></g>
      <g id="edges"></g>
      <g id="nodes"></g>
    </svg>
    <div class="hint" id="hint"></div>
  </div>

  <aside id="inspector"></aside>
</main>

<script>
const NODE_W = 170, NODE_H = 64;
const EVENT_D = 56;
const GATEWAY_D = 72;
const MIN_LANE_W = 220, MIN_LANE_H = 150;
const NODE_TYPE = {
  START_EVENT: "startEvent",
  END_EVENT: "endEvent",
  USER_TASK: "userTask",
  TASK: "task",
  SERVICE_TASK: "serviceTask",
  EXCLUSIVE_GATEWAY: "exclusiveGateway"
};
const NODE_TYPE_OPTIONS = [
  { value: NODE_TYPE.START_EVENT, label: "Start Event" },
  { value: NODE_TYPE.END_EVENT, label: "End Event" },
  { value: NODE_TYPE.USER_TASK, label: "User Task" },
  { value: NODE_TYPE.TASK, label: "Task (automatic)" },
  { value: NODE_TYPE.SERVICE_TASK, label: "Service Task (REST)" },
  { value: NODE_TYPE.EXCLUSIVE_GATEWAY, label: "Exclusive Gateway" }
];
const CLAIM_MODE = { FRESH: "fresh", PREVIOUS: "previous", FROM_NODE: "fromNode" };
const CLAIM_MODE_OPTIONS = [
  { value: CLAIM_MODE.FRESH, label: "Fresh (claim each time)" },
  { value: CLAIM_MODE.PREVIOUS, label: "Previous (last actor)" },
  { value: CLAIM_MODE.FROM_NODE, label: "From node (specific step)" }
];
const VARIABLE_DATA_TYPES = ["string", "number", "boolean", "date", "datetime"];
const HTTP_METHODS = ["GET", "POST", "PUT", "PATCH", "DELETE"];
const SERVICE_ERROR_MODES = ["fail", "continue"];
function defaultService() {
  return { method: "GET", url: "", headers: [], body: "", timeoutSeconds: 30, onError: "fail", statusVariable: "", outputMappings: [] };
}
function normalizeService(service) {
  const base = defaultService();
  if (!service || typeof service !== "object") return base;
  return {
    method: HTTP_METHODS.includes((service.method || "").toUpperCase()) ? service.method.toUpperCase() : base.method,
    url: typeof service.url === "string" ? service.url : "",
    headers: Array.isArray(service.headers)
      ? service.headers.map(h => ({ name: h && h.name ? String(h.name) : "", value: h && h.value != null ? String(h.value) : "" }))
      : [],
    body: typeof service.body === "string" ? service.body : "",
    timeoutSeconds: Number.isFinite(+service.timeoutSeconds) && +service.timeoutSeconds > 0 ? Math.round(+service.timeoutSeconds) : base.timeoutSeconds,
    onError: SERVICE_ERROR_MODES.includes(service.onError) ? service.onError : base.onError,
    statusVariable: typeof service.statusVariable === "string" ? service.statusVariable : "",
    outputMappings: Array.isArray(service.outputMappings)
      ? service.outputMappings.map(m => ({ variable: m && m.variable ? String(m.variable) : "", path: m && m.path ? String(m.path) : "" }))
      : []
  };
}
let model = newModel();
let selected = null;          // {kind:'node'|'flow'|'lane', nodeId, flowId, laneId}
let connectMode = false;
let connectSource = null;     // node id when picking target
let drag = null;              // {id, dx, dy}
let laneDrag = null;          // {id, dx, dy, nodeOffsets}
let laneResize = null;        // {id, dx, dy}

const svg = document.getElementById('svg');
const lanesG = document.getElementById('lanes');
const nodesG = document.getElementById('nodes');
const edgesG = document.getElementById('edges');
const inspector = document.getElementById('inspector');
const hintEl = document.getElementById('hint');
const wfNameInput = document.getElementById('wfName');

function newModel() {
  return {
    id: 1,
    name: "New Workflow",
    initialEventId: null,
    lanes: [],
    flowNodes: [],
    sequenceFlows: []
  };
}

function nextLaneId() {
  return model.lanes.reduce((m, p) => Math.max(m, p.id), 0) + 1;
}
function nextNodeId() {
  return model.flowNodes.reduce((m, s) => Math.max(m, s.id), 0) + 1;
}
function nextFlowId() {
  return model.sequenceFlows.reduce((m, f) => Math.max(m, f.id), 100) + 1;
}
function nextVariableId(owner) {
  return (owner.variables || []).reduce((m, v) => Math.max(m, v.id), 0) + 1;
}
function getLane(id) { return model.lanes.find(p => p.id === id); }
function getNode(id) { return model.flowNodes.find(s => s.id === id); }
function getFlow(id) { return model.sequenceFlows.find(f => f.id === id); }
function outgoingFlows(nodeId) { return model.sequenceFlows.filter(f => f.sourceRef === nodeId); }
function normalizeRoles(roles) {
  if (Array.isArray(roles)) return roles.map(role => String(role).trim()).filter(Boolean);
  if (typeof roles === "string" && roles.trim()) return [roles.trim()];
  return [];
}
function roleSummary(roles, maxLength = 28) {
  const text = normalizeRoles(roles).join(", ");
  return text.length > maxLength ? text.slice(0, maxLength - 3) + "..." : text;
}
function isEventType(type) {
  return type === NODE_TYPE.START_EVENT || type === NODE_TYPE.END_EVENT;
}
function isAutomaticType(type) {
  return type === NODE_TYPE.TASK;
}
function isServiceTaskType(type) {
  return type === NODE_TYPE.SERVICE_TASK;
}
function isUserTaskType(type) {
  return type === NODE_TYPE.USER_TASK;
}
function isStartEventType(type) {
  return type === NODE_TYPE.START_EVENT;
}
function isEndEventType(type) {
  return type === NODE_TYPE.END_EVENT;
}
function isGatewayType(type) {
  return type === NODE_TYPE.EXCLUSIVE_GATEWAY;
}
function typeLabel(type) {
  const match = NODE_TYPE_OPTIONS.find(o => o.value === type);
  return match ? match.label : type;
}
function nodeSize(node) {
  if (isEventType(node.type)) return { w: EVENT_D, h: EVENT_D };
  if (isGatewayType(node.type)) return { w: GATEWAY_D, h: GATEWAY_D };
  return { w: NODE_W, h: NODE_H };
}
// pass-through nodes advance without a user action (start / automatic task / service task / gateway)
function isPassThroughType(type) {
  return isAutomaticType(type) || isServiceTaskType(type) || isStartEventType(type) || isGatewayType(type);
}
function applyTypeInvariants(node) {
  if (isEndEventType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
  } else if (isAutomaticType(node.type) || isGatewayType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
  } else if (isServiceTaskType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = [];
    node.service = normalizeService(node.service);
  } else if (isStartEventType(node.type)) {
    node.requiresClaim = false;
    node.claimMode = CLAIM_MODE.FRESH;
    node.inheritClaimFromNodeId = null;
    node.roles = [];
    node.variables = node.variables || [];
  } else if (isUserTaskType(node.type)) {
    node.variables = node.variables || [];
    if (!CLAIM_MODE_OPTIONS.some(o => o.value === node.claimMode)) node.claimMode = CLAIM_MODE.FRESH;
    if (node.claimMode !== CLAIM_MODE.FROM_NODE) node.inheritClaimFromNodeId = null;
  }
}
function appendUserTaskMarker(g) {
  const icon = el("g", { class: "user-marker", transform: "translate(8,8)" });
  icon.appendChild(el("circle", { cx: 5, cy: 4, r: 3 }));
  icon.appendChild(el("path", { d: "M1 14 Q5 10 9 14" }));
  g.appendChild(icon);
}
function appendAutomaticMarker(g) {
  const t = el("text", { x: NODE_W - 8, y: 14, class: "nid", "text-anchor": "end" });
  t.textContent = "AUTO";
  g.appendChild(t);
}
function appendServiceMarker(g) {
  const t = el("text", { x: NODE_W - 8, y: 14, class: "nid", "text-anchor": "end" });
  t.textContent = "SVC";
  g.appendChild(t);
}

/* ---------- Sample seed ---------- */
function seedSample() {
  model = {
    id: 1,
    name: "Purchase Request Approval",
    initialEventId: 1,
    lanes: [
      { id: 1, name: "Submission", x: 40, y: 20, w: 260, h: 300 },
      { id: 2, name: "Approval", x: 320, y: 20, w: 620, h: 300 },
      { id: 3, name: "Resolution", x: 320, y: 340, w: 620, h: 180 }
    ],
    flowNodes: [
      { id: 1, name: "Request Submitted", type: "startEvent", laneId: 1, x: 90, y: 80, roles: [], requiresClaim: false,
        variables: [
          { id: 1, name: "requester", dataType: "string", isArray: false, required: false, defaultValue: "${sys.user}" },
          { id: 2, name: "amount", dataType: "number", isArray: false, required: true, validation: "amount > 0 and amount <= 100000" },
          { id: 3, name: "attachments", dataType: "string", isArray: true, required: false }
        ] },
      { id: 2, name: "Manager Review", type: "userTask", laneId: 2, x: 360, y: 70, roles: ["Manager"], requiresClaim: false, variables: [] },
      { id: 3, name: "Amount Check", type: "exclusiveGateway", laneId: 2, x: 620, y: 70, roles: [], requiresClaim: false, variables: [] },
      { id: 4, name: "Finance Review", type: "userTask", laneId: 2, x: 760, y: 70, roles: ["Finance"], requiresClaim: false, variables: [] },
      { id: 5, name: "Approved", type: "endEvent", laneId: 3, x: 760, y: 380, roles: [], requiresClaim: false, variables: [] },
      { id: 6, name: "Rejected", type: "endEvent", laneId: 3, x: 380, y: 380, roles: [], requiresClaim: false, variables: [] }
    ],
    sequenceFlows: [
      { id: 101, name: "", sourceRef: 1, targetRef: 2, roles: [], variables: [], condition: null, isDefault: false },
      { id: 201, name: "Approve", sourceRef: 2, targetRef: 3, roles: ["Manager"], variables: [], condition: null, isDefault: false },
      { id: 202, name: "Reject", sourceRef: 2, targetRef: 6, roles: ["Manager"], variables: [
          { id: 1, name: "rejectReason", dataType: "string", isArray: false, required: true }
        ], condition: null, isDefault: false },
      { id: 301, name: "High amount", sourceRef: 3, targetRef: 4, roles: [], variables: [], condition: "amount > 1000", isDefault: false },
      { id: 302, name: "Low amount", sourceRef: 3, targetRef: 5, roles: [], variables: [], condition: null, isDefault: true },
      { id: 401, name: "Approve", sourceRef: 4, targetRef: 5, roles: ["Finance"], variables: [], condition: null, isDefault: false },
      { id: 402, name: "Reject", sourceRef: 4, targetRef: 6, roles: ["Finance"], variables: [], condition: null, isDefault: false }
    ]
  };
}

/* ---------- Geometry ---------- */
function center(node) {
  const size = nodeSize(node);
  return { x: node.x + size.w / 2, y: node.y + size.h / 2 };
}

// intersection of line from shape center toward target point with shape border
function borderPoint(node, tx, ty) {
  const c = center(node);
  const dx = tx - c.x, dy = ty - c.y;
  if (dx === 0 && dy === 0) return c;
  if (isEventType(node.type)) {
    const r = EVENT_D / 2;
    const scale = r / Math.sqrt(dx * dx + dy * dy);
    return { x: c.x + dx * scale, y: c.y + dy * scale };
  }
  if (isGatewayType(node.type)) {
    const hw = GATEWAY_D / 2, hh = GATEWAY_D / 2;
    // rhombus border: |dx|/hw + |dy|/hh = 1
    const t = 1 / (Math.abs(dx) / hw + Math.abs(dy) / hh);
    return { x: c.x + dx * t, y: c.y + dy * t };
  }
  const hw = NODE_W / 2, hh = NODE_H / 2;
  const scale = Math.min(
    hw / Math.abs(dx || 1e-9),
    hh / Math.abs(dy || 1e-9)
  );
  return { x: c.x + dx * scale, y: c.y + dy * scale };
}

/* ---------- Rendering ---------- */
function render() {
  wfNameInput.value = model.name || "";
  renderLanes();
  renderEdges();
  renderNodes();
  renderInspector();
  renderHint();
}

function renderLanes() {
  lanesG.innerHTML = "";
  for (const lane of model.lanes) {
    const g = el("g", { class: `lane ${isSel('lane', lane.id) ? 'selected' : ''}`,
                        transform: `translate(${lane.x},${lane.y})`, "data-id": lane.id });
    g.appendChild(el("rect", { class: "body", width: lane.w, height: lane.h, rx: 12, ry: 12 }));
    const idText = el("text", { x: 12, y: 20, class: "pid" });
    idText.textContent = `#${lane.id}`;
    g.appendChild(idText);
    const nameText = el("text", { x: 12, y: 42, "font-weight": "600" });
    nameText.textContent = lane.name;
    g.appendChild(nameText);
    const handle = el("rect", { class: "resize", x: lane.w - 14, y: lane.h - 14, width: 10, height: 10, rx: 2 });
    handle.addEventListener("pointerdown", (e) => onLaneResizePointerDown(e, lane));
    g.appendChild(handle);

    g.addEventListener("pointerdown", (e) => onLanePointerDown(e, lane));
    lanesG.appendChild(g);
  }
}

function renderNodes() {
  nodesG.innerHTML = "";
  for (const node of model.flowNodes) {
    const g = el("g", { class: `node ${node.type} ${isSel('node', node.id) ? 'selected' : ''}`,
                        transform: `translate(${node.x},${node.y})`, "data-id": node.id });
    const marker = model.initialEventId === node.id ? " · START" : "";
    if (isEventType(node.type)) {
      const r = EVENT_D / 2;
      g.appendChild(el("circle", { class: "body", cx: r, cy: r, r: r - 2 }));
      const idText = el("text", { x: r, y: EVENT_D + 12, class: "nid", "text-anchor": "middle" });
      idText.textContent = `#${node.id} · ${typeLabel(node.type)}${marker}`;
      g.appendChild(idText);
      const nameText = el("text", { x: r, y: EVENT_D + 28, class: "event-name", "text-anchor": "middle", "font-weight": "600" });
      nameText.textContent = node.name;
      g.appendChild(nameText);
    } else if (isGatewayType(node.type)) {
      const d = GATEWAY_D, h = d / 2;
      g.appendChild(el("polygon", { class: "body", points: `${h},0 ${d},${h} ${h},${d} 0,${h}` }));
      const mark = el("text", { x: h, y: h + 8, class: "gw-mark", "text-anchor": "middle" });
      mark.textContent = "\u00D7";
      g.appendChild(mark);
      const idText = el("text", { x: h, y: d + 12, class: "nid", "text-anchor": "middle" });
      idText.textContent = `#${node.id} · ${typeLabel(node.type)}`;
      g.appendChild(idText);
      const nameText = el("text", { x: h, y: d + 28, class: "event-name", "text-anchor": "middle", "font-weight": "600" });
      nameText.textContent = node.name;
      g.appendChild(nameText);
    } else {
      g.appendChild(el("rect", { width: NODE_W, height: NODE_H, rx: 10, ry: 10 }));
      const idText = el("text", { x: 10, y: 18, class: "nid" });
      idText.textContent = `#${node.id} · ${typeLabel(node.type)}${marker}`;
      g.appendChild(idText);
      const nameText = el("text", { x: NODE_W / 2, y: 42, "text-anchor": "middle", "font-weight": "600" });
      nameText.textContent = node.name;
      g.appendChild(nameText);
      if (isUserTaskType(node.type)) {
        const roles = roleSummary(node.roles);
        if (roles) {
          const rolesText = el("text", { x: NODE_W / 2, y: 58, class: "roles", "text-anchor": "middle" });
          rolesText.textContent = roles;
          g.appendChild(rolesText);
        }
        appendUserTaskMarker(g);
      }
      if (isAutomaticType(node.type)) appendAutomaticMarker(g);
      if (isServiceTaskType(node.type)) appendServiceMarker(g);
    }

    g.addEventListener("pointerdown", (e) => onNodePointerDown(e, node));
    nodesG.appendChild(g);
  }
}

function renderEdges() {
  edgesG.innerHTML = "";
  for (const flow of model.sequenceFlows) {
    const source = getNode(flow.sourceRef);
    const target = getNode(flow.targetRef);
    if (!source || !target) continue;

    const dashed = isPassThroughType(source.type);
    const g = el("g", { class: `edge ${dashed ? "auto" : ""} ${isSel('flow', flow.id) ? 'selected' : ''}`,
                        "data-flow": flow.id });
    let d, lx, ly;
    const size = nodeSize(source);
    if (source.id === target.id) {
      const x = source.x + size.w, y = source.y + size.h / 2;
      d = `M ${x} ${y} C ${x + 70} ${y - 50}, ${x + 70} ${y + 50}, ${x} ${y + 6}`;
      lx = x + 60; ly = y;
    } else {
      const p1 = borderPoint(source, ...Object.values(center(target)));
      const p2 = borderPoint(target, ...Object.values(center(source)));
      d = `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
      lx = (p1.x + p2.x) / 2; ly = (p1.y + p2.y) / 2;
    }
    const sel = isSel('flow', flow.id);
    g.appendChild(el("path", { d, "marker-end": `url(#${sel ? 'arrowSel' : 'arrow'})` }));

    const label = flowLabel(flow, source);
    if (label) {
      const bg = el("rect", { class: "lblbg", x: lx - label.length * 3.6 - 4, y: ly - 16,
                              width: label.length * 7.2 + 8, height: 16, rx: 4 });
      g.appendChild(bg);
      const t = el("text", { x: lx, y: ly - 4, "text-anchor": "middle" });
      t.textContent = label;
      g.appendChild(t);
    }

    // secondary line: roles for user-task flows, condition/default for gateway flows
    if (isGatewayType(source.type)) {
      const cond = flow.isDefault ? "default" : (flow.condition || "");
      if (cond) {
        const cText = el("text", { x: lx, y: ly + 9, class: "cond", "text-anchor": "middle" });
        cText.textContent = cond.length > 24 ? cond.slice(0, 21) + "..." : cond;
        g.appendChild(cText);
      }
    } else {
      const roles = roleSummary(flow.roles);
      if (roles) {
        const roleText = el("text", { x: lx, y: ly + 9, class: "roles", "text-anchor": "middle" });
        roleText.textContent = roles;
        g.appendChild(roleText);
      }
    }

    g.addEventListener("click", (e) => { e.stopPropagation(); select('flow', flow.id); });
    edgesG.appendChild(g);
  }
}

function flowLabel(flow, source) {
  if (flow.name && flow.name.trim()) return flow.name.trim();
  if (isStartEventType(source.type)) return "start";
  if (isAutomaticType(source.type)) return "auto";
  return "";
}

function renderHint() {
  if (connectMode) {
    hintEl.innerHTML = connectSource == null
      ? "<b>Connect mode:</b> click the <b>source</b> node."
      : "<b>Connect mode:</b> now click the <b>target</b> node.";
  } else {
    hintEl.innerHTML = "Drag nodes to move. Drag lanes to move grouped nodes. Click a node, lane, or flow arrow to edit it.";
  }
}

/* ---------- Inspector ---------- */
function renderInspector() {
  inspector.innerHTML = "";
  if (!selected) {
    inspector.innerHTML = `<h2>Workflow</h2>
      <p class="empty-note">Select a node or flow to edit it.<br><br>
      Lanes: <b>${model.lanes.length}</b><br>
      Flow nodes: <b>${model.flowNodes.length}</b><br>
      Sequence flows: <b>${model.sequenceFlows.length}</b></p>`;
    addInitialSelector();
    return;
  }
  if (selected.kind === 'lane') return renderLaneInspector();
  if (selected.kind === 'node') return renderNodeInspector();
  return renderFlowInspector();
}

function addInitialSelector() {
  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = `<label>Default start event</label>`;
  const sel = document.createElement("select");
  const startEvents = model.flowNodes.filter(s => isStartEventType(s.type));
  sel.innerHTML = `<option value="">— none —</option>` +
    startEvents.map(s => `<option value="${s.id}" ${model.initialEventId === s.id ? "selected" : ""}>#${s.id} ${s.name}</option>`).join("");
  sel.onchange = () => { model.initialEventId = sel.value ? +sel.value : null; render(); };
  f.appendChild(sel);
  inspector.appendChild(f);
}

function renderNodeInspector() {
  const node = getNode(selected.nodeId);
  if (!node) { selected = null; return renderInspector(); }
  applyTypeInvariants(node);
  inspector.innerHTML = `<h2>Node #${node.id}</h2>`;
  field("Name", "text", node.name, v => { node.name = v; renderNodes(); renderEdges(); });
  selectField("Type", NODE_TYPE_OPTIONS, node.type, v => {
    node.type = v;
    applyTypeInvariants(node);
    render();
  });
  selectField("Lane", [{ value: "", label: "— none —" }].concat(
    model.lanes.map(p => ({ value: p.id, label: `#${p.id} ${p.name}` }))
  ), node.laneId ?? "", v => {
    node.laneId = v ? +v : null;
    render();
  });

  if (isUserTaskType(node.type)) {
    rolesField(node, () => { renderNodes(); renderEdges(); });
    inspector.appendChild(
      variableCheckbox("Requires claim", node.requiresClaim, checked => {
        node.requiresClaim = checked;
        renderInspector();
      })
    );
    if (node.requiresClaim) {
      selectField("Claim mode", CLAIM_MODE_OPTIONS, node.claimMode || CLAIM_MODE.FRESH, v => {
        node.claimMode = v;
        if (v !== CLAIM_MODE.FROM_NODE) node.inheritClaimFromNodeId = null;
        renderInspector();
      });
      if (node.claimMode === CLAIM_MODE.FROM_NODE) {
        const sourceNodes = model.flowNodes.filter(n => isUserTaskType(n.type));
        const options = [{ value: "", label: "— select user task —" }].concat(
          sourceNodes.map(n => ({ value: n.id, label: `#${n.id} ${n.name}${n.id === node.id ? " (this task)" : ""}` }))
        );
        selectField("Inherit claim from", options, node.inheritClaimFromNodeId ?? "", v => {
          node.inheritClaimFromNodeId = v ? +v : null;
        });
      }
    }
  }

  if (isServiceTaskType(node.type)) {
    renderServiceSection(node);
  }

  if (isStartEventType(node.type)) {
    node.variables = node.variables || [];

    const variablesTitle = document.createElement("h2");
    variablesTitle.textContent = "Variables";
    variablesTitle.style.marginTop = "16px";
    inspector.appendChild(variablesTitle);

    const hint = document.createElement("p");
    hint.className = "empty-note";
    hint.textContent = "Variables on the start event are the data required to start the workflow.";
    inspector.appendChild(hint);

    if (node.variables.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No variables for this node.";
      inspector.appendChild(p);
    }
    node.variables.forEach(variable => variableRow(node, variable));

    const addVariableBtn = document.createElement("button");
    addVariableBtn.textContent = "+ Add variable";
    addVariableBtn.style.marginTop = "8px";
    addVariableBtn.onclick = () => addVariable(node);
    inspector.appendChild(addVariableBtn);
  }

  if (!isEndEventType(node.type)) {
    const flowsTitle = document.createElement("h2");
    flowsTitle.textContent = "Outgoing flows";
    flowsTitle.style.marginTop = "16px";
    inspector.appendChild(flowsTitle);

    const flows = outgoingFlows(node.id);
    if (flows.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No outgoing sequence flows. Use Connect Flow or the button below.";
      inspector.appendChild(p);
    }
    flows.forEach(flow => {
      const box = document.createElement("div");
      box.className = "field";
      box.style.cssText = "background:var(--panel-2);padding:8px;border-radius:6px;border:1px solid var(--border);cursor:pointer";
      const tgt = getNode(flow.targetRef);
      const extra = isGatewayType(node.type)
        ? (flow.isDefault ? " · default" : (flow.condition ? ` · [${flow.condition}]` : ""))
        : "";
      const name = flowLabel(flow, node) || "(unnamed)";
      box.innerHTML = `<div class="badge">flow #${flow.id} · ${name} → ${tgt ? '#' + tgt.id + ' ' + tgt.name : 'missing'}${extra}</div>`;
      box.onclick = () => select('flow', flow.id);
      inspector.appendChild(box);
    });

    const addBtn = document.createElement("button");
    addBtn.textContent = "+ Add flow";
    addBtn.style.marginTop = "8px";
    addBtn.onclick = () => {
      const flow = createFlow(node.id, node.id);
      select('flow', flow.id);
    };
    inspector.appendChild(addBtn);
  }

  const del = document.createElement("button");
  del.textContent = "Delete node";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => deleteNode(node.id);
  inspector.appendChild(del);
}

  outTitle.style.marginTop = "16px";
  inspector.appendChild(outTitle);

  const outHint = document.createElement("p");
  outHint.className = "empty-note";
  outHint.textContent = "Write response fields into instance variables. Path is dotted, e.g. decision.approved or items.0.id.";
  inspector.appendChild(outHint);

  service.outputMappings.forEach((mapping, index) => {
    const box = document.createElement("div");
    box.className = "field";
    box.style.cssText = "background:var(--panel-2);padding:8px;border-radius:6px;border:1px solid var(--border)";

function renderLaneInspector() {
  const lane = getLane(selected.laneId);
  if (!lane) { selected = null; return renderInspector(); }
  const nodeCount = model.flowNodes.filter(s => s.laneId === lane.id).length;
  inspector.innerHTML = `<h2>Lane #${lane.id}</h2>
    <p class="badge" style="margin-top:-6px">${nodeCount} node${nodeCount === 1 ? "" : "s"} in this lane</p>`;
  field("Name", "text", lane.name, v => { lane.name = v; renderLanes(); });
  field("Width", "number", lane.w, v => {
    lane.w = Math.max(MIN_LANE_W, Math.round(+v || MIN_LANE_W));
    renderLanes();
  });
  field("Height", "number", lane.h, v => {
    lane.h = Math.max(MIN_LANE_H, Math.round(+v || MIN_LANE_H));
    renderLanes();
  });

  const del = document.createElement("button");
  del.textContent = "Delete lane";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => deleteLane(lane.id);
  inspector.appendChild(del);
}

function renderFlowInspector() {
  const flow = getFlow(selected.flowId);
  if (!flow) { selected = null; return renderInspector(); }
  const source = getNode(flow.sourceRef);
  flow.variables = flow.variables || [];
  const gateway = source && isGatewayType(source.type);
  inspector.innerHTML = `<h2>Flow #${flow.id}</h2>
    <p class="badge" style="margin-top:-6px">From node #${flow.sourceRef}${source ? ' (' + source.name + ')' : ''}</p>`;
  field("Name", "text", flow.name, v => { flow.name = v; renderEdges(); });
  selectField("Goes to node", model.flowNodes.map(s => ({ value: s.id, label: `#${s.id} ${s.name}` })),
              flow.targetRef, v => { flow.targetRef = +v; renderEdges(); });

  if (gateway) {
    field("Condition", "text", flow.condition ?? "", v => {
      flow.condition = v.trim() ? v : null;
      renderEdges();
    });
    const condHint = document.createElement("p");
    condHint.className = "empty-note";
    condHint.textContent = 'NCalc expression, e.g. amount > 1000 and region == \'EU\', or a bare variable like approved. Leave empty for the default flow.';
    inspector.appendChild(condHint);
    inspector.appendChild(
      variableCheckbox("Default flow", flow.isDefault, checked => {
        flow.isDefault = checked;
        if (checked) {
          flow.condition = null;
          // only one default per gateway
          outgoingFlows(flow.sourceRef).forEach(f => { if (f.id !== flow.id) f.isDefault = false; });
        }
        renderInspector();
        renderEdges();
      })
    );
  } else {
    rolesField(flow, () => renderEdges());
  }

  const variablesTitle = document.createElement("h2");
  variablesTitle.textContent = "Variables";
  variablesTitle.style.marginTop = "16px";
  inspector.appendChild(variablesTitle);

  if (gateway) {
    const p = document.createElement("p");
    p.className = "empty-note";
    p.textContent = "Gateway flows route automatically by condition and do not capture variables.";
    inspector.appendChild(p);
  } else {
    if (flow.variables.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No variables for this flow.";
      inspector.appendChild(p);
    }
    flow.variables.forEach(variable => variableRow(flow, variable));

    const addVariableBtn = document.createElement("button");
    addVariableBtn.textContent = "+ Add variable";
    addVariableBtn.style.marginTop = "8px";
    addVariableBtn.onclick = () => addVariable(flow);
    inspector.appendChild(addVariableBtn);
  }

  const del = document.createElement("button");
  del.textContent = "Delete flow";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => {
    model.sequenceFlows = model.sequenceFlows.filter(f => f.id !== flow.id);
    select('node', flow.sourceRef);
  };
  inspector.appendChild(del);
}

/* ---------- Inspector helpers ---------- */
function field(label, type, value, onInput) {
  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = `<label>${label}</label>`;
  const input = document.createElement("input");
  input.type = type; input.value = value;
  input.oninput = () => onInput(input.value);
  f.appendChild(input);
  inspector.appendChild(f);
}
function selectField(label, options, value, onChange) {
  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = `<label>${label}</label>`;
  const sel = document.createElement("select");
  const opts = options.map(o => typeof o === "object" ? o : { value: o, label: o });
  sel.innerHTML = opts.map(o => `<option value="${o.value}" ${o.value == value ? "selected" : ""}>${o.label}</option>`).join("");
  sel.onchange = () => onChange(sel.value);
  f.appendChild(sel);
  inspector.appendChild(f);
}
function variableRow(owner, variable) {
  const box = document.createElement("div");
  box.className = "field";
  box.style.cssText = "background:var(--panel-2);padding:8px;border-radius:6px;border:1px solid var(--border)";

  const badge = document.createElement("div");
  badge.className = "badge";
  badge.textContent = `variable #${variable.id}`;
  box.appendChild(badge);

  const nameField = document.createElement("div");
  nameField.className = "field";
  nameField.style.marginTop = "8px";
  nameField.innerHTML = "<label>Name</label>";
  const nameInput = document.createElement("input");
  nameInput.type = "text";
  nameInput.value = variable.name;
  nameInput.oninput = () => { variable.name = nameInput.value; };
  nameField.appendChild(nameInput);
  box.appendChild(nameField);

  const typeField = document.createElement("div");
  typeField.className = "field";
  typeField.innerHTML = "<label>Data type</label>";
  const typeSelect = document.createElement("select");
  typeSelect.innerHTML = VARIABLE_DATA_TYPES
    .map(type => `<option value="${type}" ${type === variable.dataType ? "selected" : ""}>${type}</option>`)
    .join("");
  typeSelect.onchange = () => { variable.dataType = typeSelect.value; };
  typeField.appendChild(typeSelect);
  box.appendChild(typeField);

  box.appendChild(variableCheckbox("Array", variable.isArray, checked => { variable.isArray = checked; }));
  box.appendChild(variableCheckbox("Required", variable.required, checked => {
    variable.required = checked;
    if (checked) variable.defaultValue = null;
    renderInspector();
  }));

  if (!variable.required) {
    const defField = document.createElement("div");
    defField.className = "field";
    defField.innerHTML = "<label>Default value (optional)</label>";
    const defInput = document.createElement("input");
    defInput.type = "text";
    defInput.value = defaultValueToText(variable.defaultValue);
    defInput.placeholder = variable.isArray
      ? "comma,separated,values or ${var}/${sys.user}"
      : "value or template, e.g. ${sys.user}, ${otherVar}";
    defInput.oninput = () => { variable.defaultValue = parseDefaultValue(defInput.value, variable); };
    defField.appendChild(defInput);
    box.appendChild(defField);
  }

  const valField = document.createElement("div");
  valField.className = "field";
  valField.innerHTML = "<label>Validation (NCalc, optional)</label>";
  const valInput = document.createElement("input");
  valInput.type = "text";
  valInput.value = variable.validation ?? "";
  valInput.placeholder = "e.g. amount > 0 and amount <= 10000";
  valInput.oninput = () => { variable.validation = valInput.value.trim() === "" ? null : valInput.value; };
  valField.appendChild(valInput);
  box.appendChild(valField);

  const del = document.createElement("button");
  del.textContent = "Delete variable";
  del.className = "danger";
  del.style.width = "100%";
  del.onclick = () => {
    owner.variables = owner.variables.filter(v => v.id !== variable.id);
    renderInspector();
  };
  box.appendChild(del);

  inspector.appendChild(box);
}
function variableCheckbox(label, checked, onChange) {
  const f = document.createElement("div");
  f.className = "field";

  const lbl = document.createElement("label");
  const input = document.createElement("input");
  input.type = "checkbox";
  input.checked = checked;
  input.style.width = "auto";
  input.style.marginRight = "6px";
  input.onchange = () => onChange(input.checked);
  lbl.appendChild(input);
  lbl.appendChild(document.createTextNode(label));
  f.appendChild(lbl);

  return f;
}
function rolesField(owner, onChange) {
  owner.roles = normalizeRoles(owner.roles);

  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = "<label>Roles</label>";

  const chips = document.createElement("div");
  chips.className = "chips";
  owner.roles.forEach((role, i) => {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.appendChild(document.createTextNode(role));

    const removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.textContent = "x";
    removeBtn.title = `Remove ${role}`;
    removeBtn.onclick = () => {
      owner.roles.splice(i, 1);
      onChange();
      renderInspector();
    };
    chip.appendChild(removeBtn);
    chips.appendChild(chip);
  });
  f.appendChild(chips);

  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "Add role, press Enter";
  input.onkeydown = (e) => {
    if (e.key !== "Enter" && e.key !== ",") return;
    e.preventDefault();
    const role = input.value.trim();
    if (!role || owner.roles.includes(role)) return;
    owner.roles.push(role);
    onChange();
    renderInspector();
  };
  f.appendChild(input);

  inspector.appendChild(f);
}
function addVariable(owner) {
  owner.variables = owner.variables || [];
  owner.variables.push({
    id: nextVariableId(owner),
    name: "variable",
    dataType: "string",
    isArray: false,
    required: false,
    defaultValue: null,
    validation: null
  });
  renderInspector();
}
function defaultValueToText(value) {
  if (value === null || value === undefined) return "";
  if (Array.isArray(value)) return value.join(", ");
  return String(value);
}
function coerceDefaultScalar(text, dataType) {
  const t = text.trim();
  if (t === "") return null;
  // Keep ${...} templates as raw strings; the engine substitutes and coerces them.
  if (t.includes("${")) return t;
  if (dataType === "number") { const n = Number(t); return Number.isNaN(n) ? t : n; }
  if (dataType === "boolean") return /^(true|1|yes)$/i.test(t);
  return t;
}
function parseDefaultValue(text, variable) {
  if ((text ?? "").trim() === "") return null;
  if (variable.isArray) {
    const items = text.split(",").map(s => coerceDefaultScalar(s, variable.dataType)).filter(v => v !== null);
    return items.length ? items : null;
  }
  return coerceDefaultScalar(text, variable.dataType);
}

/* ---------- Selection ---------- */
function isSel(kind, id) {
  if (!selected || selected.kind !== kind) return false;
  if (kind === 'lane') return selected.laneId === id;
  if (kind === 'node') return selected.nodeId === id;
  return selected.flowId === id;
}
function select(kind, id) {
  if (kind === 'lane') selected = { kind, laneId: id };
  else if (kind === 'node') selected = { kind, nodeId: id };
  else selected = { kind, flowId: id };
  render();
}
function clearSelection() { selected = null; render(); }

/* ---------- Node interaction ---------- */
function onNodePointerDown(e, node) {
  if (connectMode) {
    e.stopPropagation();
    handleConnectClick(node);
    return;
  }
  e.stopPropagation();
  select('node', node.id);
  const pt = svgPoint(e);
  drag = { id: node.id, dx: pt.x - node.x, dy: pt.y - node.y };
  svg.setPointerCapture(e.pointerId);
}

function onLanePointerDown(e, lane) {
  if (connectMode) return;
  e.stopPropagation();
  select('lane', lane.id);
  const pt = svgPoint(e);
  laneDrag = {
    id: lane.id,
    dx: pt.x - lane.x,
    dy: pt.y - lane.y,
    nodeOffsets: model.flowNodes
      .filter(s => s.laneId === lane.id)
      .map(s => ({ id: s.id, dx: s.x - lane.x, dy: s.y - lane.y }))
  };
  svg.setPointerCapture(e.pointerId);
}

function onLaneResizePointerDown(e, lane) {
  if (connectMode) return;
  e.stopPropagation();
  select('lane', lane.id);
  const pt = svgPoint(e);
  laneResize = { id: lane.id, dx: lane.x + lane.w - pt.x, dy: lane.y + lane.h - pt.y };
  svg.setPointerCapture(e.pointerId);
}

svg.addEventListener("pointermove", (e) => {
  const pt = svgPoint(e);
  if (drag) {
    const node = getNode(drag.id);
    node.x = Math.round(pt.x - drag.dx);
    node.y = Math.round(pt.y - drag.dy);
    renderNodes(); renderEdges();
    return;
  }
  if (laneDrag) {
    const lane = getLane(laneDrag.id);
    lane.x = Math.round(pt.x - laneDrag.dx);
    lane.y = Math.round(pt.y - laneDrag.dy);
    laneDrag.nodeOffsets.forEach(offset => {
      const node = getNode(offset.id);
      if (node) {
        node.x = lane.x + offset.dx;
        node.y = lane.y + offset.dy;
      }
    });
    renderLanes(); renderNodes(); renderEdges();
    return;
  }
  if (laneResize) {
    const lane = getLane(laneResize.id);
    lane.w = Math.max(MIN_LANE_W, Math.round(pt.x - lane.x + laneResize.dx));
    lane.h = Math.max(MIN_LANE_H, Math.round(pt.y - lane.y + laneResize.dy));
    renderLanes();
  }
});
svg.addEventListener("pointerup", () => {
  if (drag) assignNodeLane(drag.id);
  drag = null;
  laneDrag = null;
  laneResize = null;
  renderInspector();
});
svg.addEventListener("pointerdown", (e) => { if (e.target === svg && !connectMode) clearSelection(); });

function svgPoint(e) {
  const r = svg.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function assignNodeLane(nodeId) {
  const node = getNode(nodeId);
  if (!node) return;
  const c = center(node);
  const lane = [...model.lanes].reverse().find(p =>
    c.x >= p.x && c.x <= p.x + p.w && c.y >= p.y && c.y <= p.y + p.h
  );
  node.laneId = lane ? lane.id : null;
}

/* ---------- Connect mode ---------- */
function createFlow(sourceId, targetId) {
  const flow = { id: nextFlowId(), name: "", sourceRef: sourceId, targetRef: targetId,
                 roles: [], variables: [], condition: null, isDefault: false };
  model.sequenceFlows.push(flow);
  return flow;
}
function handleConnectClick(node) {
  if (connectSource == null) {
    connectSource = node.id;
    renderHint();
  } else {
    const flow = createFlow(connectSource, node.id);
    connectSource = null;
    setConnectMode(false);
    select('flow', flow.id);
  }
}
function setConnectMode(on) {
  connectMode = on;
  connectSource = null;
  document.getElementById("connectBtn").classList.toggle("active", on);
  renderHint();
}

/* ---------- Lanes and nodes add/delete ---------- */
function addLane() {
  const id = nextLaneId();
  const lane = { id, name: "New Lane", x: 60 + (model.lanes.length % 4) * 40,
                 y: 40 + (model.lanes.length % 4) * 40, w: 300, h: 220 };
  model.lanes.push(lane);
  select('lane', id);
}
function addNode() {
  const id = nextNodeId();
  const lane = selected?.kind === 'lane' ? getLane(selected.laneId) : null;
  const node = { id, name: "New Node", type: model.flowNodes.length === 0 ? NODE_TYPE.START_EVENT : NODE_TYPE.USER_TASK,
                 laneId: lane?.id ?? null,
                 x: lane ? lane.x + 30 : 100 + (model.flowNodes.length % 5) * 60,
                 y: lane ? lane.y + 60 : 120 + (model.flowNodes.length % 5) * 40,
                 roles: [],
                 requiresClaim: false,
                 claimMode: CLAIM_MODE.FRESH,
                 inheritClaimFromNodeId: null,
                 variables: [] };
  model.flowNodes.push(node);
  if (isStartEventType(node.type) && model.initialEventId == null) model.initialEventId = id;
  select('node', id);
}
function deleteNode(id) {
  model.flowNodes = model.flowNodes.filter(s => s.id !== id);
  // remove sequence flows connected to it
  model.sequenceFlows = model.sequenceFlows.filter(f => f.sourceRef !== id && f.targetRef !== id);
  if (model.initialEventId === id) {
    const nextDefault = model.flowNodes.find(s => isStartEventType(s.type));
    model.initialEventId = nextDefault?.id ?? null;
  }
  clearSelection();
}
function deleteLane(id) {
  model.lanes = model.lanes.filter(p => p.id !== id);
  model.flowNodes.forEach(s => { if (s.laneId === id) s.laneId = null; });
  clearSelection();
}

/* ---------- Save / Load ---------- */
function defaultFileName() {
  return (model.name || "workflow").replace(/\s+/g, "_").toLowerCase() + ".json";
}

async function save() {
  const data = JSON.stringify(model, null, 2);

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: defaultFileName(),
        types: [{
          description: "JSON files",
          accept: { "application/json": [".json"] }
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(data);
      await writable.close();
      return;
    } catch (err) {
      if (err.name === "AbortError") return;
      alert("Could not save JSON file: " + err.message);
      return;
    }
  }

  alert("Your browser does not support direct file saving. The JSON will be downloaded instead.");
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = defaultFileName();
  a.click();
  URL.revokeObjectURL(a.href);
}
function normalizeVariable(v) {
  return {
    id: v.id,
    name: v.name ?? v.label ?? `Variable ${v.id}`,
    dataType: v.dataType ?? "string",
    isArray: !!v.isArray,
    required: !!v.required,
    defaultValue: v.required ? null : (v.defaultValue ?? null),
    validation: (v.validation ?? "").trim() === "" ? null : v.validation
  };
}
function mapLegacyNodeType(s) {
  const t = s.type ?? "task";
  if (t === "start") return NODE_TYPE.START_EVENT;
  if (t === "end") return NODE_TYPE.END_EVENT;
  if (t === "task" && s.autoAdvance) return NODE_TYPE.TASK;
  if (t === "task") return NODE_TYPE.USER_TASK;
  return t; // already startEvent/userTask/endEvent/exclusiveGateway
}
// Migrate a legacy (phases/steps/actions) document into the BPMN schema.
function migrateLegacyToNew(obj) {
  const lanes = (obj.phases || []).map((p, i) => ({
    id: p.id,
    name: p.name ?? p.label ?? `Lane ${p.id}`,
    x: typeof p.x === "number" ? p.x : 60 + (i % 4) * 280,
    y: typeof p.y === "number" ? p.y : 40 + Math.floor(i / 4) * 220,
    w: typeof p.w === "number" ? p.w : 300,
    h: typeof p.h === "number" ? p.h : 220
  }));

  const flowNodes = [];
  const sequenceFlows = [];
  let flowSeed = 100;
  const nextId = (preferred) => {
    if (preferred && !sequenceFlows.some(f => f.id === preferred)) return preferred;
    do { flowSeed++; } while (sequenceFlows.some(f => f.id === flowSeed));
    return flowSeed;
  };

  (obj.steps || []).forEach((s, i) => {
    const type = mapLegacyNodeType(s);
    const variables = (s.variables || []).map(normalizeVariable);
    const actions = (s.actions || []).map(a => ({
      id: a.id,
      name: a.name ?? a.label ?? "",
      toStepId: a.toStepId ?? a.next ?? null,
      roles: normalizeRoles(a.roles ?? a.role),
      variables: (a.variables || []).map(normalizeVariable)
    }));

    if (isStartEventType(type)) {
      // start events are action-less: fold first action (or nextStepId) into one flow
      let target = s.nextStepId ?? null;
      if (actions.length > 0) {
        const first = actions[0];
        if (target == null) target = first.toStepId;
        const existing = new Set(variables.map(v => v.name.toLowerCase()));
        for (const v of first.variables) {
          if (!existing.has(v.name.toLowerCase())) { variables.push(v); existing.add(v.name.toLowerCase()); }
        }
      }
      if (target != null) {
        sequenceFlows.push({ id: nextId(), name: "", sourceRef: s.id, targetRef: target,
                             roles: [], variables: [], condition: null, isDefault: false });
      }
    } else if (isAutomaticType(type)) {
      if (s.nextStepId != null) {
        sequenceFlows.push({ id: nextId(), name: "", sourceRef: s.id, targetRef: s.nextStepId,
                             roles: [], variables: [], condition: null, isDefault: false });
      }
    } else {
      for (const a of actions) {
        if (a.toStepId == null) continue;
        sequenceFlows.push({ id: nextId(a.id), name: a.name, sourceRef: s.id, targetRef: a.toStepId,
                             roles: a.roles, variables: a.variables, condition: null, isDefault: false });
      }
    }

    flowNodes.push({
      id: s.id,
      name: s.name ?? s.label ?? `Node ${s.id}`,
      type,
      laneId: s.phaseId ?? null,
      x: typeof s.x === "number" ? s.x : 100 + (i % 4) * 220,
      y: typeof s.y === "number" ? s.y : 80 + Math.floor(i / 4) * 160,
      roles: normalizeRoles(s.roles ?? s.role),
      requiresClaim: !!s.requiresClaim,
      variables
    });
  });

  return {
    id: obj.id ?? 1,
    name: obj.name ?? "Workflow",
    initialEventId: obj.initialEventId ?? obj.initialStepId ?? obj.initialStep ?? null,
    lanes,
    flowNodes,
    sequenceFlows
  };
}
function loadFromObject(obj) {
  if (Array.isArray(obj.flowNodes)) {
    // Already BPMN schema.
    model = {
      id: obj.id ?? 1,
      name: obj.name ?? "Workflow",
      initialEventId: obj.initialEventId ?? null,
      lanes: (obj.lanes || []).map((p, i) => ({
        id: p.id,
        name: p.name ?? `Lane ${p.id}`,
        x: typeof p.x === "number" ? p.x : 60 + (i % 4) * 280,
        y: typeof p.y === "number" ? p.y : 40 + Math.floor(i / 4) * 220,
        w: typeof p.w === "number" ? p.w : 300,
        h: typeof p.h === "number" ? p.h : 220
      })),
      flowNodes: (obj.flowNodes || []).map((s, i) => ({
        id: s.id,
        name: s.name ?? `Node ${s.id}`,
        type: s.type ?? NODE_TYPE.USER_TASK,
        laneId: s.laneId ?? null,
        x: typeof s.x === "number" ? s.x : 100 + (i % 4) * 220,
        y: typeof s.y === "number" ? s.y : 80 + Math.floor(i / 4) * 160,
        roles: normalizeRoles(s.roles),
        requiresClaim: !!s.requiresClaim,
        claimMode: CLAIM_MODE_OPTIONS.some(o => o.value === s.claimMode) ? s.claimMode : CLAIM_MODE.FRESH,
        inheritClaimFromNodeId: s.inheritClaimFromNodeId ?? null,
        variables: (s.variables || []).map(normalizeVariable),
        service: isServiceTaskType(s.type) ? normalizeService(s.service) : undefined
      })),
      sequenceFlows: (obj.sequenceFlows || []).map(f => ({
        id: f.id,
        name: f.name ?? "",
        sourceRef: f.sourceRef,
        targetRef: f.targetRef,
        roles: normalizeRoles(f.roles),
        variables: (f.variables || []).map(normalizeVariable),
        condition: f.condition ?? null,
        isDefault: !!f.isDefault
      }))
    };
  } else {
    // Legacy phases/steps/actions document.
    model = migrateLegacyToNew(obj);
  }
  model.flowNodes.forEach(applyTypeInvariants);
  clearSelection();
}

/* ---------- DOM helper ---------- */
function el(tag, attrs) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

/* ---------- Wire up toolbar ---------- */
document.getElementById("addStepBtn").onclick = () => { if (connectMode) setConnectMode(false); addNode(); };
document.getElementById("addPhaseBtn").onclick = () => { if (connectMode) setConnectMode(false); addLane(); };
document.getElementById("connectBtn").onclick = () => setConnectMode(!connectMode);
document.getElementById("saveBtn").onclick = save;
document.getElementById("newBtn").onclick = () => {
  if (confirm("Start a new empty workflow? Unsaved changes will be lost.")) { model = newModel(); clearSelection(); }
};
document.getElementById("loadBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try { loadFromObject(JSON.parse(reader.result)); }
    catch (err) { alert("Invalid JSON file: " + err.message); }
  };
  reader.readAsText(file);
  e.target.value = "";
};
wfNameInput.oninput = () => { model.name = wfNameInput.value; };

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { if (connectMode) setConnectMode(false); else clearSelection(); }
  if (e.key === "Delete" && selected) {
    if (selected.kind === 'node') deleteNode(selected.nodeId);
    else if (selected.kind === 'lane') deleteLane(selected.laneId);
    else {
      model.sequenceFlows = model.sequenceFlows.filter(f => f.id !== selected.flowId);
      clearSelection();
    }
  }
});

/* ---------- Init ---------- */
render();
</script>
</body>
