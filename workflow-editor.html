<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Process Workflow Editor</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-2: #2563eb;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 15px;
    margin: 0 12px 0 0;
    font-weight: 600;
    white-space: nowrap;
  }
  .wf-name {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    min-width: 220px;
  }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background .15s, border-color .15s;
  }
  button:hover { background: #324158; }
  button.primary { background: var(--accent); border-color: var(--accent-2); color: #fff; }
  button.primary:hover { background: var(--accent-2); }
  button.danger { color: #fff; background: var(--red); border-color: #dc2626; }
  button.active { background: var(--green); border-color: #16a34a; color: #fff; }
  .spacer { flex: 1; }

  main { flex: 1; display: flex; min-height: 0; }

  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; background:
    radial-gradient(circle, #1b2740 1px, transparent 1px) 0 0 / 24px 24px,
    var(--bg); cursor: default; }

  .hint {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(30,41,59,.9);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    max-width: 320px;
    pointer-events: none;
  }
  .hint b { color: var(--text); }

  /* Sidebar */
  aside {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 14px;
    overflow-y: auto;
  }
  aside h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 0 0 10px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 9px;
    border-radius: 6px;
    font-size: 13px;
  }
  .empty-note { color: var(--muted); font-size: 13px; line-height: 1.5; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .badge { font-size: 11px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(59, 130, 246, .16);
    border: 1px solid rgba(59, 130, 246, .45);
    color: #bfdbfe;
    border-radius: 999px;
    padding: 3px 7px;
    font-size: 12px;
  }
  .chip button {
    width: auto;
    padding: 0 4px;
    border: 0;
    background: transparent;
    color: #bfdbfe;
    font-size: 12px;
    line-height: 1;
  }
  .chip button:hover { background: rgba(191, 219, 254, .16); }

  /* SVG node styling */
  .node rect {
    rx: 10; ry: 10;
    stroke-width: 2;
    cursor: grab;
  }
  .node.start rect { fill: #14532d; stroke: var(--green); }
  .node.end rect   { fill: #450a0a; stroke: var(--red); }
  .node.task rect  { fill: #1e3a5f; stroke: var(--accent); }
  .node.selected rect { stroke: #fff; stroke-width: 3; }
  .node text { fill: #fff; font-size: 13px; pointer-events: none; user-select: none; }
  .node .nid { fill: #cbd5e1; font-size: 11px; }
  .node .roles { fill: var(--muted); font-size: 10px; }

  .phase rect.body {
    fill: rgba(59, 130, 246, .08);
    stroke: #64748b;
    stroke-width: 2;
    stroke-dasharray: 8 5;
    cursor: grab;
  }
  .phase.selected rect.body { stroke: #fff; stroke-width: 3; }
  .phase text { fill: #cbd5e1; font-size: 13px; pointer-events: none; user-select: none; }
  .phase .pid { fill: var(--muted); font-size: 11px; }
  .phase .resize {
    fill: var(--accent);
    stroke: #bfdbfe;
    stroke-width: 1;
    cursor: nwse-resize;
  }

  .edge path { fill: none; stroke: #64748b; stroke-width: 2; cursor: pointer; }
  .edge.auto path { stroke-dasharray: 6 4; }
  .edge.selected path { stroke: var(--amber); stroke-width: 3; }
  .edge text { fill: #cbd5e1; font-size: 11px; cursor: pointer; }
  .edge .roles { fill: var(--muted); font-size: 10px; }
  .edge .lblbg { fill: var(--bg); opacity: .85; }
</style>
</head>
<body>
<header>
  <h1>Workflow Editor</h1>
  <input id="wfName" class="wf-name" placeholder="Workflow name" />
  <button id="addStepBtn" class="primary">+ Add Step</button>
  <button id="addPhaseBtn">+ Add Phase</button>
  <button id="connectBtn">Connect Action</button>
  <div class="spacer"></div>
  <button id="newBtn">New</button>
  <button id="loadBtn">Load JSON</button>
  <button id="saveBtn">Save JSON</button>
  <input id="fileInput" type="file" accept="application/json,.json" hidden />
</header>

<main>
  <div class="canvas-wrap">
    <svg id="svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
        </marker>
        <marker id="arrowSel" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b" />
        </marker>
      </defs>
      <g id="phases"></g>
      <g id="edges"></g>
      <g id="nodes"></g>
    </svg>
    <div class="hint" id="hint"></div>
  </div>

  <aside id="inspector"></aside>
</main>

<script>
const NODE_W = 170, NODE_H = 64;
const MIN_PHASE_W = 220, MIN_PHASE_H = 150;
const VARIABLE_DATA_TYPES = ["string", "number", "boolean", "date", "datetime"];
let model = newModel();
let selected = null;          // {kind:'step'|'action'|'phase', stepId, actionId, phaseId}
let connectMode = false;
let connectSource = null;     // step id when picking target
let drag = null;              // {id, dx, dy}
let phaseDrag = null;         // {id, dx, dy, stepOffsets}
let phaseResize = null;       // {id, dx, dy}

const svg = document.getElementById('svg');
const phasesG = document.getElementById('phases');
const nodesG = document.getElementById('nodes');
const edgesG = document.getElementById('edges');
const inspector = document.getElementById('inspector');
const hintEl = document.getElementById('hint');
const wfNameInput = document.getElementById('wfName');

function newModel() {
  return {
    id: 1,
    name: "New Workflow",
    initialStepId: null,
    phases: [],
    steps: []
  };
}

function nextPhaseId() {
  return model.phases.reduce((m, p) => Math.max(m, p.id), 0) + 1;
}
function nextStepId() {
  return model.steps.reduce((m, s) => Math.max(m, s.id), 0) + 1;
}
function nextActionId(step) {
  const base = step.id * 100;
  const ids = step.actions.map(a => a.id);
  let n = base + 1;
  while (ids.includes(n)) n++;
  return n;
}
function nextVariableId(owner) {
  return (owner.variables || []).reduce((m, v) => Math.max(m, v.id), 0) + 1;
}
function getPhase(id) { return model.phases.find(p => p.id === id); }
function getStep(id) { return model.steps.find(s => s.id === id); }
function normalizeRoles(roles) {
  if (Array.isArray(roles)) return roles.map(role => String(role).trim()).filter(Boolean);
  if (typeof roles === "string" && roles.trim()) return [roles.trim()];
  return [];
}
function roleSummary(roles, maxLength = 28) {
  const text = normalizeRoles(roles).join(", ");
  return text.length > maxLength ? text.slice(0, maxLength - 3) + "..." : text;
}

/* ---------- Sample seed ---------- */
function seedSample() {
  model = {
    id: 1,
    name: "Purchase Request Approval",
    initialStepId: 1,
    phases: [
      { id: 1, name: "Submission", x: 40, y: 20, w: 260, h: 260 },
      { id: 2, name: "Approval", x: 320, y: 20, w: 560, h: 260 },
      { id: 3, name: "Resolution", x: 320, y: 260, w: 560, h: 180 }
    ],
    steps: [
      { id: 1, name: "Draft", type: "start", phaseId: 1, x: 80,  y: 60, roles: ["Requester"], requiresClaim: false,
        variables: [
          { id: 1, name: "requester", dataType: "string", isArray: false, required: true }
        ],
        actions: [
        { id: 101, name: "Submit", toStepId: 2, roles: ["Requester"], variables: [
          { id: 1, name: "amount", dataType: "number", isArray: false, required: true },
          { id: 2, name: "attachments", dataType: "string", isArray: true, required: false }
        ] }
      ] },
      { id: 2, name: "Pending Manager", type: "task", phaseId: 2, x: 360, y: 60, roles: ["Manager"], requiresClaim: false,
        actions: [
          { id: 201, name: "Approve", toStepId: 3, roles: ["Manager"] },
          { id: 202, name: "Reject", toStepId: 5, roles: ["Manager"], variables: [
            { id: 1, name: "rejectReason", dataType: "string", isArray: false, required: true }
          ] },
          { id: 203, name: "Return", toStepId: 1, roles: ["Manager"] }
        ] },
      { id: 3, name: "Pending Finance", type: "task", phaseId: 2, x: 640, y: 60, roles: ["Finance"], requiresClaim: false,
        actions: [
          { id: 301, name: "Approve", toStepId: 4, roles: ["Finance"] },
          { id: 302, name: "Reject", toStepId: 5, roles: ["Finance"] }
        ] },
      { id: 4, name: "Approved", type: "end", phaseId: 3, x: 640, y: 300, roles: [], requiresClaim: false, actions: [] },
      { id: 5, name: "Rejected", type: "end", phaseId: 3, x: 360, y: 300, roles: [], requiresClaim: false, actions: [] }
    ]
  };
}

/* ---------- Geometry ---------- */
function center(step) { return { x: step.x + NODE_W / 2, y: step.y + NODE_H / 2 }; }

// intersection of line from rect center toward target point with rect border
function borderPoint(step, tx, ty) {
  const c = center(step);
  const dx = tx - c.x, dy = ty - c.y;
  if (dx === 0 && dy === 0) return c;
  const hw = NODE_W / 2, hh = NODE_H / 2;
  const scale = Math.min(
    hw / Math.abs(dx || 1e-9),
    hh / Math.abs(dy || 1e-9)
  );
  return { x: c.x + dx * scale, y: c.y + dy * scale };
}

/* ---------- Rendering ---------- */
function render() {
  wfNameInput.value = model.name || "";
  renderPhases();
  renderEdges();
  renderNodes();
  renderInspector();
  renderHint();
}

function renderPhases() {
  phasesG.innerHTML = "";
  for (const phase of model.phases) {
    const g = el("g", { class: `phase ${isSel('phase', phase.id) ? 'selected' : ''}`,
                        transform: `translate(${phase.x},${phase.y})`, "data-id": phase.id });
    g.appendChild(el("rect", { class: "body", width: phase.w, height: phase.h, rx: 12, ry: 12 }));
    const idText = el("text", { x: 12, y: 20, class: "pid" });
    idText.textContent = `#${phase.id}`;
    g.appendChild(idText);
    const nameText = el("text", { x: 12, y: 42, "font-weight": "600" });
    nameText.textContent = phase.name;
    g.appendChild(nameText);
    const handle = el("rect", { class: "resize", x: phase.w - 14, y: phase.h - 14, width: 10, height: 10, rx: 2 });
    handle.addEventListener("pointerdown", (e) => onPhaseResizePointerDown(e, phase));
    g.appendChild(handle);

    g.addEventListener("pointerdown", (e) => onPhasePointerDown(e, phase));
    phasesG.appendChild(g);
  }
}

function renderNodes() {
  nodesG.innerHTML = "";
  for (const step of model.steps) {
    const g = el("g", { class: `node ${step.type} ${isSel('step', step.id) ? 'selected' : ''}`,
                        transform: `translate(${step.x},${step.y})`, "data-id": step.id });
    g.appendChild(el("rect", { width: NODE_W, height: NODE_H, rx: 10, ry: 10 }));
    const idText = el("text", { x: 10, y: 18, class: "nid" });
    idText.textContent = `#${step.id} · ${step.type}${model.initialStepId === step.id ? " · START" : ""}${step.autoAdvance ? " · AUTO" : ""}`;
    g.appendChild(idText);
    const nameText = el("text", { x: NODE_W / 2, y: 42, "text-anchor": "middle", "font-weight": "600" });
    nameText.textContent = step.name;
    g.appendChild(nameText);
    const roles = step.autoAdvance ? "" : roleSummary(step.roles);
    if (roles) {
      const rolesText = el("text", { x: NODE_W / 2, y: 58, class: "roles", "text-anchor": "middle" });
      rolesText.textContent = roles;
      g.appendChild(rolesText);
    }

    g.addEventListener("pointerdown", (e) => onNodePointerDown(e, step));
    nodesG.appendChild(g);
  }
}

function renderEdges() {
  edgesG.innerHTML = "";
  for (const step of model.steps) {
    if (step.autoAdvance) {
      const target = getStep(step.nextStepId);
      if (!target) continue;
      const g = el("g", { class: `edge auto ${isSel('step', step.id) ? 'selected' : ''}`,
                          "data-step": step.id });
      let d, lx, ly;
      if (step.id === target.id) {
        // self loop
        const c = center(step);
        const x = step.x + NODE_W, y = step.y + NODE_H / 2;
        d = `M ${x} ${y} C ${x + 70} ${y - 50}, ${x + 70} ${y + 50}, ${x} ${y + 6}`;
        lx = x + 60; ly = y;
      } else {
        const p1 = borderPoint(step, ...Object.values(center(target)));
        const p2 = borderPoint(target, ...Object.values(center(step)));
        d = `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
        lx = (p1.x + p2.x) / 2; ly = (p1.y + p2.y) / 2;
      }
      const sel = isSel('step', step.id);
      g.appendChild(el("path", { d, "marker-end": `url(#${sel ? 'arrowSel' : 'arrow'})` }));

      const label = "auto";
      const bg = el("rect", { class: "lblbg", x: lx - label.length * 3.6 - 4, y: ly - 16,
                              width: label.length * 7.2 + 8, height: 16, rx: 4 });
      g.appendChild(bg);
      const t = el("text", { x: lx, y: ly - 4, "text-anchor": "middle" });
      t.textContent = label;
      g.appendChild(t);

      g.addEventListener("click", (e) => { e.stopPropagation(); select('step', step.id); });
      edgesG.appendChild(g);
      continue;
    }
    for (const action of step.actions) {
      const target = getStep(action.toStepId);
      if (!target) continue;
      const g = el("g", { class: `edge ${isSel('action', step.id, action.id) ? 'selected' : ''}`,
                          "data-step": step.id, "data-action": action.id });
      let d, lx, ly;
      if (step.id === target.id) {
        // self loop
        const c = center(step);
        const x = step.x + NODE_W, y = step.y + NODE_H / 2;
        d = `M ${x} ${y} C ${x + 70} ${y - 50}, ${x + 70} ${y + 50}, ${x} ${y + 6}`;
        lx = x + 60; ly = y;
      } else {
        const p1 = borderPoint(step, ...Object.values(center(target)));
        const p2 = borderPoint(target, ...Object.values(center(step)));
        d = `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
        lx = (p1.x + p2.x) / 2; ly = (p1.y + p2.y) / 2;
      }
      const sel = isSel('action', step.id, action.id);
      g.appendChild(el("path", { d, "marker-end": `url(#${sel ? 'arrowSel' : 'arrow'})` }));

      const label = action.name || "action";
      const bg = el("rect", { class: "lblbg", x: lx - label.length * 3.6 - 4, y: ly - 16,
                              width: label.length * 7.2 + 8, height: 16, rx: 4 });
      g.appendChild(bg);
      const t = el("text", { x: lx, y: ly - 4, "text-anchor": "middle" });
      t.textContent = label;
      g.appendChild(t);
      const roles = roleSummary(action.roles);
      if (roles) {
        const roleText = el("text", { x: lx, y: ly + 9, class: "roles", "text-anchor": "middle" });
        roleText.textContent = roles;
        g.appendChild(roleText);
      }

      g.addEventListener("click", (e) => { e.stopPropagation(); select('action', step.id, action.id); });
      edgesG.appendChild(g);
    }
  }
}

function renderHint() {
  if (connectMode) {
    hintEl.innerHTML = connectSource == null
      ? "<b>Connect mode:</b> click the <b>source</b> step."
      : "<b>Connect mode:</b> now click the <b>target</b> step.";
  } else {
    hintEl.innerHTML = "Drag steps to move. Drag phases to move grouped steps. Click a step, phase, or action arrow to edit it.";
  }
}

/* ---------- Inspector ---------- */
function renderInspector() {
  inspector.innerHTML = "";
  if (!selected) {
    inspector.innerHTML = `<h2>Workflow</h2>
      <p class="empty-note">Select a step or action to edit it.<br><br>
      Phases: <b>${model.phases.length}</b><br>
      Steps: <b>${model.steps.length}</b><br>
      Actions: <b>${model.steps.reduce((n, s) => n + s.actions.length, 0)}</b></p>`;
    addInitialSelector();
    return;
  }
  if (selected.kind === 'phase') return renderPhaseInspector();
  if (selected.kind === 'step') return renderStepInspector();
  return renderActionInspector();
}

function addInitialSelector() {
  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = `<label>Initial (start) step</label>`;
  const sel = document.createElement("select");
  sel.innerHTML = `<option value="">— none —</option>` +
    model.steps.map(s => `<option value="${s.id}" ${model.initialStepId === s.id ? "selected" : ""}>#${s.id} ${s.name}</option>`).join("");
  sel.onchange = () => { model.initialStepId = sel.value ? +sel.value : null; render(); };
  f.appendChild(sel);
  inspector.appendChild(f);
}

function renderStepInspector() {
  const step = getStep(selected.stepId);
  if (!step) { selected = null; return renderInspector(); }
  if (step.type === "end") {
    step.requiresClaim = false;
    step.autoAdvance = false;
  } else {
    step.requiresClaim = step.requiresClaim ?? false;
    step.autoAdvance = !!step.autoAdvance;
  }
  inspector.innerHTML = `<h2>Step #${step.id}</h2>`;
  field("Name", "text", step.name, v => { step.name = v; renderNodes(); renderEdges(); });
  selectField("Type", ["start", "task", "end"], step.type, v => {
    step.type = v;
    if (v === "end") {
      step.requiresClaim = false;
      step.autoAdvance = false;
    } else {
      step.requiresClaim = step.requiresClaim ?? false;
      step.autoAdvance = !!step.autoAdvance;
    }
    render();
  });
  selectField("Phase", [{ value: "", label: "— none —" }].concat(
    model.phases.map(p => ({ value: p.id, label: `#${p.id} ${p.name}` }))
  ), step.phaseId ?? "", v => {
    step.phaseId = v ? +v : null;
    render();
  });
  if (step.type !== "end") {
    inspector.appendChild(
      variableCheckbox("Auto-advance (no user action)", step.autoAdvance, checked => {
        step.autoAdvance = checked;
        if (checked) step.requiresClaim = false;
        render();
      })
    );
    if (step.autoAdvance) {
      selectField("Goes to step", [{ value: "", label: "— none —" }].concat(
        model.steps.map(s => ({ value: s.id, label: `#${s.id} ${s.name}` }))
      ), step.nextStepId ?? "", v => {
        step.nextStepId = v ? +v : null;
        render();
      });
    }
    if (step.autoAdvance && step.nextStepId == null) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "Select the step this auto-advances to.";
      inspector.appendChild(p);
    }
  }
  if (!step.autoAdvance) {
    rolesField(step, () => { renderNodes(); renderEdges(); });
  }
  if (step.type !== "end" && !step.autoAdvance) {
    inspector.appendChild(
      variableCheckbox("Requires claim", step.requiresClaim, checked => { step.requiresClaim = checked; })
    );
  }

  if (step.type === "start") {
    step.variables = step.variables || [];

    const variablesTitle = document.createElement("h2");
    variablesTitle.textContent = "Variables";
    variablesTitle.style.marginTop = "16px";
    inspector.appendChild(variablesTitle);

    const hint = document.createElement("p");
    hint.className = "empty-note";
    hint.textContent = "Variables on this start step are the data required to start the workflow.";
    inspector.appendChild(hint);

    if (step.variables.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No variables for this step.";
      inspector.appendChild(p);
    }
    step.variables.forEach(variable => variableRow(step, variable));

    const addVariableBtn = document.createElement("button");
    addVariableBtn.textContent = "+ Add variable";
    addVariableBtn.style.marginTop = "8px";
    addVariableBtn.onclick = () => addVariable(step);
    inspector.appendChild(addVariableBtn);
  }

  if (!step.autoAdvance) {
    const actionsTitle = document.createElement("h2");
    actionsTitle.textContent = "Actions";
    actionsTitle.style.marginTop = "16px";
    inspector.appendChild(actionsTitle);

    if (step.actions.length === 0) {
      const p = document.createElement("p");
      p.className = "empty-note";
      p.textContent = "No actions from this step.";
      inspector.appendChild(p);
    }
    step.actions.forEach(a => {
      const box = document.createElement("div");
      box.className = "field";
      box.style.cssText = "background:var(--panel-2);padding:8px;border-radius:6px;border:1px solid var(--border)";
      const tgt = getStep(a.toStepId);
      box.innerHTML = `<div class="badge">action #${a.id} → ${tgt ? '#' + tgt.id + ' ' + tgt.name : 'missing'}</div>`;
      inspector.appendChild(box);
      // edit by selecting
      box.style.cursor = "pointer";
      box.onclick = () => select('action', step.id, a.id);
    });

    const addBtn = document.createElement("button");
    addBtn.textContent = "+ Add action";
    addBtn.style.marginTop = "8px";
    addBtn.onclick = () => {
      const a = { id: nextActionId(step), name: "action", toStepId: step.id, roles: [], variables: [] };
      step.actions.push(a);
      select('action', step.id, a.id);
    };
    inspector.appendChild(addBtn);
  }

  const del = document.createElement("button");
  del.textContent = "Delete step";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => deleteStep(step.id);
  inspector.appendChild(del);
}

function renderPhaseInspector() {
  const phase = getPhase(selected.phaseId);
  if (!phase) { selected = null; return renderInspector(); }
  const stepCount = model.steps.filter(s => s.phaseId === phase.id).length;
  inspector.innerHTML = `<h2>Phase #${phase.id}</h2>
    <p class="badge" style="margin-top:-6px">${stepCount} step${stepCount === 1 ? "" : "s"} in this phase</p>`;
  field("Name", "text", phase.name, v => { phase.name = v; renderPhases(); });
  field("Width", "number", phase.w, v => {
    phase.w = Math.max(MIN_PHASE_W, Math.round(+v || MIN_PHASE_W));
    renderPhases();
  });
  field("Height", "number", phase.h, v => {
    phase.h = Math.max(MIN_PHASE_H, Math.round(+v || MIN_PHASE_H));
    renderPhases();
  });

  const del = document.createElement("button");
  del.textContent = "Delete phase";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => deletePhase(phase.id);
  inspector.appendChild(del);
}

function renderActionInspector() {
  const step = getStep(selected.stepId);
  const action = step && step.actions.find(a => a.id === selected.actionId);
  if (!action) { selected = null; return renderInspector(); }
  action.variables = action.variables || [];
  inspector.innerHTML = `<h2>Action #${action.id}</h2>
    <p class="badge" style="margin-top:-6px">From step #${step.id} (${step.name})</p>`;
  field("Name", "text", action.name, v => { action.name = v; renderEdges(); });
  selectField("Goes to step", model.steps.map(s => ({ value: s.id, label: `#${s.id} ${s.name}` })),
              action.toStepId, v => { action.toStepId = +v; renderEdges(); });
  rolesField(action, () => renderEdges());

  const variablesTitle = document.createElement("h2");
  variablesTitle.textContent = "Variables";
  variablesTitle.style.marginTop = "16px";
  inspector.appendChild(variablesTitle);

  if (step.id === model.initialStepId) {
    const p = document.createElement("p");
    p.className = "empty-note";
    p.textContent = "Variables on this start action are the data required to start the workflow.";
    inspector.appendChild(p);
  }

  if (action.variables.length === 0) {
    const p = document.createElement("p");
    p.className = "empty-note";
    p.textContent = "No variables for this action.";
    inspector.appendChild(p);
  }
  action.variables.forEach(variable => variableRow(action, variable));

  const addVariableBtn = document.createElement("button");
  addVariableBtn.textContent = "+ Add variable";
  addVariableBtn.style.marginTop = "8px";
  addVariableBtn.onclick = () => addVariable(action);
  inspector.appendChild(addVariableBtn);

  const del = document.createElement("button");
  del.textContent = "Delete action";
  del.className = "danger";
  del.style.cssText = "margin-top:16px;width:100%";
  del.onclick = () => {
    step.actions = step.actions.filter(a => a.id !== action.id);
    select('step', step.id);
  };
  inspector.appendChild(del);
}

/* ---------- Inspector helpers ---------- */
function field(label, type, value, onInput) {
  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = `<label>${label}</label>`;
  const input = document.createElement("input");
  input.type = type; input.value = value;
  input.oninput = () => onInput(input.value);
  f.appendChild(input);
  inspector.appendChild(f);
}
function selectField(label, options, value, onChange) {
  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = `<label>${label}</label>`;
  const sel = document.createElement("select");
  const opts = options.map(o => typeof o === "object" ? o : { value: o, label: o });
  sel.innerHTML = opts.map(o => `<option value="${o.value}" ${o.value == value ? "selected" : ""}>${o.label}</option>`).join("");
  sel.onchange = () => onChange(sel.value);
  f.appendChild(sel);
  inspector.appendChild(f);
}
function variableRow(owner, variable) {
  const box = document.createElement("div");
  box.className = "field";
  box.style.cssText = "background:var(--panel-2);padding:8px;border-radius:6px;border:1px solid var(--border)";

  const badge = document.createElement("div");
  badge.className = "badge";
  badge.textContent = `variable #${variable.id}`;
  box.appendChild(badge);

  const nameField = document.createElement("div");
  nameField.className = "field";
  nameField.style.marginTop = "8px";
  nameField.innerHTML = "<label>Name</label>";
  const nameInput = document.createElement("input");
  nameInput.type = "text";
  nameInput.value = variable.name;
  nameInput.oninput = () => { variable.name = nameInput.value; };
  nameField.appendChild(nameInput);
  box.appendChild(nameField);

  const typeField = document.createElement("div");
  typeField.className = "field";
  typeField.innerHTML = "<label>Data type</label>";
  const typeSelect = document.createElement("select");
  typeSelect.innerHTML = VARIABLE_DATA_TYPES
    .map(type => `<option value="${type}" ${type === variable.dataType ? "selected" : ""}>${type}</option>`)
    .join("");
  typeSelect.onchange = () => { variable.dataType = typeSelect.value; };
  typeField.appendChild(typeSelect);
  box.appendChild(typeField);

  box.appendChild(variableCheckbox("Array", variable.isArray, checked => { variable.isArray = checked; }));
  box.appendChild(variableCheckbox("Required", variable.required, checked => { variable.required = checked; }));

  const del = document.createElement("button");
  del.textContent = "Delete variable";
  del.className = "danger";
  del.style.width = "100%";
  del.onclick = () => {
    owner.variables = owner.variables.filter(v => v.id !== variable.id);
    renderInspector();
  };
  box.appendChild(del);

  inspector.appendChild(box);
}
function variableCheckbox(label, checked, onChange) {
  const f = document.createElement("div");
  f.className = "field";

  const lbl = document.createElement("label");
  const input = document.createElement("input");
  input.type = "checkbox";
  input.checked = checked;
  input.style.width = "auto";
  input.style.marginRight = "6px";
  input.onchange = () => onChange(input.checked);
  lbl.appendChild(input);
  lbl.appendChild(document.createTextNode(label));
  f.appendChild(lbl);

  return f;
}
function rolesField(owner, onChange) {
  owner.roles = normalizeRoles(owner.roles);

  const f = document.createElement("div");
  f.className = "field";
  f.innerHTML = "<label>Roles</label>";

  const chips = document.createElement("div");
  chips.className = "chips";
  owner.roles.forEach((role, i) => {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.appendChild(document.createTextNode(role));

    const removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.textContent = "x";
    removeBtn.title = `Remove ${role}`;
    removeBtn.onclick = () => {
      owner.roles.splice(i, 1);
      onChange();
      renderInspector();
    };
    chip.appendChild(removeBtn);
    chips.appendChild(chip);
  });
  f.appendChild(chips);

  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "Add role, press Enter";
  input.onkeydown = (e) => {
    if (e.key !== "Enter" && e.key !== ",") return;
    e.preventDefault();
    const role = input.value.trim();
    if (!role || owner.roles.includes(role)) return;
    owner.roles.push(role);
    onChange();
    renderInspector();
  };
  f.appendChild(input);

  inspector.appendChild(f);
}
function addVariable(owner) {
  owner.variables = owner.variables || [];
  owner.variables.push({
    id: nextVariableId(owner),
    name: "variable",
    dataType: "string",
    isArray: false,
    required: false
  });
  renderInspector();
}

/* ---------- Selection ---------- */
function isSel(kind, stepId, actionId) {
  if (!selected || selected.kind !== kind) return false;
  if (kind === 'phase') return selected.phaseId === stepId;
  if (kind === 'step') return selected.stepId === stepId;
  return selected.stepId === stepId && selected.actionId === actionId;
}
function select(kind, stepId, actionId) {
  selected = kind === 'phase' ? { kind, phaseId: stepId } : { kind, stepId, actionId };
  render();
}
function clearSelection() { selected = null; render(); }

/* ---------- Node interaction ---------- */
function onNodePointerDown(e, step) {
  if (connectMode) {
    e.stopPropagation();
    handleConnectClick(step);
    return;
  }
  e.stopPropagation();
  select('step', step.id);
  const pt = svgPoint(e);
  drag = { id: step.id, dx: pt.x - step.x, dy: pt.y - step.y };
  svg.setPointerCapture(e.pointerId);
}

function onPhasePointerDown(e, phase) {
  if (connectMode) return;
  e.stopPropagation();
  select('phase', phase.id);
  const pt = svgPoint(e);
  phaseDrag = {
    id: phase.id,
    dx: pt.x - phase.x,
    dy: pt.y - phase.y,
    stepOffsets: model.steps
      .filter(s => s.phaseId === phase.id)
      .map(s => ({ id: s.id, dx: s.x - phase.x, dy: s.y - phase.y }))
  };
  svg.setPointerCapture(e.pointerId);
}

function onPhaseResizePointerDown(e, phase) {
  if (connectMode) return;
  e.stopPropagation();
  select('phase', phase.id);
  const pt = svgPoint(e);
  phaseResize = { id: phase.id, dx: phase.x + phase.w - pt.x, dy: phase.y + phase.h - pt.y };
  svg.setPointerCapture(e.pointerId);
}

svg.addEventListener("pointermove", (e) => {
  const pt = svgPoint(e);
  if (drag) {
    const step = getStep(drag.id);
    step.x = Math.round(pt.x - drag.dx);
    step.y = Math.round(pt.y - drag.dy);
    renderNodes(); renderEdges();
    return;
  }
  if (phaseDrag) {
    const phase = getPhase(phaseDrag.id);
    phase.x = Math.round(pt.x - phaseDrag.dx);
    phase.y = Math.round(pt.y - phaseDrag.dy);
    phaseDrag.stepOffsets.forEach(offset => {
      const step = getStep(offset.id);
      if (step) {
        step.x = phase.x + offset.dx;
        step.y = phase.y + offset.dy;
      }
    });
    renderPhases(); renderNodes(); renderEdges();
    return;
  }
  if (phaseResize) {
    const phase = getPhase(phaseResize.id);
    phase.w = Math.max(MIN_PHASE_W, Math.round(pt.x - phase.x + phaseResize.dx));
    phase.h = Math.max(MIN_PHASE_H, Math.round(pt.y - phase.y + phaseResize.dy));
    renderPhases();
  }
});
svg.addEventListener("pointerup", () => {
  if (drag) assignStepPhase(drag.id);
  drag = null;
  phaseDrag = null;
  phaseResize = null;
  renderInspector();
});
svg.addEventListener("pointerdown", (e) => { if (e.target === svg && !connectMode) clearSelection(); });

function svgPoint(e) {
  const r = svg.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function assignStepPhase(stepId) {
  const step = getStep(stepId);
  if (!step) return;
  const c = center(step);
  const phase = [...model.phases].reverse().find(p =>
    c.x >= p.x && c.x <= p.x + p.w && c.y >= p.y && c.y <= p.y + p.h
  );
  step.phaseId = phase ? phase.id : null;
}

/* ---------- Connect mode ---------- */
function handleConnectClick(step) {
  if (connectSource == null) {
    connectSource = step.id;
    renderHint();
  } else {
    const src = getStep(connectSource);
    if (src.autoAdvance) {
      src.nextStepId = step.id;
      connectSource = null;
      setConnectMode(false);
      select('step', src.id);
      return;
    }
    const a = { id: nextActionId(src), name: "action", toStepId: step.id, roles: [], variables: [] };
    src.actions.push(a);
    connectSource = null;
    setConnectMode(false);
    select('action', src.id, a.id);
  }
}
function setConnectMode(on) {
  connectMode = on;
  connectSource = null;
  document.getElementById("connectBtn").classList.toggle("active", on);
  renderHint();
}

/* ---------- Phases and steps add/delete ---------- */
function addPhase() {
  const id = nextPhaseId();
  const phase = { id, name: "New Phase", x: 60 + (model.phases.length % 4) * 40,
                  y: 40 + (model.phases.length % 4) * 40, w: 300, h: 220 };
  model.phases.push(phase);
  select('phase', id);
}
function addStep() {
  const id = nextStepId();
  const phase = selected?.kind === 'phase' ? getPhase(selected.phaseId) : null;
  const step = { id, name: "New Step", type: model.steps.length === 0 ? "start" : "task",
                 phaseId: phase?.id ?? null,
                 x: phase ? phase.x + 30 : 100 + (model.steps.length % 5) * 60,
                 y: phase ? phase.y + 60 : 120 + (model.steps.length % 5) * 40,
                 roles: [],
                 requiresClaim: false,
                 autoAdvance: false,
                 nextStepId: null,
                 variables: [],
                 actions: [] };
  model.steps.push(step);
  if (model.initialStepId == null) model.initialStepId = id;
  select('step', id);
}
function deleteStep(id) {
  model.steps = model.steps.filter(s => s.id !== id);
  // remove actions pointing to it
  model.steps.forEach(s => {
    s.actions = s.actions.filter(a => a.toStepId !== id);
    if (s.nextStepId === id) s.nextStepId = null;
  });
  if (model.initialStepId === id) model.initialStepId = model.steps[0]?.id ?? null;
  clearSelection();
}
function deletePhase(id) {
  model.phases = model.phases.filter(p => p.id !== id);
  model.steps.forEach(s => { if (s.phaseId === id) s.phaseId = null; });
  clearSelection();
}

/* ---------- Save / Load ---------- */
function defaultFileName() {
  return (model.name || "workflow").replace(/\s+/g, "_").toLowerCase() + ".json";
}

async function save() {
  const data = JSON.stringify(model, null, 2);

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: defaultFileName(),
        types: [{
          description: "JSON files",
          accept: { "application/json": [".json"] }
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(data);
      await writable.close();
      return;
    } catch (err) {
      if (err.name === "AbortError") return;
      alert("Could not save JSON file: " + err.message);
      return;
    }
  }

  alert("Your browser does not support direct file saving. The JSON will be downloaded instead.");
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = defaultFileName();
  a.click();
  URL.revokeObjectURL(a.href);
}
function loadFromObject(obj) {
  // normalize + add positions if missing
  model = {
    id: obj.id ?? 1,
    name: obj.name ?? "Workflow",
    initialStepId: obj.initialStepId ?? obj.initialStep ?? null,
    phases: (obj.phases || []).map((p, i) => ({
      id: p.id,
      name: p.name ?? p.label ?? `Phase ${p.id}`,
      x: typeof p.x === "number" ? p.x : 60 + (i % 4) * 280,
      y: typeof p.y === "number" ? p.y : 40 + Math.floor(i / 4) * 220,
      w: typeof p.w === "number" ? p.w : 300,
      h: typeof p.h === "number" ? p.h : 220
    })),
    steps: (obj.steps || []).map((s, i) => ({
      id: s.id,
      name: s.name ?? s.label ?? `Step ${s.id}`,
      type: s.type ?? "task",
      phaseId: s.phaseId ?? null,
      x: typeof s.x === "number" ? s.x : 100 + (i % 4) * 220,
      y: typeof s.y === "number" ? s.y : 80 + Math.floor(i / 4) * 160,
      roles: normalizeRoles(s.roles ?? s.role),
      requiresClaim: (s.type ?? "task") === "end" || !!s.autoAdvance ? false : (s.requiresClaim ?? false),
      autoAdvance: (s.type ?? "task") === "end" ? false : !!s.autoAdvance,
      nextStepId: s.nextStepId ?? null,
      variables: (s.variables || []).map(v => ({
        id: v.id,
        name: v.name ?? v.label ?? `Variable ${v.id}`,
        dataType: v.dataType ?? "string",
        isArray: !!v.isArray,
        required: !!v.required
      })),
      actions: (s.actions || []).map(a => ({
        id: a.id,
        name: a.name ?? a.label ?? "action",
        toStepId: a.toStepId ?? a.next ?? null,
        roles: normalizeRoles(a.roles ?? a.role),
        variables: (a.variables || []).map(v => ({
          id: v.id,
          name: v.name ?? v.label ?? `Variable ${v.id}`,
          dataType: v.dataType ?? "string",
          isArray: !!v.isArray,
          required: !!v.required
        }))
      }))
    }))
  };
  clearSelection();
}

/* ---------- DOM helper ---------- */
function el(tag, attrs) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

/* ---------- Wire up toolbar ---------- */
document.getElementById("addStepBtn").onclick = () => { if (connectMode) setConnectMode(false); addStep(); };
document.getElementById("addPhaseBtn").onclick = () => { if (connectMode) setConnectMode(false); addPhase(); };
document.getElementById("connectBtn").onclick = () => setConnectMode(!connectMode);
document.getElementById("saveBtn").onclick = save;
document.getElementById("newBtn").onclick = () => {
  if (confirm("Start a new empty workflow? Unsaved changes will be lost.")) { model = newModel(); clearSelection(); }
};
document.getElementById("loadBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try { loadFromObject(JSON.parse(reader.result)); }
    catch (err) { alert("Invalid JSON file: " + err.message); }
  };
  reader.readAsText(file);
  e.target.value = "";
};
wfNameInput.oninput = () => { model.name = wfNameInput.value; };

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { if (connectMode) setConnectMode(false); else clearSelection(); }
  if (e.key === "Delete" && selected) {
    if (selected.kind === 'step') deleteStep(selected.stepId);
    else if (selected.kind === 'phase') deletePhase(selected.phaseId);
    else {
      const s = getStep(selected.stepId);
      if (s) { s.actions = s.actions.filter(a => a.id !== selected.actionId); select('step', s.id); }
    }
  }
});

/* ---------- Init ---------- */
render();
</script>
</body>
