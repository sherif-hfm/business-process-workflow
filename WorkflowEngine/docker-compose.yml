services:
  postgres:
    image: postgres:16
    container_name: workflow-engine-postgres
    environment:
      POSTGRES_DB: workflow_engine
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports:
      - "5432:5432"
    volumes:
      - workflow_engine_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  workflow_engine_pgdata:
